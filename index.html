<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <title>tooldesk</title>
    <script>
      try {
        var theme = localStorage.getItem('tooldesk-theme');
        if (theme === 'dark' || theme === 'light') {
          document.documentElement.dataset.theme = theme;
        }
      } catch (error) {
        /* ignore */
      }
    </script>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #eef3f8;
        color: #0f172a;
      }

      html[data-theme='dark'],
      html[data-theme='dark'] body {
        background: #07101d;
        color: #eef5ff;
      }

      #app {
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
