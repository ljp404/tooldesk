<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>tooldesk 贴图</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        user-select: none;
        -webkit-user-drag: none;
        -webkit-user-select: none;
      }

      html,
      body {
        background: transparent;
        height: 100%;
        overflow: hidden;
        width: 100%;
      }

      body {
        cursor: default;
      }

      .pin-shell {
        background: transparent;
        height: 100%;
        padding: 14px;
        width: 100%;
      }

      .pin-frame {
        border-radius: 2px;
        box-shadow:
          0 0 2px 1px rgba(59, 130, 246, 0.55),
          0 0 8px 2px rgba(59, 130, 246, 0.24),
          0 0 14px 3px rgba(59, 130, 246, 0.1);
        height: 100%;
        overflow: hidden;
        outline: 2px solid rgba(59, 130, 246, 0.82);
        outline-offset: -2px;
        width: 100%;
      }

      .pin-frame.is-inactive {
        box-shadow:
          0 0 2px 1px rgba(255, 255, 255, 0.34),
          0 0 8px 2px rgba(255, 255, 255, 0.2),
          0 0 14px 3px rgba(220, 220, 228, 0.11);
        outline-color: rgba(255, 255, 255, 0.4);
      }

      .pin-frame img {
        display: block;
        height: 100%;
        object-fit: fill;
        pointer-events: none;
        width: 100%;
      }

      .pin-menu {
        background: #ffffff;
        border: 1px solid rgba(15, 23, 42, 0.1);
        border-radius: 8px;
        box-shadow:
          0 4px 6px rgba(15, 23, 42, 0.06),
          0 12px 24px rgba(15, 23, 42, 0.14);
        display: none;
        min-width: 132px;
        padding: 4px;
        position: fixed;
        z-index: 10;
      }

      .pin-menu.open {
        display: grid;
        gap: 2px;
      }

      .pin-menu button {
        background: transparent;
        border: 0;
        border-radius: 6px;
        color: #0f172a;
        cursor: pointer;
        font: 13px/1.4 'Segoe UI', system-ui, sans-serif;
        padding: 8px 12px;
        text-align: left;
      }

      .pin-menu button:hover {
        background: #f1f5f9;
      }

      .pin-menu button.danger {
        color: #dc2626;
      }

      .pin-menu button.danger:hover {
        background: #fef2f2;
      }
    </style>
  </head>
  <body>
    <div class="pin-shell" id="pin-shell">
      <div class="pin-frame" id="pin-frame">
        <img id="pin-image" alt="贴图" />
      </div>
    </div>
    <script src="./tauri-screenshot-pin.js"></script>
  </body>
</html>
