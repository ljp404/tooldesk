<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        align-items: center;
        background: #ffffff;
        display: flex;
        font-family: "Segoe UI", system-ui, sans-serif;
        height: 100%;
        justify-content: center;
        overflow: hidden;
        width: 100%;
        -webkit-font-smoothing: antialiased;
      }

      .bar {
        align-items: center;
        display: flex;
        gap: 8px;
        padding: 8px 10px;
        width: 100%;
      }

      .dot {
        background: #ef4444;
        border-radius: 50%;
        flex-shrink: 0;
        height: 8px;
        width: 8px;
      }

      .timer {
        color: #111827;
        flex: 1;
        font-size: 13px;
        font-variant-numeric: tabular-nums;
        font-weight: 700;
        min-width: 48px;
      }

      button {
        background: #f8fafc;
        border: 1px solid #dbe4ef;
        border-radius: 6px;
        color: #334155;
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
        height: 28px;
        min-width: 44px;
        padding: 0 10px;
      }

      button:hover {
        background: #eff6ff;
        border-color: #93c5fd;
        color: #1d4ed8;
      }

      button.danger {
        background: #fef2f2;
        border-color: #fecaca;
        color: #b91c1c;
      }

      button.danger:hover {
        background: #fee2e2;
        border-color: #fca5a5;
      }
    </style>
  </head>
  <body>
    <div class="bar">
      <span class="dot" aria-hidden="true"></span>
      <span class="timer" id="timer">00:00</span>
      <button type="button" id="pause">暂停</button>
      <button type="button" id="stop" class="danger">停止</button>
    </div>
    <script src="./recording-control.js"></script>
  </body>
</html>
