<!doctype html>
<html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>时间戳转换</title><style>*{box-sizing:border-box}html,body{height:100%;margin:0}body{--brand:#2563eb;--panel-bg:#fff;--panel-border:#dbe4ef;--tool-surface-border:#dbe4ef;--tool-secondary-btn-bg:#f8fafc;--tool-hover-bg:#eef4ff;--tool-active-border:#bfdbfe;--text-main:#111827;--text-muted:#64748b;--shadow:none;background:#eef3f8;color:#111827;font-family:"Microsoft YaHei","Segoe UI",Arial,sans-serif;font-size:13px}button,input,textarea,select{font:inherit}button{border:0;cursor:pointer}button:disabled{cursor:not-allowed;opacity:.55}.tool-panel{background:var(--panel-bg);border: 0;border-radius:0;min-height:100%;overflow:hidden;padding:0}.tool-panel-head{align-items:center;border-bottom:1px solid var(--panel-border);display:flex;justify-content:flex-end;min-height:48px;padding:0 18px;position:relative}.tool-actions{display:flex;gap:16px}.tool-content{padding:18px}.tool-primary-button,.secondary-action{background:var(--brand);border-radius:7px;color:#fff;font-weight:800;min-height:34px;padding:0 14px}.tool-primary-button:hover,.secondary-action:hover{background:#1d4ed8}.tool-inline-error{color:#dc2626;font-size:12px;margin:8px 0 0}.field{display:grid;gap:8px}.field span{color:#475569;font-size:12px;font-weight:800}.app-icon{align-items:center;display:inline-flex;height:18px;justify-content:center;width:18px}.copy-toast{background:rgba(15,23,42,.88);border-radius:6px;color:#fff;font-size:12px;font-weight:700;line-height:1;padding:7px 10px;position:absolute;right:14px;top:56px;z-index:5}[hidden]{display:none!important}
textarea,
input:not([type='checkbox']):not([type='radio']):not([type='range']):not([type='file']):not([type='color']) {
  background: #ffffff;
  border: 1px solid var(--panel-border);
  border-radius: 7px;
  color: var(--text-main);
  outline: none;
  padding: 12px;
}

textarea:focus,
textarea:focus-visible,
input:not([type='checkbox']):not([type='radio']):not([type='range']):not([type='file']):not([type='color']):focus,
input:not([type='checkbox']):not([type='radio']):not([type='range']):not([type='file']):not([type='color']):focus-visible {
  border-color: rgba(96, 165, 250, 0.68);
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.16);
  outline: none;
}

.field.small input:not([type='checkbox']):not([type='radio']):not([type='range']):not([type='file']):not([type='color']) {
  min-height: 40px;
}
.timestamp-panel {
  position: relative;
}

.timestamp-grid {
  align-items: stretch;
  display: grid;
  gap: 16px;
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.timestamp-card {
  background: #f8fafc;
  border: 1px solid #dbe4ef;
  border-radius: 8px;
  display: grid;
  gap: 16px;
  grid-template-rows: auto auto 1fr;
  min-height: 330px;
  padding: 16px;
}

.timestamp-card-head {
  align-items: center;
  display: flex;
  gap: 12px;
  justify-content: space-between;
}

.timestamp-card-title {
  align-items: center;
  color: #111827;
  display: inline-flex;
  gap: 10px;
}

.timestamp-card-title strong {
  font-size: 14px;
  font-weight: 800;
}

.timestamp-icon-badge {
  align-items: center;
  background: rgba(37, 99, 235, 0.1);
  border: 1px solid rgba(37, 99, 235, 0.18);
  border-radius: 8px;
  color: #2563eb;
  display: inline-flex;
  height: 32px;
  justify-content: center;
  width: 32px;
}

.timestamp-icon-badge .app-icon {
  height: 17px;
  width: 17px;
}

.tool-panel .timestamp-now-button {
  background: #ffffff;
  border: 1px solid #dbe7fb;
  border-radius: 6px;
  color: #2563eb;
  height: 32px;
  min-height: 32px;
  padding: 0 10px;
}

.tool-panel .timestamp-now-button:hover {
  background: #f8fbff;
  border-color: #c8daf8;
  color: #2563eb;
}

.timestamp-field {
  gap: 7px;
}

.timestamp-field span {
  color: #64748b;
  font-size: 12px;
  font-weight: 700;
}

.timestamp-field input {
  background: #ffffff;
  border-color: #dbe4ef;
  font-family: 'Cascadia Code', Consolas, monospace;
}

.timestamp-input-shell {
  position: relative;
}

.timestamp-input-shell input {
  padding-right: 128px;
  width: 100%;
}

.timestamp-detected-unit {
  background: #ffffff;
  border: 1px solid #dbe7fb;
  border-radius: 999px;
  color: #2563eb;
  font-size: 12px;
  font-weight: 800;
  line-height: 1;
  padding: 5px 8px;
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
}

.timestamp-output-list {
  display: grid;
  gap: 10px;
}

.tool-panel .timestamp-output-list button {
  background: #ffffff;
  border: 1px solid #dbe4ef;
  border-radius: 8px;
  color: #111827;
  display: grid;
  gap: 6px;
  min-height: 76px;
  padding: 12px 14px;
  place-items: center start;
  text-align: left;
}

.tool-panel .timestamp-output-list button:hover {
  background: #f8fbff;
  border-color: #bfdbfe;
}

.timestamp-output-list span {
  color: #64748b;
  font-size: 12px;
  font-weight: 700;
}

.timestamp-output-list code {
  color: #2563eb;
  font-family: 'Cascadia Code', Consolas, monospace;
  font-size: 15px;
  font-weight: 800;
  overflow-wrap: anywhere;
}

.timestamp-convert-list.invalid code {
  color: #94a3b8;
}

.timestamp-copy-toast {
  background: rgba(15, 23, 42, 0.88);
  border-radius: 6px;
  color: #ffffff;
  font-size: 12px;
  font-weight: 700;
  line-height: 1;
  padding: 7px 10px;
  position: absolute;
  right: 18px;
  top: 14px;
  z-index: 2;
}
</style></head><body>
<main class="tool-panel timestamp-panel"><span class="timestamp-copy-toast" role="status" hidden></span><div class="tool-content timestamp-grid"><section class="timestamp-card"><div class="timestamp-card-head"><div class="timestamp-card-title"><span class="timestamp-icon-badge"><span class="app-icon" aria-hidden="true">⏱</span></span><strong>时间戳转时间</strong></div><button id="tsNow" class="timestamp-now-button" type="button">当前时间</button></div><label class="field small timestamp-field"><span>时间戳</span><div class="timestamp-input-shell"><input id="timestampInput" type="text"/><span id="timestampUnit" class="timestamp-detected-unit">待识别</span></div></label><div id="timestampRows" class="timestamp-output-list timestamp-convert-list"></div></section><section class="timestamp-card"><div class="timestamp-card-head"><div class="timestamp-card-title"><span class="timestamp-icon-badge"><span class="app-icon" aria-hidden="true">⏱</span></span><strong>时间转时间戳</strong></div></div><label class="field small timestamp-field"><span>本地时间</span><input id="dateInput" type="datetime-local"/></label><div id="dateRows" class="timestamp-output-list"></div></section></div></main>
<script>
const plugin=TooldeskPlugin.create({id:'tooldesk-timestamp-converter',capabilities:['copyText']});const api=plugin.api;

function byId(id){return document.getElementById(id)}
function escapeHtml(value){return String(value).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function showToast(selector,text){const el=document.querySelector(selector);if(!el)return;el.textContent=text;el.hidden=false;clearTimeout(el._timer);el._timer=setTimeout(()=>{el.hidden=true},1600)}
function applyLaunchContent(_plugin,_api,fn){window.addEventListener('message',event=>{const context=event.data||{};if(context.source==='tooldesk-host'&&context.type==='launch-context'){const content=typeof context.content==='string'?context.content:'';if(content)fn(content)}})}
async function copyWithApi(api,text,msg,selector){if(!text)return;try{await api.copyText(String(text))}catch{return}showToast(selector,msg||'已复制')}

function pad(v){return String(v).padStart(2,'0')}function localValue(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':'+pad(d.getMinutes())}function detectMode(v){return v.trim().length===10?'s':'ms'}function formatDate(d,ms){const base=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());return ms?base+'.'+String(d.getMilliseconds()).padStart(3,'0'):base}function info(){const raw=byId('timestampInput').value.trim();const value=Number(raw);if(!raw||!Number.isFinite(value))return null;const mode=detectMode(raw);const ms=mode==='s'?value*1000:value;const date=new Date(ms);return Number.isNaN(date.getTime())?null:{date,ms:String(ms),s:String(Math.floor(ms/1000)),mode}}
function renderTs(){const item=info();byId('timestampUnit').textContent=item?'自动识别：'+(item.mode==='s'?'秒':'毫秒'):'待识别';byId('timestampRows').classList.toggle('invalid',!item);const rows=item?[['秒',formatDate(item.date,false)],['毫秒',formatDate(item.date,true)]]:[['秒','-'],['毫秒','-']];byId('timestampRows').innerHTML=rows.map(([label,value])=>'<button type="button" '+(value==='-'?'disabled':'')+' data-copy="'+escapeHtml(value)+'"><span>'+label+'</span><code>'+escapeHtml(value)+'</code></button>').join('')}
function renderDate(){const date=new Date(byId('dateInput').value);const rows=Number.isNaN(date.getTime())?[['毫秒','-'],['秒','-']]:[['毫秒',String(date.getTime())],['秒',String(Math.floor(date.getTime()/1000))]];byId('dateRows').innerHTML=rows.map(([label,value])=>'<button type="button" '+(value==='-'?'disabled':'')+' data-copy="'+escapeHtml(value)+'"><span>'+label+'</span><code>'+escapeHtml(value)+'</code></button>').join('')}
function useNow(){const now=new Date();byId('timestampInput').value=String(now.getTime());byId('dateInput').value=localValue(now);renderTs();renderDate()}byId('timestampInput').addEventListener('input',renderTs);byId('dateInput').addEventListener('input',renderDate);byId('tsNow').addEventListener('click',useNow);document.body.addEventListener('click',e=>{const b=e.target.closest('button[data-copy]');if(b)copyWithApi(api,b.dataset.copy,'已复制','.timestamp-copy-toast')});applyLaunchContent(plugin,api,content=>{if(/^\d{10}(\d{3})?$/.test(content.trim())){byId('timestampInput').value=content.trim();const item=info();if(item)byId('dateInput').value=localValue(item.date);renderTs();renderDate()}});useNow();
void plugin.connect().then(() => {});
</script></body></html>
