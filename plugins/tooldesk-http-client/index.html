          return;
        }
        list.replaceChildren(...groups.map(createCollectionGroupElement));
      }

      function createCollectionGroupElement(group) {
        const element = document.createElement('div');
        const active = group.id === state.collections.activeGroupId;
        element.className = `http-client-collection-group${active ? ' active' : ''}${state.dragOverGroupId === group.id ? ' drag-over' : ''}${state.groupDragOverId === group.id ? ' group-drag-over' : ''}`;
        element.dataset.groupId = group.id;
        const head = document.createElement('div');
        head.className = 'http-client-collection-group-head';
        head.innerHTML = `
          <button class="http-client-collection-toggle" type="button" aria-expanded="${group.expanded}">${iconSvg('chevron', group.expanded ? '' : 'collapsed')}</button>
          <button class="http-client-collection-group-main" type="button">${iconSvg('folder')}<span class="http-client-collection-group-name" title="${escapeAttr(group.name)}">${escapeHtml(group.name)}</span></button>
          <div class="http-client-collection-group-actions">
            <button type="button" title="添加请求">+</button>
            <button type="button" title="重命名分组">✎</button>
            <button type="button" title="删除分组" ${state.collections.groups.length <= 1 ? 'disabled' : ''}>×</button>
          </div>
        `;
        const [toggle, main] = head.querySelectorAll('button');
        const actionButtons = head.querySelectorAll('.http-client-collection-group-actions button');
        head.addEventListener('pointerdown', (event) => startGroupPointerDrag(event, group.id, head));
        toggle.addEventListener('click', () => toggleCollectionGroup(group.id));
        main.addEventListener('click', () => selectCollectionGroup(group.id));
        main.addEventListener('dblclick', () => toggleCollectionGroup(group.id));
        actionButtons[0].addEventListener('click', () => addEmptyRequestToGroup(group.id));
        actionButtons[1].addEventListener('click', () => openDialog({ type: 'renameGroup', groupId: group.id, initialName: group.name }));
        actionButtons[2].addEventListener('click', () => openDialog({ type: 'deleteGroup', groupId: group.id, initialName: group.name }));
        element.addEventListener('dragover', (event) => handleRequestDragOver(event, element, group.id));
        element.addEventListener('dragleave', (event) => handleRequestDragLeave(event, element, group.id));
        element.addEventListener('drop', (event) => handleRequestDrop(event, group.id));
        head.addEventListener('contextmenu', (event) => {
          event.preventDefault();
          openCollectionContextMenu(event, group.id);
        });
        element.appendChild(head);
        if (group.expanded) {
          const requests = document.createElement('div');
          requests.className = 'http-client-collection-requests';
          if (!group.requests.length) {
            requests.innerHTML = '<p class="http-client-collections-empty">暂无请求，点击 + 保存</p>';
          } else {
            requests.replaceChildren(...group.requests.map((request) => createSavedRequestElement(group.id, request)));
          }
          element.appendChild(requests);
        }
        return element;
      }

      function createSavedRequestElement(groupId, request) {
        const element = document.createElement('div');
        const isDragging = state.draggingRequest?.requestId === request.id;
        element.className = `http-client-collection-request${state.collections.activeRequestId === request.id ? ' active' : ''}${isDragging ? ' dragging' : ''}`;
        element.dataset.groupId = groupId;
        element.dataset.requestId = request.id;
        element.innerHTML = `
          <span class="${collectionMethodClass(request.request.method)}">${escapeHtml(request.request.method)}</span>
          <button class="http-client-collection-request-main" type="button"><span class="http-client-collection-request-name" title="${escapeAttr(request.name)}">${escapeHtml(request.name)}</span></button>
          <span class="http-client-collection-request-actions">
            <button type="button" title="重命名">✎</button>
            <button type="button" title="删除">×</button>
          </span>
        `;
        element.addEventListener('pointerdown', (event) => startRequestPointerDrag(event, groupId, request.id, element));
        element.addEventListener('pointerup', (event) => {
          if (event.button !== 0) return;
          if (state.dragPointer?.dragging) return;
          if (event.target instanceof Element && event.target.closest('.http-client-collection-request-actions')) return;
          selectSavedRequest(groupId, request.id);
        });
        element.addEventListener('contextmenu', (event) => {
          event.preventDefault();
          event.stopPropagation();
          openRequestContextMenu(event, groupId, request.id);
        });
        const actions = element.querySelectorAll('.http-client-collection-request-actions button');
        actions[0].addEventListener('click', (event) => {
          event.stopPropagation();
          openDialog({ type: 'renameRequest', groupId, requestId: request.id, initialName: request.name });
        });
        actions[1].addEventListener('click', (event) => {
          event.stopPropagation();
          openDialog({ type: 'deleteRequest', groupId, requestId: request.id, initialName: request.name });
        });
        return element;
      }

      function beginRequestDrag(groupId, requestId, element) {
        state.draggingRequest = { groupId, requestId };
        state.dragOverGroupId = '';
        element.classList.add('dragging');
      }

      function startRequestPointerDrag(event, groupId, requestId, element) {
        if (event.button !== 0) return;
        if (event.target instanceof Element && event.target.closest('.http-client-collection-request-actions')) return;

        state.dragPointer = {
          dragging: false,
          element,
          groupId,
          pointerId: event.pointerId,
          requestId,
          startX: event.clientX,
          startY: event.clientY
        };
        element.setPointerCapture?.(event.pointerId);
        element.addEventListener('pointermove', handleRequestPointerMove);
        element.addEventListener('pointerup', handleRequestPointerUp);
        element.addEventListener('pointercancel', cancelRequestPointerDrag);
      }

      function handleRequestDragStart(event, groupId, requestId, element) {
        beginRequestDrag(groupId, requestId, element);
        if (event.dataTransfer) {
          event.dataTransfer.effectAllowed = 'move';
          event.dataTransfer.setData('application/x-tooldesk-http-request', JSON.stringify({ groupId, requestId }));
          event.dataTransfer.setData('text/plain', JSON.stringify({ groupId, requestId }));
        }
      }

      function getDraggingRequestFromEvent(event) {
        if (state.draggingRequest) return state.draggingRequest;
        if (!event.dataTransfer) return null;

        const payload =
          event.dataTransfer.getData('application/x-tooldesk-http-request') ||
          event.dataTransfer.getData('text/plain');
        if (!payload) return null;

        try {
          const parsed = JSON.parse(payload);
          if (parsed?.groupId && parsed?.requestId) {
            return { groupId: parsed.groupId, requestId: parsed.requestId };
          }
        } catch {}

        return null;
      }

      function handleRequestDragEnd() {
        state.draggingRequest = null;
        state.dragOverGroupId = '';
        state.dragPointer = null;
        renderCollectionsPanel();
      }

      function moveCollectionGroup(sourceGroupId, targetGroupId) {
        if (!sourceGroupId || !targetGroupId || sourceGroupId === targetGroupId) {
          renderCollectionsPanel();
          return;
        }

        const sourceIndex = state.collections.groups.findIndex((group) => group.id === sourceGroupId);
        const targetIndex = state.collections.groups.findIndex((group) => group.id === targetGroupId);
        if (sourceIndex < 0 || targetIndex < 0) {
          renderCollectionsPanel();
          return;
        }

        const groups = [...state.collections.groups];
        const [source] = groups.splice(sourceIndex, 1);
        const nextTargetIndex = groups.findIndex((group) => group.id === targetGroupId);
        groups.splice(nextTargetIndex < 0 ? groups.length : nextTargetIndex, 0, source);
        state.collections.groups = groups;
        state.collections.activeGroupId = sourceGroupId;
        persistCollections();
        renderAll();
      }

      function groupIdFromPoint(x, y) {
        const target = document.elementFromPoint(x, y);
        return target instanceof Element ? target.closest('.http-client-collection-group')?.dataset.groupId || '' : '';
      }

      function setDragOverGroup(groupId) {
        if (state.dragOverGroupId === groupId) return;
        document.querySelectorAll('.http-client-collection-group.drag-over').forEach((item) => item.classList.remove('drag-over'));
        state.dragOverGroupId = groupId;
        if (groupId) {
          document.querySelector(`.http-client-collection-group[data-group-id="${CSS.escape(groupId)}"]`)?.classList.add('drag-over');
        }
      }

      function setGroupDragOver(groupId) {
        if (state.groupDragOverId === groupId) return;
        document.querySelectorAll('.http-client-collection-group.group-drag-over').forEach((item) => item.classList.remove('group-drag-over'));
        state.groupDragOverId = groupId;
        if (groupId) {
          document.querySelector(`.http-client-collection-group[data-group-id="${CSS.escape(groupId)}"]`)?.classList.add('group-drag-over');
        }
      }

      function startGroupPointerDrag(event, groupId, head) {
        if (event.button !== 0) return;
        if (event.target instanceof Element && event.target.closest('.http-client-collection-toggle, .http-client-collection-group-actions')) return;

        state.groupDragPointer = {
          dragging: false,
          groupId,
          head,
          pointerId: event.pointerId,
          startX: event.clientX,
          startY: event.clientY
        };
        head.setPointerCapture?.(event.pointerId);
        head.addEventListener('pointermove', handleGroupPointerMove);
        head.addEventListener('pointerup', handleGroupPointerUp);
        head.addEventListener('pointercancel', cancelGroupPointerDrag);
      }

      function handleGroupPointerMove(event) {
        const drag = state.groupDragPointer;
        if (!drag || drag.pointerId !== event.pointerId) return;

        const distance = Math.hypot(event.clientX - drag.startX, event.clientY - drag.startY);
        if (!drag.dragging && distance < 6) return;

        event.preventDefault();
        if (!drag.dragging) {
          drag.dragging = true;
          drag.head.classList.add('dragging');
        }

        const targetGroupId = groupIdFromPoint(event.clientX, event.clientY);
        setGroupDragOver(targetGroupId && targetGroupId !== drag.groupId ? targetGroupId : '');
      }

      function handleGroupPointerUp(event) {
        const drag = state.groupDragPointer;
        if (!drag || drag.pointerId !== event.pointerId) return;

        const targetGroupId = groupIdFromPoint(event.clientX, event.clientY);
        cleanupGroupPointerDrag();

        if (drag.dragging && targetGroupId && targetGroupId !== drag.groupId) {
          moveCollectionGroup(drag.groupId, targetGroupId);
        } else {
          renderCollectionsPanel();
        }
      }

      function cancelGroupPointerDrag(event) {
        const drag = state.groupDragPointer;
        if (event && drag && drag.pointerId !== event.pointerId) return;
        cleanupGroupPointerDrag();
        renderCollectionsPanel();
      }

      function cleanupGroupPointerDrag() {
        const drag = state.groupDragPointer;
        if (!drag) return;

        drag.head.releasePointerCapture?.(drag.pointerId);
        drag.head.removeEventListener('pointermove', handleGroupPointerMove);
        drag.head.removeEventListener('pointerup', handleGroupPointerUp);
        drag.head.removeEventListener('pointercancel', cancelGroupPointerDrag);
        drag.head.classList.remove('dragging');
        state.groupDragOverId = '';
        state.groupDragPointer = null;
      }

      function handleRequestPointerMove(event) {
        const drag = state.dragPointer;
        if (!drag || drag.pointerId !== event.pointerId) return;

        const distance = Math.hypot(event.clientX - drag.startX, event.clientY - drag.startY);
        if (!drag.dragging && distance < 6) return;

        event.preventDefault();
        if (!drag.dragging) {
          drag.dragging = true;
          beginRequestDrag(drag.groupId, drag.requestId, drag.element);
        }

        const targetGroupId = groupIdFromPoint(event.clientX, event.clientY);
        setDragOverGroup(targetGroupId && targetGroupId !== drag.groupId ? targetGroupId : '');
      }

      function handleRequestPointerUp(event) {
        const drag = state.dragPointer;
        if (!drag || drag.pointerId !== event.pointerId) return;

        const targetGroupId = groupIdFromPoint(event.clientX, event.clientY);
        cleanupRequestPointerDrag();

        if (drag.dragging && targetGroupId && targetGroupId !== drag.groupId) {
          moveSavedRequestToGroup(drag.groupId, drag.requestId, targetGroupId);
        } else {
          renderCollectionsPanel();
        }
      }

      function cancelRequestPointerDrag(event) {
        const drag = state.dragPointer;
        if (event && drag && drag.pointerId !== event.pointerId) return;
        cleanupRequestPointerDrag();
        renderCollectionsPanel();
      }

      function cleanupRequestPointerDrag() {
        const drag = state.dragPointer;
        if (!drag) return;

        drag.element.releasePointerCapture?.(drag.pointerId);
        drag.element.removeEventListener('pointermove', handleRequestPointerMove);
        drag.element.removeEventListener('pointerup', handleRequestPointerUp);
        drag.element.removeEventListener('pointercancel', cancelRequestPointerDrag);
        state.draggingRequest = null;
        state.dragOverGroupId = '';
        state.dragPointer = null;
      }

      function handleRequestDragOver(event, element, groupId) {
        const draggingRequest = state.draggingRequest;
        if (!draggingRequest || draggingRequest.groupId === groupId) {
          return;
        }

        event.preventDefault();
        if (event.dataTransfer) {
          event.dataTransfer.dropEffect = 'move';
        }

        if (state.dragOverGroupId !== groupId) {
          document.querySelectorAll('.http-client-collection-group.drag-over').forEach((item) => item.classList.remove('drag-over'));
          state.dragOverGroupId = groupId;
          element.classList.add('drag-over');
        }
      }

      function handleRequestDragLeave(event, element, groupId) {
        if (!state.draggingRequest || state.dragOverGroupId !== groupId) {
          return;
        }

        const relatedTarget = event.relatedTarget;
        if (relatedTarget instanceof Node && element.contains(relatedTarget)) {
          return;
        }

        state.dragOverGroupId = '';
        element.classList.remove('drag-over');
      }

      function handleRequestDrop(event, targetGroupId) {
        const draggingRequest = getDraggingRequestFromEvent(event);
        if (!draggingRequest) {
          return;
        }

        event.preventDefault();
        moveSavedRequestToGroup(draggingRequest.groupId, draggingRequest.requestId, targetGroupId);
        state.draggingRequest = null;
        state.dragOverGroupId = '';
      }

      function renderEnvironmentPanel() {
        const panel = $('sidePanel');
        panel.innerHTML = `
          <div class="http-client-side-panel-head">
            <strong>环境</strong>
            <button id="addEnvironment" class="http-client-toolbar-link" type="button"><span class="http-client-kv-add-mark" aria-hidden="true">+</span>新建</button>
          </div>
          <div id="environmentList" class="http-client-env-list"></div>
          <div class="http-client-side-env-body http-client-kv-table">
            <div class="http-client-env-toolbar"><p>使用 {{变量名}} 引用，发送时自动替换。</p></div>
            <div class="http-client-kv-scroll" id="envRows"></div>
            <button class="http-client-kv-add" id="addEnvRow" type="button"><span class="http-client-kv-add-mark" aria-hidden="true">+</span>添加变量</button>
          </div>
        `;
        $('addEnvironment').addEventListener('click', () => {
          persistEnvironments();
          const env = createEnvironment(`环境 ${state.environments.length + 1}`);
          state.environments.push(env);
          state.activeEnvId = env.id;
          syncEnvRows();
          persistEnvironments();
          renderEnvironmentPanel();
        });
        $('environmentList').replaceChildren(...state.environments.map(createEnvironmentElement));
        const head = document.createElement('div');
        head.className = 'http-client-kv-head';
        head.innerHTML = '<span>启用</span><span>变量名</span><span>变量值</span><span></span>';
        $('envRows').replaceChildren(head, ...state.envRows.map((row) => createKvRow('envRows', row, ['baseUrl', 'https://api.example.com'])));
        $('addEnvRow').addEventListener('click', () => {
          state.envRows.push(createRow());
          persistEnvironments();
          renderEnvironmentPanel();
        });
      }

      function createEnvironmentElement(environment) {
        const active = environment.id === state.activeEnvId;
        const enabledCount = environment.variables.filter((row) => row.enabled && row.key.trim()).length;
        const element = document.createElement('div');
        element.className = `http-client-env-item${active ? ' active' : ''}`;
        element.innerHTML = `
          <span class="http-client-env-icon">${iconSvg('folder')}</span>
          <span class="http-client-env-main">
            <span class="http-client-env-name" title="${escapeAttr(environment.name)}">${escapeHtml(environment.name)}</span>
            <span class="http-client-env-meta">${enabledCount} 个启用变量</span>
          </span>
          <span class="http-client-env-actions">
            <button type="button" title="重命名环境">✎</button>
            <button class="danger" type="button" title="删除环境" ${state.environments.length <= 1 ? 'disabled' : ''}>×</button>
          </span>
        `;
        const [renameButton, deleteButton] = element.querySelectorAll('.http-client-env-actions button');
        element.addEventListener('click', () => {
          if (environment.id === state.activeEnvId) return;
          persistEnvironments();
          state.activeEnvId = environment.id;
          syncEnvRows();
          persistEnvironments();
          renderEnvironmentPanel();
        });
        renameButton.addEventListener('click', (event) => {
          event.stopPropagation();
          openDialog({ type: 'renameEnvironment', envId: environment.id, initialName: environment.name });
        });
        deleteButton.addEventListener('click', (event) => {
          event.stopPropagation();
          if (state.environments.length <= 1) {
            showToast('至少保留一个环境');
            return;
          }
          openDialog({ type: 'deleteEnvironment', envId: environment.id, initialName: environment.name });
        });
        return element;
      }

      function renderHistoryPanel() {
        const panel = $('sidePanel');
        panel.innerHTML = `
          <div class="http-client-side-panel-head">
            <strong>历史记录</strong>
            <div class="http-client-history-actions">
              <button id="resetRequest" type="button">新建</button>
              <button id="clearHistory" type="button" ${state.history.length ? '' : 'disabled'}>清空</button>
            </div>
          </div>
          <div id="historyList" class="http-client-side-history-list"></div>
        `;
        $('resetRequest').addEventListener('click', () => restoreSnapshot(createEmptySnapshot()));
        $('clearHistory').addEventListener('click', () => {
          state.history = [];
          persistHistory();
          renderHistoryPanel();
        });
        const list = $('historyList');
        if (!state.history.length) {
          list.innerHTML = '<div class="http-client-collections-empty">暂无历史</div>';
          return;
        }
        list.replaceChildren(...state.history.map(createHistoryElement));
      }

      function createHistoryElement(entry) {
        const button = document.createElement('button');
        button.className = 'http-client-history-item';
        button.type = 'button';
        const statusText = entry.responseStatus ? ` · ${entry.responseStatus}` : '';
        button.innerHTML = `
          <span class="http-client-history-method">${escapeHtml(entry.request.method)}</span>
          <span class="http-client-history-label" title="${escapeAttr(entry.label)}">${escapeHtml(entry.label)}</span>
          <span class="http-client-history-meta">${escapeHtml(formatHistoryTime(entry.createdAt))}${statusText}</span>
          <span class="http-client-history-remove" title="删除">×</span>
        `;
        button.addEventListener('click', () => restoreHistory(entry));
        button.querySelector('.http-client-history-remove').addEventListener('click', (event) => {
          event.stopPropagation();
          state.history = state.history.filter((item) => item.id !== entry.id);
          persistHistory();
          renderHistoryPanel();
        });
        return button;
      }

      function syncFromInputs() {
        const url = $('url');
        if (url) state.url = url.value;
        const requestBody = $('requestBody');
        if (requestBody) state.requestBody = requestBody.value;
      }

      function selectCollectionGroup(groupId) {
        state.collections.activeGroupId = groupId;
        persistCollections();
        renderSidebar();
      }

      function toggleCollectionGroup(groupId) {
        state.collections.activeGroupId = groupId;
        state.collections.groups = state.collections.groups.map((group) => group.id === groupId ? { ...group, expanded: !group.expanded } : group);
        persistCollections();
        renderSidebar();
      }

      function addRequestToGroup(groupId, snapshot = buildSnapshot(), bindActiveTab = true) {
        const request = { id: crypto.randomUUID(), name: deriveRequestName(snapshot), request: cloneRequestSnapshot(snapshot), updatedAt: Date.now() };
        state.collections.activeGroupId = groupId;
        state.collections.activeRequestId = request.id;
        state.collections.groups = state.collections.groups.map((group) => group.id === groupId ? { ...group, expanded: true, requests: [...group.requests, request] } : group);
        const activeTab = getActiveOpenTab();
        if (activeTab && bindActiveTab) {
          activeTab.groupId = groupId;
          activeTab.id = `saved-${request.id}`;
          activeTab.name = request.name;
          activeTab.requestId = request.id;
          activeTab.snapshot = cloneSnapshot(snapshot);
          activeTab.baselineSnapshot = cloneSnapshot(snapshot);
          activeTab.type = 'saved';
          state.activeOpenTabId = activeTab.id;
        } else {
          const tab = createSavedOpenTab(groupId, request);
          state.openRequestTabs.push(tab);
          state.activeOpenTabId = tab.id;
        }
        restoreSnapshot(snapshot, false);
        persistCollections();
        renderAll();
      }

      function addEmptyRequestToGroup(groupId) {
        syncActiveOpenTabSnapshot();
        addRequestToGroup(groupId, createEmptySnapshot(), false);
      }

      function saveCurrentToCollection() {
        if (!state.openRequestTabs.length) return;
        const snapshot = buildSnapshot();
        if (hasActiveSavedRequest()) {
          state.collections.groups = state.collections.groups.map((group) => ({
            ...group,
            requests: group.requests.map((request) => request.id === state.collections.activeRequestId
              ? { ...request, name: request.name || deriveRequestName(snapshot), request: cloneRequestSnapshot(snapshot), updatedAt: Date.now() }
              : request)
          }));
          const activeTab = getActiveOpenTab();
          if (activeTab) {
            const saved = findSavedRequest(state.collections.activeRequestId);
            activeTab.name = saved?.request.name || deriveRequestName(snapshot);
            activeTab.snapshot = cloneSnapshot(snapshot);
            activeTab.baselineSnapshot = cloneSnapshot(snapshot);
          }
          persistCollections();
          renderAll();
          showToast('请求已保存');
          return;
        }
        addRequestToGroup(state.collections.activeGroupId || state.collections.groups[0].id, snapshot);
        showToast('请求已另存');
      }

      function selectSavedRequest(groupId, requestId) {
        const group = state.collections.groups.find((item) => item.id === groupId);
        const request = group && group.requests.find((item) => item.id === requestId);
        if (!request) return;
        openSavedRequestTab(groupId, request);
      }

      function removeSavedRequest(groupId, requestId) {
        state.collections.groups = state.collections.groups.map((group) => group.id === groupId ? { ...group, requests: group.requests.filter((request) => request.id !== requestId) } : group);
        if (state.collections.activeRequestId === requestId) state.collections.activeRequestId = '';
        state.openRequestTabs = state.openRequestTabs.filter((tab) => !(tab.type === 'saved' && tab.requestId === requestId));
        if (state.activeOpenTabId === `saved-${requestId}`) {
          const nextTab = state.openRequestTabs[0] || createScratchOpenTab();
          if (!state.openRequestTabs.length) state.openRequestTabs = [nextTab];
          state.activeOpenTabId = nextTab.id;
          state.collections.activeRequestId = nextTab.type === 'saved' ? nextTab.requestId : '';
          restoreSnapshot(nextTab.snapshot);
        }
        persistCollections();
        renderAll();
      }

      function moveSavedRequestToGroup(sourceGroupId, requestId, targetGroupId) {
        if (!sourceGroupId || !requestId || !targetGroupId || sourceGroupId === targetGroupId) {
          renderCollectionsPanel();
          return;
        }

        const sourceGroup = state.collections.groups.find((group) => group.id === sourceGroupId);
        const targetGroup = state.collections.groups.find((group) => group.id === targetGroupId);
        const request = sourceGroup?.requests.find((item) => item.id === requestId);

        if (!sourceGroup || !targetGroup || !request) {
          renderCollectionsPanel();
          return;
        }

        state.collections.groups = state.collections.groups.map((group) => {
          if (group.id === sourceGroupId) {
            return { ...group, requests: group.requests.filter((item) => item.id !== requestId) };
          }

          if (group.id === targetGroupId) {
            return { ...group, expanded: true, requests: [...group.requests, request] };
          }

          return group;
        });
        state.collections.activeGroupId = targetGroupId;
        state.openRequestTabs.forEach((tab) => {
          if (tab.type === 'saved' && tab.requestId === requestId) tab.groupId = targetGroupId;
        });
        persistCollections();
        renderAll();
      }

      function restoreHistory(entry) {
        openHistoryRequestTab(entry);
        showError(entry.response?.error || '');
        renderOpenRequestTabs();
        renderResponse();
      }

      function createHistoryEntry(snapshot, response) {
        const body = response && response.body ? truncateBody(response.body) : '';
        const contentType = response?.headers?.['content-type'] || response?.headers?.['Content-Type'] || '';
        return {
          createdAt: Date.now(),
          durationMs: response?.durationMs,
          id: crypto.randomUUID(),
          label: `${snapshot.method} ${snapshot.url}`.slice(0, 120),
          request: cloneRequestSnapshot(snapshot),
          response: response ? { ...response, body } : undefined,
          responseBody: response ? formatHttpBody(body, contentType) : '',
          responseStatus: response?.status
        };
      }

      function truncateBody(body) {
        const bytes = new TextEncoder().encode(body);
        if (bytes.length <= 128 * 1024) return body;
        return `${new TextDecoder().decode(bytes.slice(0, 128 * 1024))}\n\n...（响应体已截断以节省存储空间）`;
      }

      async function sendRequest() {
        await pluginConnect;
        const activeApi = syncPluginApi();
        if (!activeApi || typeof activeApi.sendHttpRequest !== 'function') {
          showError('插件 SDK 未就绪，请重启 Tooldesk');
          return;
        }
        syncFromInputs();
        const requestTabId = state.activeOpenTabId;
        let targetUrl = '';
        try {
          const resolvedUrl = applyEnv(state.url.trim());
          const queryRows = state.queryRows.map((row) => ({ ...row, key: applyEnv(row.key), value: applyEnv(row.value) }));
          targetUrl = appendQueryParams(resolvedUrl, queryRows);
        } catch {
          showError('URL 格式不正确');
          return;
        }
        if (!targetUrl) {
          showError('请输入请求 URL');
          return;
        }

        const snapshot = buildSnapshot();
        const headers = rowsToRecord(state.headerRows.map((row) => ({ ...row, key: applyEnv(row.key), value: applyEnv(row.value) })));
        let body;
        if (METHODS_WITH_BODY.has(state.method) && state.bodyType !== 'none') {
          body = applyEnv(state.requestBody);
          if (!Object.keys(headers).some((key) => key.toLowerCase() === 'content-type')) {
            headers['Content-Type'] = state.bodyType === 'json' ? 'application/json' : 'text/plain';
          }
        }
        const cookieHeader = buildCookieHeader(
          targetUrl,
          state.cookieRows.map((row) => ({ ...row, key: applyEnv(row.key), value: applyEnv(row.value) })),
          state.cookieJar,
          state.useCookieJar
        );
        if (cookieHeader) headers.Cookie = cookieHeader;

        state.isSending = true;
        state.response = null;
        state.responseBody = '';
        const startedTab = state.openRequestTabs.find((tab) => tab.id === requestTabId);
        if (startedTab) {
          startedTab.snapshot = cloneSnapshot({ ...snapshot, response: null, responseBody: '', responseTab: 'body' });
        }
        showError('');
        $('send').disabled = true;
        $('send').textContent = '发送中...';
        if (state.activeOpenTabId === requestTabId) {
          renderResponse();
        }
        try {
          const result = await activeApi.sendHttpRequest({ body, headers, method: state.method, timeoutMs: 30000, url: targetUrl });
          if (Array.isArray(result.setCookies) && result.setCookies.length) upsertCookiesFromResponse(targetUrl, result.setCookies);
          state.history = [createHistoryEntry(snapshot, result), ...state.history].slice(0, MAX_HISTORY);
          persistHistory();
          const contentType = result.headers?.['content-type'] || result.headers?.['Content-Type'] || '';
          const responseBody = formatHttpBody(result.body || '', contentType);
          const targetTab = state.openRequestTabs.find((tab) => tab.id === requestTabId);
          if (targetTab) {
            targetTab.snapshot = cloneSnapshot({
              ...targetTab.snapshot,
              response: result,
              responseBody,
              responseTab: 'body'
            });
          }
          if (state.activeOpenTabId === requestTabId) {
            state.response = cloneResponse(result);
            state.responseBody = responseBody;
            state.responseTab = 'body';
            if (result.error) showError(result.error);
          }
        } catch (error) {
          if (state.activeOpenTabId === requestTabId) {
            showError(error instanceof Error ? error.message : '请求失败');
          }
        } finally {
          state.isSending = false;
          const sendButton = $('send');
          if (sendButton) {
            sendButton.disabled = false;
            sendButton.textContent = '发送';
          }
          renderAll();
        }
      }

      function isSameRequest(left, right) {
        return left.method === right.method && left.url === right.url && left.requestBody === right.requestBody && left.bodyType === right.bodyType && left.useCookieJar === right.useCookieJar;
      }

      function showError(message) {
        $('requestError').hidden = !message;
        $('requestError').textContent = message || '';
      }

      function showToast(message) {
        $('toast').textContent = message;
        $('toast').hidden = false;
        clearTimeout(showToast.timer);
        showToast.timer = setTimeout(() => { $('toast').hidden = true; }, 1600);
      }

      function updatePaneLayout() {
        const workspace = document.querySelector('.http-client-workspace');
        if (workspace) workspace.style.setProperty('--request-pane-width', `${state.paneRequestPercent}%`);
      }

      function startSidebarResize(event) {
        if (!state.sidebarOpen) return;
        const sidebar = $('sidebar');
        if (!sidebar) return;
        event.preventDefault();
        const startX = event.clientX;
        const startWidth = state.sidebarWidth;
        const onMove = (moveEvent) => {
          state.sidebarWidth = Math.min(520, Math.max(260, startWidth + moveEvent.clientX - startX));
          sidebar.style.setProperty('--sidebar-width', `${state.sidebarWidth}px`);
        };
        const onUp = () => {
          document.body.classList.remove('http-client-resizing');
          sidebar.classList.remove('resizing');
          window.removeEventListener('pointermove', onMove);
          window.removeEventListener('pointerup', onUp);
        };
        document.body.classList.add('http-client-resizing');
        sidebar.classList.add('resizing');
        window.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onUp, { once: true });
      }

      function startPaneResize(event) {
        const workspace = document.querySelector('.http-client-workspace');
        if (!workspace) return;
        event.preventDefault();
        const resizer = $('paneResizer');
        const rect = workspace.getBoundingClientRect();
        const onMove = (moveEvent) => {
          const percent = ((moveEvent.clientX - rect.left) / rect.width) * 100;
          state.paneRequestPercent = Math.min(72, Math.max(28, percent));
          updatePaneLayout();
        };
        const onUp = () => {
          document.body.classList.remove('http-client-resizing');
          resizer.classList.remove('dragging');
          window.removeEventListener('pointermove', onMove);
          window.removeEventListener('pointerup', onUp);
        };
        document.body.classList.add('http-client-resizing');
        resizer.classList.add('dragging');
        window.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onUp, { once: true });
      }

      async function copyText(text, message) {
        if (!text) return;
        await pluginConnect;
        const activeApi = syncPluginApi();
        if (!activeApi) return;
        try {
          await activeApi.copyText(text);
        } catch {
          await api.copyText(text);
        }
        showToast(message || '已复制');
      }

      function openDialog(dialog) {
        state.dialog = dialog;
        const isDelete = dialog.type === 'deleteGroup' || dialog.type === 'deleteRequest' || dialog.type === 'deleteEnvironment';
        const isMessage = ['deleteGroup', 'deleteRequest', 'deleteEnvironment', 'closeDirtyTab', 'closeDirtyTabs'].includes(dialog.type);
        const titles = {
          addGroup: '新增分组',
          closeDirtyTab: '关闭请求',
          closeDirtyTabs: '关闭请求',
          deleteEnvironment: '删除环境',
          deleteGroup: '删除分组',
          deleteRequest: '删除请求',
          renameEnvironment: '重命名环境',
          renameGroup: '重命名分组',
          renameRequest: '重命名请求'
        };
        $('dialogTitle').textContent = titles[dialog.type] || '';
        $('dialogConfirm').textContent = isDelete ? '删除' : ['closeDirtyTab', 'closeDirtyTabs'].includes(dialog.type) ? '关闭' : '确定';
        $('dialogConfirm').classList.toggle('danger', isDelete);
        $('dialogBody').innerHTML = isMessage
          ? `<p class="http-client-dialog-message">${
              dialog.type === 'deleteGroup'
                ? `确定删除「${escapeHtml(dialog.initialName)}」及其所有请求？此操作不可恢复。`
                : dialog.type === 'deleteRequest'
                  ? `确定删除请求「${escapeHtml(dialog.initialName)}」？此操作不可恢复。`
                  : dialog.type === 'deleteEnvironment'
                    ? `确定删除环境「${escapeHtml(dialog.initialName)}」及其所有变量？此操作不可恢复。`
                    : dialog.type === 'closeDirtyTabs'
                      ? `将关闭「${escapeHtml(dialog.initialName)}」中未保存的内容，确定关闭？`
                      : `请求「${escapeHtml(dialog.initialName)}」有未保存内容，确定关闭？`
            }</p>`
          : `<label class="http-client-dialog-field"><span>${
              dialog.type === 'renameRequest'
                ? '请求名称'
                : dialog.type === 'renameEnvironment'
                  ? '环境名称'
                  : '分组名称'
            }</span><input id="dialogInput" class="http-client-dialog-input" type="text" value="${escapeAttr(dialog.initialName || '')}" /></label>`;
        $('dialogBackdrop').hidden = false;
        setTimeout(() => {
          const input = $('dialogInput');
          if (input) {
            input.focus();
            input.select();
          }
        }, 0);
      }

      function closeDialog() {
        state.dialog = null;
        $('dialogBackdrop').hidden = true;
      }

      function confirmDialog() {
        const dialog = state.dialog;
        if (!dialog) return;
        if (dialog.type === 'deleteGroup') {
          if (state.collections.groups.length > 1) {
            const removedGroup = state.collections.groups.find((group) => group.id === dialog.groupId);
            const removedRequestIds = new Set((removedGroup?.requests || []).map((request) => request.id));
            state.collections.groups = state.collections.groups.filter((group) => group.id !== dialog.groupId);
            if (state.collections.activeGroupId === dialog.groupId) state.collections.activeGroupId = state.collections.groups[0].id;
            if (!state.collections.groups.some((group) => group.requests.some((request) => request.id === state.collections.activeRequestId))) {
              state.collections.activeRequestId = '';
            }
            state.openRequestTabs = state.openRequestTabs.filter((tab) => tab.type !== 'saved' || !removedRequestIds.has(tab.requestId));
            if (!state.openRequestTabs.some((tab) => tab.id === state.activeOpenTabId)) {
              const nextTab = state.openRequestTabs[0] || createScratchOpenTab();
              if (!state.openRequestTabs.length) state.openRequestTabs = [nextTab];
              state.activeOpenTabId = nextTab.id;
              state.collections.activeRequestId = nextTab.type === 'saved' ? nextTab.requestId : '';
              restoreSnapshot(nextTab.snapshot, false);
            }
            persistCollections();
          }
          closeDialog();
          renderAll();
          return;
        }
        if (dialog.type === 'deleteRequest') {
          removeSavedRequest(dialog.groupId, dialog.requestId);
          closeDialog();
          return;
        }
        if (dialog.type === 'deleteEnvironment') {
          if (state.environments.length > 1) {
            state.environments = state.environments.filter((environment) => environment.id !== dialog.envId);
            if (state.activeEnvId === dialog.envId) {
              state.activeEnvId = state.environments[0].id;
              syncEnvRows();
            }
            persistEnvironments();
          }
          closeDialog();
          renderEnvironmentPanel();
          return;
        }
        if (dialog.type === 'closeDirtyTab') {
          forceCloseOpenRequestTab(dialog.tabId);
          closeDialog();
          return;
        }
        if (dialog.type === 'closeDirtyTabs') {
          closeOpenRequestTabs(dialog.tabIds || [], false);
          closeDialog();
          return;
        }
        const input = $('dialogInput');
        const name = input ? input.value.trim() : '';
        if (!name) {
          closeDialog();
          return;
        }
        if (dialog.type === 'addGroup') {
          const group = createCollectionGroup(name);
          state.collections.groups.push(group);
          state.collections.activeGroupId = group.id;
        }
        if (dialog.type === 'renameGroup') {
          state.collections.groups = state.collections.groups.map((group) => group.id === dialog.groupId ? { ...group, name } : group);
        }
        if (dialog.type === 'renameRequest') {
          state.collections.groups = state.collections.groups.map((group) => group.id === dialog.groupId
            ? { ...group, requests: group.requests.map((request) => request.id === dialog.requestId ? { ...request, name, updatedAt: Date.now() } : request) }
            : group);
          state.openRequestTabs.forEach((tab) => {
            if (tab.type === 'saved' && tab.requestId === dialog.requestId) tab.name = name;
          });
        }
        if (dialog.type === 'renameEnvironment') {
          const environment = state.environments.find((item) => item.id === dialog.envId);
          if (environment) {
            environment.name = name;
            persistEnvironments();
          }
          closeDialog();
          renderEnvironmentPanel();
          return;
        }
        persistCollections();
        closeDialog();
        renderAll();
      }

      function formatHistoryTime(timestamp) {
        const date = new Date(timestamp);
        return `${date.toLocaleDateString()} ${date.toLocaleTimeString()}`;
      }

      function escapeHtml(value) {
        return String(value ?? '').replace(/[&<>"']/g, (char) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[char]);
      }

      function escapeAttr(value) {
        return escapeHtml(value).replace(/`/g, '&#96;');
      }

      window.addEventListener('beforeunload', () => {
        if (!state.storageReady) return;
        clearTimeout(schedulePersistOpenTabs.timer);
        persistOpenTabs();
      });

      document.addEventListener('pointerdown', (event) => {
        const menu = $('tabContextMenu');
        if (menu && !menu.hidden && !menu.contains(event.target)) closeTabContextMenu();
        const collectionMenu = $('collectionContextMenu');
        if (collectionMenu && !collectionMenu.hidden && !collectionMenu.contains(event.target)) closeCollectionContextMenu();
        const requestMenu = $('requestContextMenu');
        if (requestMenu && !requestMenu.hidden && !requestMenu.contains(event.target)) closeRequestContextMenu();
        const methodPicker = $('methodPicker');
        if (methodPicker && !methodPicker.contains(event.target) && state.methodMenuOpen) {
          state.methodMenuOpen = false;
          renderMethod();
        }
      });

      $('methodTrigger').addEventListener('click', () => {
        state.methodMenuOpen = !state.methodMenuOpen;
        renderMethod();
      });
      $('url').addEventListener('input', (event) => {
        state.url = event.target.value;
        markActiveRequestChanged();
      });
      $('url').addEventListener('keydown', (event) => {
        if (event.key === 'Enter' && (event.ctrlKey || event.metaKey)) {
          event.preventDefault();
          sendRequest();
        }
      });
      $('send').addEventListener('click', sendRequest);
      $('saveRequest').addEventListener('click', saveCurrentToCollection);
      $('newEmptyRequest').addEventListener('click', createNewRequestTab);
      $('tabParams').addEventListener('click', () => { state.requestTab = 'params'; renderRequestTabs(); renderRequestPanel(); renderOpenRequestTabs(); });
      $('tabHeaders').addEventListener('click', () => { state.requestTab = 'headers'; renderRequestTabs(); renderRequestPanel(); renderOpenRequestTabs(); });
      $('tabCookies').addEventListener('click', () => { state.requestTab = 'cookies'; renderRequestTabs(); renderRequestPanel(); renderOpenRequestTabs(); });
      $('tabBody').addEventListener('click', () => { state.requestTab = 'body'; renderRequestTabs(); renderRequestPanel(); renderOpenRequestTabs(); });
      $('responseBodyTab').addEventListener('click', () => { state.responseTab = 'body'; renderResponse(); });
      $('responseHeadersTab').addEventListener('click', () => { state.responseTab = 'headers'; renderResponse(); });
      $('sidebarResizer').addEventListener('pointerdown', startSidebarResize);
      $('paneResizer').addEventListener('pointerdown', startPaneResize);
      $('navCollections').addEventListener('click', () => toggleSidebarPanel('collections'));
      $('navEnvironment').addEventListener('click', () => toggleSidebarPanel('environment'));
      $('navHistory').addEventListener('click', () => toggleSidebarPanel('history'));
      $('dialogClose').addEventListener('click', closeDialog);
      $('dialogCancel').addEventListener('click', closeDialog);
      $('dialogConfirm').addEventListener('click', confirmDialog);
      $('tabContextMenu').addEventListener('click', (event) => {
        const action = event.target instanceof HTMLElement ? event.target.dataset.action : '';
        if (action) handleTabContextMenuAction(action);
      });
      $('collectionContextMenu').addEventListener('click', (event) => {
        const action = event.target instanceof HTMLElement ? event.target.dataset.action : '';
        if (action) handleCollectionContextMenuAction(action);
      });
      $('requestContextMenu').addEventListener('click', (event) => {
        const action = event.target instanceof HTMLElement ? event.target.dataset.action : '';
        if (action) handleRequestContextMenuAction(action);
      });
      $('collectionImportFile').addEventListener('change', (event) => {
        const file = event.target.files && event.target.files[0];
        void importCollectionsFromFile(file);
      });
      document.addEventListener('keydown', (event) => {
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 's') {
          event.preventDefault();
          if ($('dialogBackdrop').hidden) saveCurrentToCollection();
          return;
        }
        if (event.key === 'Escape') {
          closeTabContextMenu();
          closeCollectionContextMenu();
          closeRequestContextMenu();
        }
        if ($('dialogBackdrop').hidden) return;
        if (event.key === 'Escape') closeDialog();
        if (event.key === 'Enter' && $('dialogInput')) confirmDialog();
      });

      function toggleSidebarPanel(panel) {
        if (state.sidebarPanel === panel && state.sidebarOpen) {
          state.sidebarOpen = false;
        } else {
          state.sidebarPanel = panel;
          state.sidebarOpen = true;
        }
        renderSidebar();
      }

      async function init() {
        if (storageLoadPromise) {
          await storageLoadPromise;
          return;
        }

        renderAll();

        storageLoadPromise = (async () => {
          await loadState();
          if (!state.openTabsLoadedFromStorage) ensureOpenRequestTabs();
          updatePaneLayout();
          renderAll();
        })();

        try {
          await storageLoadPromise;
        } finally {
          storageLoadPromise = null;
        }
      }

      (function bootPluginHost() {
        if (typeof TooldeskPlugin === 'undefined') {
          if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', bootPluginHost, { once: true });
            window.addEventListener('load', bootPluginHost, { once: true });
            return;
          }
          return;
        }

        function startPlugin() {
          const plugin = TooldeskPlugin.create({
            id: 'tooldesk-http-client',
            capabilities: ['copyText', 'getPluginStorageItem', 'sendHttpRequest', 'setPluginStorageItem'],
            onLaunchContext(context) {
              const content = typeof context?.content === 'string' ? context.content.trim() : '';
              if (!/^https?:\/\//i.test(content)) {
                return;
              }

              state.url = content;
              $('url').value = content;
              syncActiveOpenTabSnapshot();
              renderOpenRequestTabs();
            }
          });
          pluginBoot = { api: plugin.api };
          syncPluginApi();
          pluginConnect = plugin.connect().then((result) => {
            syncPluginApi();
            if (result && result.ready === false) {
              return init();
            }
            return init();
          });
          void pluginConnect;
        }

        startPlugin();
      })();
    </script>
</html>
