<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTTP 请求</title>
    <style>
* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body {
  background: #eef3f8;
  color: #111827;
  font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
  font-size: 13px;
}
button, input, select, textarea { font: inherit; }
button { border: 0; cursor: pointer; }
button:disabled { cursor: not-allowed; opacity: .62; }
[hidden] { display: none !important; }
.tool-content { height: 100%; min-height: 0; }
.field > span { color: #64748b; font-size: 12px; font-weight: 800; }
.tool-primary-button { background: #2563eb; color: #fff; }
.app-icon { display: inline-flex; align-items: center; justify-content: center; }
.app-icon svg { display: block; height: 100%; width: 100%; }



.workspace:has(.http-client) {
  min-height: 0;
  overflow: hidden;
}

.workspace-content:has(.http-client) {
  box-sizing: border-box;
  display: flex;
  flex: 1;
  flex-direction: column;
  min-height: 0;
}

.workspace-content:has(.http-client) .tool-detail,
.workspace-content:has(.http-client) .tool-panel-fill {
  flex: 1;
  min-height: 0;
}

.tool-panel-fill .tool-content.http-client {
  background: #eef3f8;
  display: flex;
  flex: 1;
  gap: 12px;
  min-height: 0;
  padding: 12px;
  position: relative;
}

.http-client-main {
  display: flex;
  flex: 1;
  flex-direction: column;
  gap: 12px;
  min-height: 0;
  min-width: 0;
}

.http-client-main.no-open-tabs .http-client-composer,
.http-client-main.no-open-tabs .http-client-workspace {
  display: none;
}

.http-client-main.no-open-tabs .http-client-empty-state {
  display: flex;
}

.http-client-empty-state {
  align-items: center;
  background: #ffffff;
  border: 1px solid #dbe4ef;
  border-radius: 10px;
  box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
  color: #64748b;
  display: none;
  flex: 1;
  flex-direction: column;
  justify-content: center;
  min-height: 0;
  padding: 24px;
  text-align: center;
}

.http-client-empty-state strong {
  color: #334155;
  font-size: 14px;
  margin-bottom: 6px;
}

.http-client-empty-state p {
  font-size: 12px;
  margin: 0 0 14px;
}

.http-client-empty-state button {
  background: #2563eb;
  border-radius: 7px;
  color: #ffffff;
  font-size: 12px;
  font-weight: 800;
  height: 34px;
  padding: 0 14px;
}

.http-client-sidebar {
  background: #ffffff;
  border: 1px solid #dbe4ef;
  border-radius: 10px;
  box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
  display: flex;
  flex-shrink: 0;
  min-height: 0;
  overflow: hidden;
  position: relative;
  transition: width 0.18s ease;
  width: var(--sidebar-width, 328px);
}

.http-client-sidebar.collapsed {
  width: 44px;
}

.http-client-sidebar.collapsed .http-client-side-nav {
  border-right: 0;
}

.http-client-sidebar.collapsed .http-client-sidebar-resizer {
  display: none;
}

.http-client-sidebar.resizing {
  transition: none;
}

.http-client-sidebar-resizer {
  bottom: 0;
  cursor: col-resize;
  position: absolute;
  right: 0;
  top: 0;
  width: 8px;
  z-index: 20;
}

.http-client-sidebar-resizer::after {
  background: transparent;
  border-radius: 999px;
  bottom: 8px;
  content: '';
  position: absolute;
  right: 2px;
  top: 8px;
  transition: background 0.12s ease;
  width: 2px;
}

.http-client-sidebar-resizer:hover::after,
.http-client-sidebar.resizing .http-client-sidebar-resizer::after {
  background: #93c5fd;
}

.http-client-side-nav {
  background: #f8fafc;
  border-right: 1px solid #e5e7eb;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  gap: 4px;
  padding: 8px 4px;
  width: 44px;
}

.http-client-side-nav-item {
  align-items: center;
  background: transparent;
  border: 0;
  border-radius: 8px;
  color: #64748b;
  display: inline-flex;
  height: 40px;
  justify-content: center;
  padding: 0;
  position: relative;
  width: 36px;
}

.http-client-side-nav-item .app-icon {
  height: 18px;
  width: 18px;
}

.http-client-side-nav-item svg {
  stroke-width: 2.2;
}

.http-client-side-nav-item:hover {
  background: #f1f5f9;
  color: #334155;
}

.http-client-side-nav-item.active {
  background: #eff6ff;
  color: #2563eb;
}

.http-client-side-panel {
  display: flex;
  flex: 1;
  flex-direction: column;
  min-height: 0;
  min-width: 0;
}

.http-client-side-panel-head,
.http-client-collections-head {
  align-items: center;
  border-bottom: 1px solid #e5e7eb;
  display: flex;
  flex-shrink: 0;
  gap: 8px;
  justify-content: space-between;
  min-height: 44px;
  padding: 0 12px;
}

.http-client-side-panel-head strong,
.http-client-collections-head strong {
  color: #111827;
  font-size: 13px;
  font-weight: 800;
}

.http-client-side-env-picker {
  border-bottom: 1px solid #eef2f7;
  display: grid;
  flex-shrink: 0;
  gap: 6px;
  padding: 10px 12px;
}

.http-client-side-env-picker label {
  color: #64748b;
  font-size: 11px;
  font-weight: 700;
}

.http-client-side-env-picker .http-client-env-select {
  max-width: none;
  width: 100%;
}

.http-client-side-env-body {
  flex: 1;
  min-height: 0;
}

.http-client-env-list {
  border-bottom: 1px solid #eef2f7;
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 8px;
}

.http-client-env-item {
  align-items: center;
  background: transparent;
  border: 0;
  border-radius: 8px;
  color: inherit;
  cursor: pointer;
  display: grid;
  gap: 6px;
  grid-template-columns: 24px minmax(0, 1fr) auto;
  min-height: 34px;
  padding: 2px 4px;
  text-align: left;
  width: 100%;
}

.http-client-env-item:hover,
.http-client-env-item.active {
  background: #eff6ff;
}

.http-client-env-icon {
  align-items: center;
  color: #64748b;
  display: inline-flex;
  height: 24px;
  justify-content: center;
  width: 24px;
}

.http-client-env-icon .app-icon {
  height: 14px;
  width: 14px;
}

.http-client-env-main {
  align-items: center;
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}

.http-client-env-name {
  color: #111827;
  font-size: 12px;
  font-weight: 700;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  width: 100%;
}

.http-client-env-meta {
  color: #94a3b8;
  font-size: 11px;
  font-weight: 600;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  width: 100%;
}

.http-client-env-actions {
  align-items: center;
  display: inline-flex;
  gap: 2px;
  opacity: 0;
  transition: opacity 0.15s ease;
}

.http-client-env-item:hover .http-client-env-actions,
.http-client-env-item.active .http-client-env-actions {
  opacity: 1;
}

.http-client-env-actions button {
  align-items: center;
  background: transparent;
  border: 0;
  border-radius: 4px;
  color: #64748b;
  display: inline-flex;
  font-size: 12px;
  height: 22px;
  justify-content: center;
  min-height: 22px;
  padding: 0;
  width: 22px;
}

.http-client-env-actions button:hover:not(:disabled) {
  background: #ffffff;
  color: #2563eb;
}

.http-client-env-actions button.danger:hover:not(:disabled) {
  background: #fee2e2;
  color: #dc2626;
}

.http-client-env-actions button:disabled {
  cursor: not-allowed;
  opacity: 0.35;
}

.http-client-side-history-list {
  display: flex;
  flex: 1;
  flex-direction: column;
  min-height: 0;
  overflow-y: auto;
  scrollbar-width: thin;
}

.http-client-side-history-list::-webkit-scrollbar {
  height: 6px;
  width: 6px;
}

.http-client-side-history-list::-webkit-scrollbar-thumb {
  background: #cbd5e1;
  border-radius: 999px;
}

.http-client-side-history-list::-webkit-scrollbar-thumb:hover {
  background: #94a3b8;
}

.http-client-collections-add,
.http-client-collections-action {
  align-items: center;
  background: #eff6ff;
  border: 1px solid #bfdbfe;
  border-radius: 6px;
  color: #2563eb;
  display: inline-flex;
  flex-shrink: 0;
  height: 28px;
  justify-content: center;
  padding: 0;
  width: 28px;
}

.http-client-collections-actions {
  align-items: center;
  display: inline-flex;
  flex-shrink: 0;
  gap: 4px;
}

.http-client-collections-action:hover,
.http-client-collections-add:hover {
  background: #dbeafe;
}

.http-client-collections-action .app-icon,
.http-client-collections-add .app-icon {
  height: 14px;
  width: 14px;
}

.http-client-inline-name-form {
  align-items: center;
  display: inline-flex;
  flex: 1;
  gap: 4px;
  justify-content: flex-end;
  max-width: 160px;
  min-width: 0;
}

.http-client-inline-name-input {
  background: #ffffff;
  border: 1px solid #bfdbfe;
  border-radius: 6px;
  color: #111827;
  flex: 1;
  font-size: 12px;
  height: 28px;
  min-width: 0;
  outline: none;
  padding: 0 8px;
}

.http-client-inline-name-input:focus {
  border-color: #93c5fd;
  box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.12);
}

.http-client-inline-name-ok,
.http-client-inline-name-cancel {
  align-items: center;
  background: #ffffff;
  border: 1px solid #e2e8f0;
  border-radius: 6px;
  color: #64748b;
  display: inline-flex;
  flex-shrink: 0;
  font-size: 12px;
  height: 28px;
  justify-content: center;
  padding: 0;
  width: 28px;
}

.http-client-inline-name-ok {
  border-color: #bfdbfe;
  color: #2563eb;
}

.http-client-inline-name-ok:hover {
  background: #eff6ff;
}

.http-client-collections-search {
  align-items: center;
  border-bottom: 1px solid #eef2f7;
  color: #94a3b8;
  display: flex;
  flex-shrink: 0;
  gap: 8px;
  padding: 10px 12px;
}

.http-client-collections-search .app-icon {
  flex-shrink: 0;
  height: 14px;
  width: 14px;
}

.http-client-collections-search input {
  appearance: none;
  background: transparent;
  border: 0;
  box-shadow: none;
  color: #111827;
  flex: 1;
  font-size: 12px;
  min-height: 24px;
  outline: none;
  padding: 0;
}

.http-client-collections-search input:focus,
.http-client-collections-search input:focus-visible {
  border: 0;
  box-shadow: none;
  outline: none;
}

.http-client-collections-search input::-webkit-search-cancel-button,
.http-client-collections-search input::-webkit-search-decoration,
.http-client-collections-search input::-webkit-search-results-button,
.http-client-collections-search input::-webkit-search-results-decoration {
  appearance: none;
  display: none;
}

.http-client-collections-list {
  display: flex;
  flex: 1;
  flex-direction: column;
  gap: 4px;
  min-height: 0;
  overflow: auto;
  padding: 8px;
  scrollbar-width: thin;
}

.http-client-collections-list::-webkit-scrollbar {
  height: 6px;
  width: 6px;
}

.http-client-collections-list::-webkit-scrollbar-thumb {
  background: #cbd5e1;
  border-radius: 999px;
}

.http-client-collection-group {
  border-radius: 8px;
}

.http-client-collection-group.drag-over > .http-client-collection-group-head {
  background: #eff6ff;
  box-shadow: inset 0 0 0 1px #93c5fd;
}

.http-client-collection-group.group-drag-over > .http-client-collection-group-head {
  background: #f0fdf4;
  box-shadow: inset 0 0 0 1px #86efac;
}

.http-client-collection-group.active > .http-client-collection-group-head {
  background: #f8fafc;
}

.http-client-collection-group-head {
  align-items: center;
  border-radius: 8px;
  display: grid;
  gap: 4px;
  grid-template-columns: 24px minmax(0, 1fr) auto;
  min-height: 34px;
  padding: 2px 4px;
}

.http-client-collection-group-head:hover {
  background: #f8fafc;
}

.http-client-collection-group-head.dragging {
  opacity: 0.58;
}

.http-client-collection-toggle,
.http-client-collection-group-main {
  align-items: center;
  background: transparent;
  border: 0;
  color: #475569;
  display: inline-flex;
  min-height: 28px;
  padding: 0;
}

.http-client-collection-toggle {
  justify-content: center;
  width: 24px;
}

.http-client-collection-toggle .app-icon {
  height: 14px;
  transition: transform 0.15s ease;
  width: 14px;
}

.http-client-collection-toggle .app-icon.collapsed {
  transform: rotate(-90deg);
}

.http-client-collection-group-main {
  gap: 6px;
  justify-content: flex-start;
  min-width: 0;
  text-align: left;
}

.http-client-collection-group-main .app-icon {
  color: #64748b;
  flex-shrink: 0;
  height: 14px;
  width: 14px;
}

.http-client-collection-group-name {
  color: #111827;
  flex: 1;
  font-size: 12px;
  font-weight: 700;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.http-client-collection-group-edit {
  align-items: center;
  display: flex;
  gap: 4px;
  min-width: 0;
}

.http-client-collection-group-edit .http-client-inline-name-input {
  flex: 1;
  min-width: 0;
}

.http-client-delete-hint {
  color: #dc2626;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
}

.http-client-collection-group-actions {
  align-items: center;
  display: inline-flex;
  gap: 2px;
  opacity: 0;
  transition: opacity 0.15s ease;
}

.http-client-collection-group-head:hover .http-client-collection-group-actions,
.http-client-collection-group.active .http-client-collection-group-actions {
  opacity: 1;
}

.http-client-collection-group-actions button {
  align-items: center;
  background: transparent;
  border: 0;
  border-radius: 4px;
  color: #64748b;
  display: inline-flex;
  font-size: 12px;
  height: 22px;
  justify-content: center;
  min-height: 22px;
  padding: 0;
  width: 22px;
}

.http-client-collection-group-actions button:hover:not(:disabled) {
  background: #eff6ff;
  color: #2563eb;
}

.http-client-collection-group-actions button:disabled {
  cursor: not-allowed;
  opacity: 0.35;
}

.http-client-collection-requests {
  display: grid;
  gap: 2px;
  min-width: 0;
  padding: 0 4px 6px 28px;
}

.http-client-collection-request {
  align-items: center;
  background: transparent;
  border: 0;
  border-radius: 6px;
  color: inherit;
  cursor: pointer;
  display: grid;
  gap: 8px;
  grid-template-columns: auto minmax(0, 1fr) auto;
  min-height: 30px;
  min-width: 0;
  overflow: hidden;
  padding: 4px 6px;
  text-align: left;
}

.http-client-collection-request:hover,
.http-client-collection-request.active {
  background: #eff6ff;
}

.http-client-collection-request.dragging {
  opacity: 0.48;
}

.http-client-collection-request-main {
  background: transparent;
  border: 0;
  color: inherit;
  cursor: pointer;
  display: block;
  min-width: 0;
  overflow: hidden;
  padding: 0;
  text-align: left;
  width: 100%;
}

.http-client-collection-request-edit {
  align-items: center;
  display: flex;
  gap: 4px;
  min-width: 0;
}

.http-client-collection-request-edit .http-client-inline-name-input {
  flex: 1;
  min-width: 0;
}

.http-client-collection-method {
  border-radius: 4px;
  cursor: pointer;
  flex-shrink: 0;
  font-size: 10px;
  font-weight: 800;
  line-height: 1;
  min-width: 42px;
  padding: 4px 6px;
  text-align: center;
}

.http-client-collection-request-name {
  color: #334155;
  display: block;
  font-size: 12px;
  font-weight: 600;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.http-client-collection-request-actions {
  align-items: center;
  color: #94a3b8;
  display: inline-flex;
  flex-shrink: 0;
  font-size: 12px;
  gap: 4px;
  opacity: 0;
}

.http-client-collection-request:hover .http-client-collection-request-actions,
.http-client-collection-request.active .http-client-collection-request-actions {
  opacity: 1;
}

.http-client-collection-request-actions button {
  align-items: center;
  background: transparent;
  border: 0;
  border-radius: 4px;
  color: #94a3b8;
  cursor: pointer;
  display: inline-flex;
  font-size: 12px;
  height: 22px;
  justify-content: center;
  min-height: 22px;
  padding: 0;
  width: 22px;
}

.http-client-collection-request-actions button:hover {
  background: #ffffff;
  color: #dc2626;
}

.http-client-collections-empty {
  color: #94a3b8;
  font-size: 11px;
  margin: 0;
  padding: 8px 6px;
  text-align: left;
}

.http-client-composer {
  background: #ffffff;
  border: 1px solid #dbe4ef;
  border-radius: 10px;
  box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
  display: grid;
  gap: 8px;
  padding: 8px 12px 10px;
}

.http-client-open-tabs {
  align-items: end;
  border-bottom: 1px solid #e5e7eb;
  display: flex;
  gap: 4px;
  min-height: 32px;
  min-width: 0;
  overflow-x: auto;
  overflow-y: hidden;
  padding-left: 2px;
  scrollbar-width: thin;
}

.http-client-open-tabs::-webkit-scrollbar {
  height: 5px;
}

.http-client-open-tabs::-webkit-scrollbar-thumb {
  background: #cbd5e1;
  border-radius: 999px;
}

.http-client-open-tab {
  align-items: center;
  background: #f1f5f9;
  border: 1px solid #dbe4ef;
  border-bottom: 0;
  border-radius: 7px 7px 0 0;
  color: #64748b;
  display: inline-grid;
  flex: 0 0 auto;
  gap: 6px;
  grid-template-columns: auto minmax(0, 1fr) auto auto;
  height: 30px;
  max-width: 210px;
  min-width: 118px;
  padding: 0 7px 0 8px;
  transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease;
}

.http-client-open-tab.active {
  background: #edf3ff;
  border: 1px solid #93c5fd;
  border-bottom: 1px solid #edf3ff;
  border-top: 2px solid #2563eb;
  box-shadow: none;
  color: #1e3a8a;
  margin-bottom: -1px;
  position: relative;
  z-index: 1;
}

.http-client-open-tab:hover:not(.active) {
  background: #eef3f8;
  border-color: #cbd5e1;
  color: #334155;
}

.http-client-open-tab.active .http-client-open-tab-title {
  color: #1d4ed8;
  font-weight: 800;
}

.http-client-open-tab.active .http-client-open-tab-close {
  color: #64748b;
}

.http-client-open-tab.active .http-client-open-tab-close:hover {
  background: #dbeafe;
  color: #1d4ed8;
}

.http-client-open-tab-method {
  border-radius: 4px;
  font-size: 10px;
  font-weight: 900;
  line-height: 1;
  padding: 3px 4px;
}

.http-client-open-tab-title {
  font-size: 12px;
  font-weight: 700;
  overflow: hidden;
  text-align: left;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.http-client-open-tab-dirty {
  background: #2563eb;
  border-radius: 999px;
  height: 6px;
  opacity: 0;
  width: 6px;
}

.http-client-open-tab.dirty .http-client-open-tab-dirty {
  opacity: 1;
}

.http-client-open-tab-close {
  align-items: center;
  background: transparent;
  border: 0;
  border-radius: 4px;
  color: #94a3b8;
  display: inline-flex;
  font-size: 14px;
  height: 18px;
  justify-content: center;
  padding: 0;
  width: 18px;
}

.http-client-open-tab-close:hover {
  background: #eef2f7;
  color: #334155;
}

.http-client-tab-menu {
  background: #ffffff;
  border: 1px solid #dbe4ef;
  border-radius: 8px;
  box-shadow: 0 10px 28px rgba(15, 23, 42, 0.16);
  display: grid;
  gap: 2px;
  min-width: 128px;
  padding: 4px;
  position: absolute;
  z-index: 120;
}

.http-client-tab-menu button {
  background: transparent;
  border: 0;
  border-radius: 6px;
  color: #334155;
  font-size: 12px;
  font-weight: 700;
  height: 30px;
  padding: 0 10px;
  text-align: left;
}

<script>
const STORAGE = {
        collections: 'tooldesk-http-collections',
        cookies: 'tooldesk-http-cookies',
        environments: 'tooldesk-http-environments',
        history: 'tooldesk-http-history',
        openTabs: 'tooldesk-http-open-tabs'
      };
      const HTTP_METHODS = ['GET', 'POST', 'PUT', 'PATCH', 'DELETE', 'HEAD', 'OPTIONS'];
      const METHODS_WITH_BODY = new Set(['POST', 'PUT', 'PATCH', 'DELETE']);
      const MAX_HISTORY = 50;
      const $ = (id) => document.getElementById(id);

      const state = {
        activeEnvId: '',
        bodyType: 'json',
        collectionSearch: '',
        collectionContextMenu: null,
        collections: null,
        cookieJar: [],
        cookieRows: [createRow()],
        dialog: null,
        draggingRequest: null,
        dragPointer: null,
        dragOverGroupId: '',
        groupDragOverId: '',
        groupDragPointer: null,
        environments: [],
        envRows: [],
        headerRows: [createRow({ key: 'Accept', value: '*/*' }), createRow()],
        history: [],
        isSending: false,
        method: 'GET',
        methodMenuOpen: false,
        activeOpenTabId: '',
        openRequestTabs: [],
        openTabsLoadedFromStorage: false,
        paneRequestPercent: 50,
        queryRows: [createRow()],
        requestBody: '{\n  \n}',
        requestTab: 'params',
        response: null,
        responseBody: '',
        responseTab: 'body',
        sidebarOpen: true,
        sidebarPanel: 'collections',
        sidebarWidth: 328,
        storageReady: false,
        tabContextMenu: null,
        pendingImportGroupId: '',
        requestContextMenu: null,
        url: 'https://',
        useCookieJar: true
      };

      let api = null;
      let pluginBoot = null;
      let pluginConnect = Promise.resolve();
      let storageLoadPromise = null;

      function getActiveApi() {
        if (pluginBoot) {
          api = pluginBoot.api;
        }
        return api;
      }

      function syncPluginApi() {
        return getActiveApi();
      }

      function ensureStorageApi() {
        syncPluginApi();
        return getActiveApi();
      }

      function safeParseStorageJson(raw, fallback) {
        if (!raw) {
          return fallback;
        }

        try {
          return JSON.parse(raw);
        } catch {
          try {
            const cleaned = raw.replace(/[\x00-\x1f]/g, (ch) => {
              if (ch === '\n') return '\\n';
              if (ch === '\r') return '\\r';
              if (ch === '\t') return '\\t';
              return '';
            });
            return JSON.parse(cleaned);
          } catch {
            return fallback;
          }
        }
      }

      async function readJson(key, fallback, retryCount = 0) {
        const activeApi = ensureStorageApi();
        if (!activeApi) {
          return fallback;
        }

        try {
          const raw = await activeApi.getPluginStorageItem(key);
          return safeParseStorageJson(raw, fallback);
        } catch (error) {
          const shouldRetry = retryCount < 5 && error && typeof error === 'object' && (
            error.code === 'PLUGIN_SDK_NOT_READY' ||
            error.code === 'PLUGIN_API_UNAVAILABLE'
          );

          if (shouldRetry) {
            await new Promise((resolve) => setTimeout(resolve, 30));
            return readJson(key, fallback, retryCount + 1);
          }

          return fallback;
        }
      }

      function writeJson(key, value) {
        if (!state.storageReady) return;
        const activeApi = getActiveApi();
        if (!activeApi) return;
        void activeApi.setPluginStorageItem(key, JSON.stringify(value));
      }

      function normalizeHistoryList(value) {
        const list = Array.isArray(value) ? value : [];
        return list.filter((item) => item && item.id && item.request).slice(0, MAX_HISTORY);
      }

      function createRow(partial = {}) {
        return { enabled: true, id: crypto.randomUUID(), key: '', value: '', ...partial };
      }

      function createCollectionGroup(name, expanded = true) {
        return { expanded, id: crypto.randomUUID(), name, requests: [] };
      }

      function createDefaultCollections() {
        const group = createCollectionGroup('默认分组');
        return { activeGroupId: group.id, activeRequestId: '', groups: [group] };
      }

      state.collections = createDefaultCollections();

      function createEnvironment(name) {
        return { id: crypto.randomUUID(), name, variables: [createRow()] };
      }

      async function loadState() {
        state.storageReady = false;

        state.cookieJar = await readJson(STORAGE.cookies, []);
        state.history = normalizeHistoryList(await readJson(STORAGE.history, []));
        state.collections = normalizeCollections(await readJson(STORAGE.collections, createDefaultCollections()));
        const envState = await readJson(STORAGE.environments, null);
        if (envState && Array.isArray(envState.environments) && envState.environments.length) {
          state.environments = envState.environments.map(normalizeEnvironment);
          state.activeEnvId = state.environments.some((item) => item.id === envState.activeEnvId)
            ? envState.activeEnvId
            : state.environments[0].id;
        } else {
          const environment = createEnvironment('默认环境');
          state.environments = [environment];
          state.activeEnvId = environment.id;
        }
        syncEnvRows();
        const openTabsState = normalizeOpenTabsState(await readJson(STORAGE.openTabs, null));
        if (openTabsState) {
          state.openRequestTabs = openTabsState.tabs;
          state.activeOpenTabId = openTabsState.activeOpenTabId;
          state.openTabsLoadedFromStorage = true;
          const activeTab = getActiveOpenTab();
          restoreSnapshot(activeTab ? activeTab.snapshot : createEmptySnapshot(), false);
          state.collections.activeRequestId = activeTab?.type === 'saved' ? activeTab.requestId : '';
        } else {
          restoreActiveSavedRequest();
        }
        state.storageReady = true;
      }

      function normalizeCollections(collections) {
        const fallback = createDefaultCollections();
        const groups = Array.isArray(collections.groups)
          ? collections.groups.filter((item) => item && item.id && item.name).map((group) => ({
              expanded: group.expanded !== false,
              id: group.id,
              name: group.name,
              requests: Array.isArray(group.requests)
                ? group.requests.filter((item) => item && item.id && item.request).map((request) => ({
                    id: request.id,
                    name: request.name || deriveRequestName(request.request),
                    request: cloneRequestSnapshot(request.request),
                    updatedAt: request.updatedAt || Date.now()
                  }))
                : []
            }))
          : fallback.groups;
        const nextGroups = groups.length ? groups : fallback.groups;
        const activeGroupId = nextGroups.some((item) => item.id === collections.activeGroupId)
          ? collections.activeGroupId
          : nextGroups[0].id;
        const activeRequestId = collections.activeRequestId && nextGroups.some((group) => group.requests.some((request) => request.id === collections.activeRequestId))
          ? collections.activeRequestId
          : '';
        return { activeGroupId, activeRequestId, groups: nextGroups };
      }

      function normalizeEnvironment(environment) {
        return {
          id: environment.id || crypto.randomUUID(),
          name: environment.name || '默认环境',
          variables: Array.isArray(environment.variables) && environment.variables.length
            ? environment.variables.map((row) => createRow({ enabled: row.enabled !== false, id: row.id || crypto.randomUUID(), key: row.key || '', value: row.value || '' }))
            : [createRow()]
        };
      }

      function persistCollections() {
        writeJson(STORAGE.collections, {
          ...state.collections,
          groups: state.collections.groups.map((group) => ({
            ...group,
            requests: group.requests.map((request) => ({
              ...request,
              request: cloneRequestSnapshot(request.request)
            }))
          }))
        });
      }

      function persistEnvironments() {
        const active = state.environments.find((item) => item.id === state.activeEnvId);
        if (active) active.variables = state.envRows.map((row) => ({ ...row }));
        writeJson(STORAGE.environments, { activeEnvId: state.activeEnvId, environments: state.environments });
      }

      function persistHistory() {
        writeJson(STORAGE.history, state.history.slice(0, MAX_HISTORY));
      }

      function persistCookies() {
        writeJson(STORAGE.cookies, state.cookieJar);
      }

      function serializeOpenTabs() {
        syncActiveOpenTabSnapshot();
        return {
          activeOpenTabId: state.activeOpenTabId,
          tabs: state.openRequestTabs.map((tab) => ({
            baselineSnapshot: cloneSnapshot(tab.baselineSnapshot || tab.snapshot),
            groupId: tab.groupId || '',
            id: tab.id,
            name: tab.name || deriveRequestName(tab.snapshot),
            requestId: tab.requestId || '',
            snapshot: cloneSnapshot(tab.snapshot),
            type: tab.type || 'scratch'
          }))
        };
      }

      function persistOpenTabs() {
        writeJson(STORAGE.openTabs, serializeOpenTabs());
      }

      function schedulePersistOpenTabs() {
        if (!state.storageReady) return;
        clearTimeout(schedulePersistOpenTabs.timer);
        schedulePersistOpenTabs.timer = setTimeout(persistOpenTabs, 250);
      }

      function normalizeOpenTabsState(openTabsState) {
        if (!openTabsState || !Array.isArray(openTabsState.tabs)) return null;
        const tabs = openTabsState.tabs
          .filter((tab) => tab && tab.id && tab.snapshot)
          .map((tab) => {
            const snapshot = cloneSnapshot(tab.snapshot);
            const baselineSnapshot = cloneSnapshot(tab.baselineSnapshot || tab.snapshot);
            const saved = tab.type === 'saved' && tab.requestId ? findSavedRequest(tab.requestId) : null;
            return {
              baselineSnapshot: tab.type === 'saved' && saved ? cloneSnapshot(saved.request.request) : baselineSnapshot,
              groupId: saved ? saved.group.id : tab.groupId || '',
              id: tab.id,
              name: tab.name || deriveRequestName(snapshot),
              requestId: saved ? saved.request.id : tab.requestId || '',
              snapshot,
              type: tab.type === 'saved' && saved ? 'saved' : tab.type === 'history' ? 'history' : 'scratch'
            };
          });
        const activeOpenTabId = tabs.some((tab) => tab.id === openTabsState.activeOpenTabId)
          ? openTabsState.activeOpenTabId
          : tabs[0]?.id || '';
        return { activeOpenTabId, tabs };
      }

      function createCollectionsExportPayload(groups) {
        return {
          exportedAt: new Date().toISOString(),
          groups: groups.map((group) => ({
            name: group.name,
            requests: group.requests.map((request) => ({
              name: request.name,
              request: cloneRequestSnapshot(request.request),
              updatedAt: request.updatedAt || Date.now()
            }))
          })),
          schemaVersion: 1,
          type: 'tooldesk-http-collections'
        };
      }

      function downloadJson(filename, payload) {
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      }

      function exportCollections(groupId = '') {
        const groups = groupId
          ? state.collections.groups.filter((group) => group.id === groupId)
          : state.collections.groups;
        if (!groups.length) {
          showToast('暂无可导出的集合');
          return;
        }
        const safeName = groupId ? groups[0].name.replace(/[\\/:*?"<>|]/g, '_') : 'all';
        downloadJson(`tooldesk-http-collections-${safeName}.json`, createCollectionsExportPayload(groups));
      }

      function requestImportCollections(groupId = '') {
        state.pendingImportGroupId = groupId;
        const input = $('collectionImportFile');
        input.value = '';
        input.click();
      }

      function normalizeImportedGroups(payload) {
        const rawGroups = Array.isArray(payload?.groups)
          ? payload.groups
          : Array.isArray(payload?.collections?.groups)
            ? payload.collections.groups
            : Array.isArray(payload?.requests)
              ? [{ name: payload.name || '导入集合', requests: payload.requests }]
              : [];
        return rawGroups
          .filter((group) => group && Array.isArray(group.requests))
          .map((group) => ({
            expanded: true,
            id: crypto.randomUUID(),
            name: String(group.name || '导入集合'),
            requests: group.requests
              .filter((request) => request && request.request)
              .map((request) => ({
                id: crypto.randomUUID(),
                name: String(request.name || deriveRequestName(request.request)),
                request: cloneRequestSnapshot(request.request),
                updatedAt: Date.now()
              }))
          }))
          .filter((group) => group.requests.length);
      }

      function uniqueGroupName(name) {
        const names = new Set(state.collections.groups.map((group) => group.name));
        if (!names.has(name)) return name;
        let index = 2;
        while (names.has(`${name} ${index}`)) index += 1;
        return `${name} ${index}`;
      }

      async function importCollectionsFromFile(file) {
        if (!file) return;
        try {
          const payload = JSON.parse(await file.text());
          const groups = normalizeImportedGroups(payload);
          if (!groups.length) {
            showToast('未找到可导入的请求集合');
            return;
          }
          const targetGroupId = state.pendingImportGroupId;
          if (targetGroupId) {
            const requests = groups.flatMap((group) => group.requests);
            state.collections.groups = state.collections.groups.map((group) => group.id === targetGroupId
              ? { ...group, expanded: true, requests: [...group.requests, ...requests] }
              : group);
            state.collections.activeGroupId = targetGroupId;
          } else {
            state.collections.groups = [
              ...state.collections.groups,
              ...groups.map((group) => ({ ...group, name: uniqueGroupName(group.name) }))
            ];
          }
          persistCollections();
          renderSidebar();
          showToast('集合已导入');
        } catch {
          showToast('导入失败，请检查 JSON 文件');
        } finally {
          state.pendingImportGroupId = '';
        }
      }

      function getActiveEnvVariables() {
        const environment = state.environments.find((item) => item.id === state.activeEnvId);
        return environment ? environment.variables : [];
      }

      function applyEnv(text) {
        const map = getActiveEnvVariables().reduce((record, row) => {
          if (row.enabled && row.key.trim()) record[row.key.trim()] = row.value;
          return record;
        }, {});
        return String(text || '').replace(/\{\{\s*([^{}\s]+)\s*\}\}/g, (match, name) =>
          Object.prototype.hasOwnProperty.call(map, name) ? map[name] : match
        );
      }

      function rowsToRecord(rows) {
        return rows.reduce((record, row) => {
          const key = row.key.trim();
          if (row.enabled && key) record[key] = row.value;
          return record;
        }, {});
      }

      function appendQueryParams(url, rows) {
        const trimmed = url.trim();
        if (!trimmed) return '';
        const activeRows = rows.filter((row) => row.enabled && row.key.trim());
        if (!activeRows.length) return trimmed;
        const parsed = new URL(trimmed);
        const search = new URLSearchParams(parsed.search);
        activeRows.forEach((row) => search.append(row.key.trim(), row.value));
        parsed.search = search.toString();
        return parsed.toString();
      }

      function buildSnapshot(syncInputs = true) {
        if (syncInputs) syncFromInputs();
        return {
          bodyType: state.bodyType,
          cookieRows: state.cookieRows.map((row) => ({ ...row })),
          headerRows: state.headerRows.map((row) => ({ ...row })),
          method: state.method,
          queryRows: state.queryRows.map((row) => ({ ...row })),
          requestBody: state.requestBody,
          requestTab: state.requestTab,
          response: cloneResponse(state.response),
          responseBody: state.responseBody,
          responseTab: state.responseTab,
          url: state.url,
          useCookieJar: state.useCookieJar
        };
      }

      function cloneResponse(response) {
        if (!response) return null;
        return {
          ...response,
          headers: { ...(response.headers || {}) },
          setCookies: Array.isArray(response.setCookies) ? response.setCookies.map((cookie) => ({ ...cookie })) : response.setCookies
        };
      }

      function cloneSnapshot(snapshot) {
        const empty = createEmptySnapshot();
        const source = { ...empty, ...snapshot };
        return {
          bodyType: source.bodyType || 'json',
          cookieRows: Array.isArray(source.cookieRows) && source.cookieRows.length ? source.cookieRows.map((row) => ({ ...row })) : [createRow()],
          headerRows: Array.isArray(source.headerRows) && source.headerRows.length ? source.headerRows.map((row) => ({ ...row })) : [createRow({ key: 'Accept', value: '*/*' }), createRow()],
          method: HTTP_METHODS.includes(source.method) ? source.method : 'GET',
          queryRows: Array.isArray(source.queryRows) && source.queryRows.length ? source.queryRows.map((row) => ({ ...row })) : [createRow()],
          requestBody: source.requestBody || '',
          requestTab: ['params', 'headers', 'cookies', 'body'].includes(source.requestTab) ? source.requestTab : 'params',
          response: cloneResponse(source.response),
          responseBody: source.responseBody || '',
          responseTab: ['body', 'headers'].includes(source.responseTab) ? source.responseTab : 'body',
          url: source.url || 'https://',
          useCookieJar: source.useCookieJar !== false
        };
      }

      function cloneRequestSnapshot(snapshot) {
        const cloned = cloneSnapshot(snapshot);
        cloned.response = null;
        cloned.responseBody = '';
        cloned.responseTab = 'body';
        return cloned;
      }

      function normalizeSnapshotForDirty(snapshot) {
        const cloned = cloneSnapshot(snapshot);
        const normalizeRows = (rows) => rows
          .map((row) => ({
            enabled: row.enabled !== false,
            key: String(row.key || ''),
            value: String(row.value || '')
          }))
          .filter((row, index, list) => row.key || row.value || row.enabled === false || index < list.length - 1);
        return {
          bodyType: cloned.bodyType,
          cookieRows: normalizeRows(cloned.cookieRows),
          headerRows: normalizeRows(cloned.headerRows),
          method: cloned.method,
          queryRows: normalizeRows(cloned.queryRows),
          requestBody: cloned.requestBody,
          url: cloned.url,
          useCookieJar: cloned.useCookieJar
        };
      }

      function snapshotsEqual(left, right) {
        return JSON.stringify(normalizeSnapshotForDirty(left)) === JSON.stringify(normalizeSnapshotForDirty(right));
      }

      function isOpenTabDirty(tab, currentSnapshot = null) {
        if (!tab) return false;
        const current = tab.id === state.activeOpenTabId ? (currentSnapshot || buildSnapshot()) : tab.snapshot;
        return !snapshotsEqual(current, tab.baselineSnapshot || createEmptySnapshot());
      }

      function createEmptySnapshot() {
        return {
          bodyType: 'json',
          cookieRows: [createRow()],
          headerRows: [createRow({ key: 'Accept', value: '*/*' }), createRow()],
          method: 'GET',
          queryRows: [createRow()],
          requestBody: '{\n  \n}',
          requestTab: 'params',
          response: null,
          responseBody: '',
          responseTab: 'body',
          url: 'https://',
          useCookieJar: true
        };
      }

      function createScratchOpenTab(snapshot = createEmptySnapshot()) {
        const cloned = cloneSnapshot(snapshot);
        return {
          baselineSnapshot: cloneSnapshot(cloned),
          groupId: '',
          id: `scratch-${crypto.randomUUID()}`,
          name: deriveRequestName(cloned),
          requestId: '',
          snapshot: cloned,
          type: 'scratch'
        };
      }

      function createSavedOpenTab(groupId, request) {
        const snapshot = cloneRequestSnapshot(request.request);
        return {
          baselineSnapshot: cloneSnapshot(snapshot),
          groupId,
          id: `saved-${request.id}`,
          name: request.name || deriveRequestName(request.request),
          requestId: request.id,
          snapshot,
          type: 'saved'
        };
      }

      function createHistoryOpenTab(entry) {
        const contentType = entry.response?.headers?.['content-type'] || entry.response?.headers?.['Content-Type'] || '';
        const snapshot = cloneSnapshot({
          ...entry.request,
          response: entry.response ? cloneResponse(entry.response) : null,
          responseBody: entry.responseBody || (entry.response
            ? formatHttpBody(entry.response.body || '', contentType)
            : ''),
          responseTab: 'body'
        });
        return {
          baselineSnapshot: cloneSnapshot(snapshot),
          groupId: '',
          id: `history-${entry.id}`,
          name: entry.label || deriveRequestName(entry.request),
          requestId: '',
          snapshot,
          type: 'history'
        };
      }

      function getActiveOpenTab() {
        return state.openRequestTabs.find((tab) => tab.id === state.activeOpenTabId) || null;
      }

      function findSavedRequest(requestId) {
        if (!state.collections?.groups) return null;
        for (const group of state.collections.groups) {
          const request = group.requests.find((item) => item.id === requestId);
          if (request) return { group, request };
        }
        return null;
      }

      function syncActiveOpenTabSnapshot() {
        const tab = getActiveOpenTab();
        if (!tab) return;
        const snapshot = buildSnapshot();
        tab.snapshot = cloneSnapshot(snapshot);
        if (tab.type !== 'saved') {
          tab.name = deriveRequestName(snapshot);
        }
      }

      function markActiveRequestChanged() {
        if (!state.openRequestTabs.length) {
          const tab = createScratchOpenTab(createEmptySnapshot());
          tab.snapshot = cloneSnapshot(buildSnapshot(false));
          state.openRequestTabs = [tab];
          state.activeOpenTabId = tab.id;
        }
        renderOpenRequestTabs();
      }

      function ensureOpenRequestTabs() {
        if (state.openRequestTabs.length) return;
        const activeSaved = state.collections.activeRequestId ? findSavedRequest(state.collections.activeRequestId) : null;
        const tab = activeSaved
          ? createSavedOpenTab(activeSaved.group.id, activeSaved.request)
          : createScratchOpenTab(buildSnapshot(false));
        state.openRequestTabs = [tab];
        state.activeOpenTabId = tab.id;
      }

      function createNewRequestTab() {
        const tab = createScratchOpenTab(createEmptySnapshot());
        state.openRequestTabs = [tab];
        state.activeOpenTabId = tab.id;
        state.collections.activeRequestId = '';
        restoreSnapshot(tab.snapshot, 'surface');
      }

      function openSavedRequestTab(groupId, request) {
        syncActiveOpenTabSnapshot();
        const tabId = `saved-${request.id}`;
        const existing = state.openRequestTabs.find((tab) => tab.id === tabId);
        if (existing) {
          existing.groupId = groupId;
          existing.name = request.name || existing.name || deriveRequestName(existing.snapshot);
          existing.requestId = request.id;
          existing.type = 'saved';
        } else {
          state.openRequestTabs.push(createSavedOpenTab(groupId, request));
        }
        state.activeOpenTabId = tabId;
        state.collections.activeGroupId = groupId;
        state.collections.activeRequestId = request.id;
        persistCollections();
        restoreSnapshot((existing || state.openRequestTabs.find((tab) => tab.id === tabId)).snapshot, 'surface');
      }

      function openHistoryRequestTab(entry) {
        syncActiveOpenTabSnapshot();
        const tabId = `history-${entry.id}`;
        const existing = state.openRequestTabs.find((item) => item.id === tabId);
        if (existing) {
          existing.snapshot = createHistoryOpenTab(entry).snapshot;
          state.activeOpenTabId = existing.id;
          state.collections.activeRequestId = '';
          restoreSnapshot(existing.snapshot, 'surface');
          return;
        }
        const tab = createHistoryOpenTab(entry);
        state.openRequestTabs.push(tab);
        state.activeOpenTabId = tab.id;
        state.collections.activeRequestId = '';
        restoreSnapshot(tab.snapshot, 'surface');
      }

      function activateOpenRequestTab(tabId) {
        if (state.activeOpenTabId === tabId) return;
        syncActiveOpenTabSnapshot();
        const tab = state.openRequestTabs.find((item) => item.id === tabId);
        if (!tab) return;
        state.activeOpenTabId = tab.id;
        state.collections.activeGroupId = tab.groupId || state.collections.activeGroupId;
        state.collections.activeRequestId = tab.type === 'saved' ? tab.requestId : '';
        if (tab.type === 'saved') persistCollections();
        restoreSnapshot(tab.snapshot, 'surface');
      }

      function closeOpenRequestTab(tabId) {
        const tab = state.openRequestTabs.find((item) => item.id === tabId);
        if (tab && isOpenTabDirty(tab)) {
          openDialog({ type: 'closeDirtyTab', tabId, initialName: tab.name || deriveRequestName(tab.snapshot) });
          return;
        }
        forceCloseOpenRequestTab(tabId);
      }

      function closeOpenRequestTabs(tabIds, confirmDirty = true) {
        const ids = tabIds.filter((tabId) => state.openRequestTabs.some((tab) => tab.id === tabId));
        if (!ids.length) return;
        const dirtyTabs = ids
          .map((tabId) => state.openRequestTabs.find((tab) => tab.id === tabId))
          .filter((tab) => tab && isOpenTabDirty(tab));
        if (confirmDirty && dirtyTabs.length) {
          openDialog({
            initialName: dirtyTabs.length === 1 ? dirtyTabs[0].name || deriveRequestName(dirtyTabs[0].snapshot) : `${dirtyTabs.length} 个请求`,
            tabIds: ids,
            type: 'closeDirtyTabs'
          });
          return;
        }
        forceCloseOpenRequestTabs(ids);
      }

      function forceCloseOpenRequestTabs(tabIds) {
        const closeIds = new Set(tabIds);
        const previousActiveId = state.activeOpenTabId;
        state.openRequestTabs = state.openRequestTabs.filter((tab) => !closeIds.has(tab.id));

        if (!state.openRequestTabs.length) {
          state.activeOpenTabId = '';
          state.collections.activeRequestId = '';
          restoreSnapshot(createEmptySnapshot(), 'surface');
          return;
        }

        if (!state.openRequestTabs.some((tab) => tab.id === previousActiveId)) {
          const next = state.openRequestTabs[0];
          state.activeOpenTabId = next.id;
          state.collections.activeGroupId = next.groupId || state.collections.activeGroupId;
          state.collections.activeRequestId = next.type === 'saved' ? next.requestId : '';
          restoreSnapshot(next.snapshot, 'surface');
          return;
        }

        state.activeOpenTabId = previousActiveId;
        const activeTab = getActiveOpenTab();
        state.collections.activeRequestId = activeTab?.type === 'saved' ? activeTab.requestId : '';
        renderOpenRequestTabs();
        updateSidebarSelection();
      }

      function forceCloseOpenRequestTab(tabId) {
        const index = state.openRequestTabs.findIndex((tab) => tab.id === tabId);
        if (index < 0) return;
        const wasActive = state.activeOpenTabId === tabId;
        state.openRequestTabs.splice(index, 1);
        if (!state.openRequestTabs.length) {
          state.activeOpenTabId = '';
          state.collections.activeRequestId = '';
          restoreSnapshot(createEmptySnapshot(), 'surface');
          return;
        }
        if (wasActive) {
          const next = state.openRequestTabs[Math.max(0, index - 1)];
          state.activeOpenTabId = next.id;
          state.collections.activeGroupId = next.groupId || state.collections.activeGroupId;
          state.collections.activeRequestId = next.type === 'saved' ? next.requestId : '';
          restoreSnapshot(next.snapshot, 'surface');
          return;
        }
        renderOpenRequestTabs();
      }

      function restoreSnapshot(snapshot, renderMode = 'all') {
        const next = cloneSnapshot(snapshot);
        state.method = next.method;
        state.url = next.url;
        state.bodyType = next.bodyType;
        state.requestBody = next.requestBody;
        state.queryRows = next.queryRows;
        state.headerRows = next.headerRows;
        state.cookieRows = next.cookieRows;
        state.useCookieJar = next.useCookieJar;
        state.requestTab = next.requestTab;
        state.response = cloneResponse(next.response);
        state.responseBody = next.responseBody || '';
        state.responseTab = next.responseTab;
        if (!METHODS_WITH_BODY.has(state.method) && state.requestTab === 'body') state.requestTab = 'params';
        if (renderMode === false) return;
        if (renderMode === 'surface') renderRequestSurface();
        else renderAll();
      }

      function deriveRequestName(snapshot) {
        try {
          const parsed = new URL(snapshot.url.trim());
          const segments = parsed.pathname.split('/').filter(Boolean);
          const lastSegment = segments.at(-1);
          if (lastSegment) return decodeURIComponent(lastSegment).slice(0, 48);
          if (parsed.hostname) return parsed.hostname.slice(0, 48);
        } catch {}
        const trimmed = snapshot.url.trim();
        return trimmed && trimmed !== 'https://' ? trimmed.slice(0, 48) : '新请求';
      }

      function syncEnvRows() {
        const environment = state.environments.find((item) => item.id === state.activeEnvId);
        state.envRows = environment ? environment.variables.map((row) => ({ ...row })) : [createRow()];
      }

      function restoreActiveSavedRequest() {
        const group = state.collections.groups.find((item) => item.id === state.collections.activeGroupId);
        const request = group && group.requests.find((item) => item.id === state.collections.activeRequestId);
        if (request) restoreSnapshot(request.request);
      }

      function filterCollections() {
        const query = state.collectionSearch.trim().toLowerCase();
        if (!query) return state.collections.groups;
        return state.collections.groups.map((group) => {
          const requests = group.requests.filter((request) =>
            request.name.toLowerCase().includes(query) ||
            request.request.method.toLowerCase().includes(query) ||
            request.request.url.toLowerCase().includes(query)
          );
          if (group.name.toLowerCase().includes(query)) return group;
          return requests.length ? { ...group, expanded: true, requests } : null;
        }).filter(Boolean);
      }

      function hasActiveSavedRequest() {
        return state.collections.groups.some((group) => group.requests.some((request) => request.id === state.collections.activeRequestId));
      }

      function collectionMethodClass(method) {
        return `http-client-collection-method http-client-method-${method.toLowerCase()}`;
      }

      function methodClass(method) {
        return `http-client-method-${method.toLowerCase()}`;
      }

      function iconSvg(name, extraClass = '') {
        const className = `app-icon${extraClass ? ` ${extraClass}` : ''}`;
        const icons = {
          chevron: '<path d="m6 9 6 6 6-6" />',
          download: '<path d="M12 3v12" /><path d="m7 10 5 5 5-5" /><path d="M5 21h14" />',
          folder: '<path d="M3 7.5h6l2 2h10" /><path d="M3 7.5v10A2.5 2.5 0 0 0 5.5 20h13A2.5 2.5 0 0 0 21 17.5v-8" />',
          search: '<circle cx="11" cy="11" r="7" /><path d="m20 20-3.5-3.5" />',
          upload: '<path d="M12 21V9" /><path d="m7 14 5-5 5 5" /><path d="M5 3h14" />'
        };
        return `<span class="${className}" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">${icons[name] || ''}</svg></span>`;
      }

      function getStatusTone(status) {
        if (status >= 200 && status < 300) return 'success';
        if (status >= 400) return 'error';
        return 'info';
      }

      function formatBytes(size) {
        if (size < 1024) return `${size} B`;
        if (size < 1024 * 1024) return `${(size / 1024).toFixed(1)} KB`;
        return `${(size / 1024 / 1024).toFixed(1)} MB`;
      }

      function formatHttpBody(body, contentType = '') {
        if (!body) return '';
        if (contentType.toLowerCase().includes('json')) {
          try { return JSON.stringify(JSON.parse(body), null, 2); } catch { return body; }
        }
        try { return JSON.stringify(JSON.parse(body), null, 2); } catch { return body; }
      }

      function getBodySize(body) {
        return new TextEncoder().encode(body || '').length;
      }

      function isResponseJson() {
        const body = state.responseBody.trim();
        if (!body) return false;
        const contentType = state.response ? (state.response.headers['content-type'] || state.response.headers['Content-Type'] || '') : '';
        if (contentType.toLowerCase().includes('json')) return true;
        try {
          JSON.parse(body);
          return true;
        } catch {
          return false;
        }
      }

      function buildCookieHeader(url, rows, jar, useCookieJar) {
        const pairs = new Map();
        if (useCookieJar) {
          jar.filter((cookie) => cookieMatchesUrl(cookie, url)).forEach((cookie) => pairs.set(cookie.name, cookie.value));
        }
        rows.forEach((row) => {
          if (row.enabled && row.key.trim()) pairs.set(row.key.trim(), row.value);
        });
        return Array.from(pairs.entries()).map(([name, value]) => `${name}=${value}`).join('; ');
      }

      function cookieMatchesUrl(cookie, url) {
        if (!cookie || !cookie.name || (cookie.expires && cookie.expires < Date.now())) return false;
        const parsed = new URL(url);
        const host = parsed.hostname.toLowerCase();
        const path = parsed.pathname || '/';
        const domain = (cookie.domain || host).replace(/^\./, '').toLowerCase();
        return (host === domain || host.endsWith(`.${domain}`)) && path.startsWith(cookie.path || '/');
      }

      function parseSetCookieHeader(setCookie) {
        const parts = String(setCookie || '').split(';').map((part) => part.trim());
        const [nameValue, ...attributes] = parts;
        const separator = nameValue.indexOf('=');
        if (separator <= 0) return null;
        const cookie = { name: nameValue.slice(0, separator).trim(), value: nameValue.slice(separator + 1).trim() };
        attributes.forEach((attribute) => {
          const [rawKey, ...rawValue] = attribute.split('=');
          const key = rawKey.trim().toLowerCase();
          const value = rawValue.join('=').trim();
          if (key === 'domain') cookie.domain = value;
          if (key === 'path') cookie.path = value;
          if (key === 'expires') {
            const expires = Date.parse(value);
            if (!Number.isNaN(expires)) cookie.expires = expires;
          }
          if (key === 'max-age') {
            const maxAge = Number(value);
            if (Number.isFinite(maxAge)) cookie.expires = Date.now() + maxAge * 1000;
          }
          if (key === 'secure') cookie.secure = true;
        });
        return cookie;
      }

      function upsertCookiesFromResponse(url, setCookies) {
        const host = new URL(url).hostname.toLowerCase();
        let next = [...state.cookieJar];
        setCookies.forEach((value) => {
          const cookie = parseSetCookieHeader(value);
          if (!cookie) return;
          if (!cookie.domain) cookie.domain = host;
          const domain = cookie.domain.replace(/^\./, '').toLowerCase();
          next = next.filter((item) => !(item.name === cookie.name && (item.domain || host).replace(/^\./, '').toLowerCase() === domain));
          next.push(cookie);
        });
        state.cookieJar = next.filter((cookie) => cookie.name && (!cookie.expires || cookie.expires >= Date.now()));
        persistCookies();
      }

      function clearDomainCookies() {
        try {
          const targetUrl = appendQueryParams(applyEnv(state.url.trim()), []);
          state.cookieJar = state.cookieJar.filter((cookie) => !cookieMatchesUrl(cookie, targetUrl));
          persistCookies();
          showToast('当前域名 Cookie 已清除');
        } catch {
          showError('请先输入有效 URL');
        }
      }

      function renderAll() {
        renderEmptyState();
        renderComposer();
        renderMethod();
        renderRequestTabs();
        renderRequestPanel();
        renderResponse();
        renderOpenRequestTabs();
        renderSidebar();
      }

      function renderRequestSurface() {
        renderEmptyState();
        renderComposer();
        renderMethod();
        renderRequestTabs();
        renderRequestPanel();
        renderResponse();
        renderOpenRequestTabs();
        updateSidebarSelection();
      }

      function renderEmptyState() {

        if (activeTab) {

          if (activeTab.type !== 'saved') activeTab.name = deriveRequestName(activeSnapshot);
        }
        container.replaceChildren(...state.openRequestTabs.map((tab) => {
          const snapshot = tab.id === state.activeOpenTabId ? activeSnapshot : tab.snapshot;
          const name = tab.type === 'saved'
            ? (findSavedRequest(tab.requestId)?.request.name || tab.name || deriveRequestName(snapshot))

          const isDirty = isOpenTabDirty(tab, snapshot);
          const button = document.createElement('button');
          button.type = 'button';
          button.className = `http-client-open-tab${tab.id === state.activeOpenTabId ? ' active' : ''}${isDirty ? ' dirty' : ''}`;

      function uniqueRequestName(groupId, name) {
        const names = new Set(
          (state.collections.groups.find((group) => group.id === groupId)?.requests ?? []).map((request) => request.name)
        );
        const base = String(name || '请求').trim() || '请求';
        if (!names.has(base)) return base;
        let index = 2;
        while (names.has(`${base} ${index}`)) index += 1;
        return `${base} ${index}`;
      }

      function duplicateSavedRequest(groupId, requestId) {
        const group = state.collections.groups.find((item) => item.id === groupId);
        const sourceIndex = group?.requests.findIndex((item) => item.id === requestId) ?? -1;
        const source = sourceIndex >= 0 ? group.requests[sourceIndex] : null;
        if (!source) {
          showToast('未找到可复制的请求');
          return;
        }
        const duplicate = {
          id: crypto.randomUUID(),
          name: uniqueRequestName(groupId, `${source.name || deriveRequestName(source.request)} 副本`),
          request: cloneRequestSnapshot(source.request),
          updatedAt: Date.now()
        };
        state.collections.groups = state.collections.groups.map((item) => {
          if (item.id !== groupId) return item;
          const requests = [...item.requests];
          requests.splice(sourceIndex + 1, 0, duplicate);
          return { ...item, expanded: true, requests };
        });
        persistCollections();
        openSavedRequestTab(groupId, duplicate);
        renderAll();
        showToast('已复制请求');
      }

      function handleRequestContextMenuAction(action) {

        const requestId = state.requestContextMenu?.requestId;

        closeTabContextMenu();

        if (action === 'current') {
          closeOpenRequestTab(tabId);
          return;

        if (action === 'others') {
          closeOpenRequestTabs(state.openRequestTabs.filter((tab) => tab.id !== tabId).map((tab) => tab.id));

      function jsonEditorHtml(id, value, placeholder, readonly = false) {
        return `
          <div class="http-client-json-editor">
            <div class="http-client-json-gutter" aria-hidden="true">
              <div class="http-client-json-gutter-inner">${jsonLineNumbers(value)}</div>
            </div>
            <div class="json-code http-client-json-code">
              <pre class="json-highlight" aria-hidden="true">${highlightJson(value)}</pre>
              <textarea id="${id}" ${readonly ? 'readonly' : ''} spellcheck="false" wrap="off" placeholder="${escapeAttr(placeholder)}"></textarea>
            </div>
          </div>
        `;
      }

      function syncJsonEditorLayers(textarea, highlight, gutterInner, value) {
        const text = String(value ?? '');
        if (highlight) {
          highlight.innerHTML = highlightJson(text);
          highlight.style.minHeight = `${Math.max(textarea.clientHeight, textarea.scrollHeight)}px`;
        }
        if (gutterInner) {
          gutterInner.innerHTML = jsonLineNumbers(text);
        }
      }

      function bindJsonEditor(id, value) {
        const textarea = $(id);
        const highlight = textarea.previousElementSibling;
        const editor = textarea.closest('.http-client-json-editor');
        const gutterInner = editor ? editor.querySelector('.http-client-json-gutter-inner') : null;

        textarea.value = String(value ?? '');
        syncJsonEditorLayers(textarea, highlight, gutterInner, textarea.value);

        const syncScroll = () => {
          if (highlight) {
            highlight.style.transform = `translate(${-textarea.scrollLeft}px, ${-textarea.scrollTop}px)`;
          }
          if (gutterInner) {
            gutterInner.style.transform = `translateY(${-textarea.scrollTop}px)`;
          }
        };

        textarea.addEventListener('scroll', syncScroll);
        syncScroll();
      }

      function jsonLineNumbers(text) {
        const count = Math.max(1, String(text ?? '').split('\n').length);
        return Array.from({ length: count }, (_, index) => `<span>${index + 1}</span>`).join('');
      }

      function highlightJson(text) {
        const lines = String(text ?? '').split('\n');

        return lines
          .map((line) => {
            const tokens =
              line.match(/"(?:\\.|[^"\\])*"|\b-?\d+(?:\.\d+)?(?:[eE][+-]?\d+)?\b|\btrue\b|\bfalse\b|\bnull\b|[{}[\],:]|\s+|./g) ?? [];

            return tokens
              .map((token, index) => {
                const escapedToken = escapeHtml(token);

                if (/^\s+$/.test(token)) {
                  return escapedToken;
                }

                if (/^"(?:\\.|[^"\\])*"$/.test(token)) {
                  const nextNonSpace = tokens.slice(index + 1).find((item) => !/^\s+$/.test(item));
                  const className = nextNonSpace === ':' ? 'json-key' : 'json-string';
                  return `<span class="${className}">${escapedToken}</span>`;
                }

                if (/^-?\d+(?:\.\d+)?(?:[eE][+-]?\d+)?$/.test(token)) {
                  return `<span class="json-number">${escapedToken}</span>`;
                }

                if (/^(true|false|null)$/.test(token)) {
                  return `<span class="json-const">${escapedToken}</span>`;
                }

                if (/^[{}[\],:]$/.test(token)) {
                  return `<span class="json-punct">${escapedToken}</span>`;
                }

                return escapedToken;
              })
              .join('');
          })
          .join('\n');
      }

      function renderRequestPanel() {
        const panel = $('requestPanel');
        if (state.requestTab === 'body') {
          const isJsonBody = state.bodyType === 'json';
          panel.className = 'http-client-body-editor';
          panel.innerHTML = `
            <div class="http-client-body-toolbar">
              <select id="bodyType">
                <option value="json">JSON</option>
                <option value="text">Text</option>
                <option value="none">无 Body</option>
              </select>
              <div class="http-client-body-actions">
                <button id="formatRequestJson" type="button">格式化 JSON</button>
              </div>
            </div>
            ${isJsonBody ? jsonEditorHtml('requestBody', state.requestBody, '请求体，可使用 {{变量名}}') : '<textarea id="requestBody" spellcheck="false" placeholder="请求体，可使用 {{变量名}}"></textarea>'}
          `;
          $('bodyType').value = state.bodyType;
          if (!isJsonBody) $('requestBody').value = state.requestBody;
          $('requestBody').disabled = state.bodyType === 'none' || state.isSending;
          $('formatRequestJson').disabled = state.bodyType !== 'json' || !state.requestBody.trim() || state.isSending;
          if (isJsonBody) bindJsonEditor('requestBody', state.requestBody);
          $('bodyType').addEventListener('change', (event) => {
            state.bodyType = event.target.value;
            markActiveRequestChanged();
            renderRequestPanel();
          });
          $('requestBody').addEventListener('input', (event) => {
            state.requestBody = event.target.value;
            const highlight = event.target.previousElementSibling;
            const gutterInner = event.target.closest('.http-client-json-editor')?.querySelector('.http-client-json-gutter-inner');
            syncJsonEditorLayers(event.target, highlight, gutterInner, state.requestBody);
            $('formatRequestJson').disabled = state.bodyType !== 'json' || !state.requestBody.trim() || state.isSending;
            markActiveRequestChanged();
          });
          $('formatRequestJson').addEventListener('click', () => {
            state.requestBody = formatHttpBody(state.requestBody, 'application/json');
            markActiveRequestChanged();
            renderRequestPanel();
          });
          return;
        }

        panel.className = 'http-client-kv-table';
        if (state.requestTab === 'cookies') {
          panel.innerHTML = `
            <div class="http-client-cookie-toolbar">
              <label class="http-client-checkbox">
                <input id="useCookieJar" type="checkbox" />
                <span>自动附带 Cookie 存储</span>
              </label>
              <button id="clearDomainCookies" type="button">清除当前域名 Cookie</button>
            </div>
            <div class="http-client-kv-scroll" id="kvScroll"></div>
            <button class="http-client-kv-add" id="addKvRow" type="button"><span class="http-client-kv-add-mark" aria-hidden="true">+</span>添加 Cookie</button>
          `;
          $('useCookieJar').checked = state.useCookieJar;
          $('useCookieJar').addEventListener('change', (event) => {
            state.useCookieJar = event.target.checked;
            markActiveRequestChanged();
          });
          $('clearDomainCookies').addEventListener('click', clearDomainCookies);
          renderKvRows('cookieRows', ['启用', 'Cookie', '值', ''], ['name', 'value 或 {{var}}']);
          $('addKvRow').addEventListener('click', () => addKvRow('cookieRows'));
          return;
        }

        const key = state.requestTab === 'params' ? 'queryRows' : 'headerRows';
        const addText = state.requestTab === 'params' ? '添加参数' : '添加 Header';
        const heads = state.requestTab === 'params' ? ['启用', '参数名', '参数值', ''] : ['启用', 'Header', '值', ''];
        const placeholders = state.requestTab === 'params' ? ['key', 'value 或 {{var}}'] : ['Header', 'value 或 {{var}}'];
        panel.innerHTML = `
          <div class="http-client-kv-scroll" id="kvScroll"></div>
          <button class="http-client-kv-add" id="addKvRow" type="button"><span class="http-client-kv-add-mark" aria-hidden="true">+</span>${addText}</button>
        `;
        renderKvRows(key, heads, placeholders);
        $('addKvRow').addEventListener('click', () => addKvRow(key));
      }

      function renderKvRows(stateKey, heads, placeholders) {
        const scroll = $('kvScroll');
        const head = document.createElement('div');
        head.className = 'http-client-kv-head';
        head.innerHTML = heads.map((item) => `<span>${escapeHtml(item)}</span>`).join('');
        const rows = state[stateKey].map((row) => createKvRow(stateKey, row, placeholders));
        scroll.replaceChildren(head, ...rows);
      }

      function createKvRow(stateKey, row, placeholders) {
        const element = document.createElement('div');
        element.className = 'http-client-kv-row';
        element.dataset.rowId = row.id;
        element.innerHTML = `
          <input class="kv-enabled" type="checkbox" ${row.enabled ? 'checked' : ''} />
          <input class="kv-key" type="text" placeholder="${escapeHtml(placeholders[0])}" value="${escapeAttr(row.key)}" />
          <input class="kv-value" type="text" placeholder="${escapeHtml(placeholders[1])}" value="${escapeAttr(row.value)}" />
          <button class="kv-remove" type="button" title="删除">×</button>
        `;
        element.querySelector('.kv-enabled').addEventListener('change', (event) => {
          row.enabled = event.target.checked;
          if (stateKey === 'envRows') persistEnvironments();
          else markActiveRequestChanged();
        });
        element.querySelector('.kv-key').addEventListener('input', (event) => {
          row.key = event.target.value;
          if (stateKey === 'envRows') persistEnvironments();
          else markActiveRequestChanged();
        });
        element.querySelector('.kv-value').addEventListener('input', (event) => {
          row.value = event.target.value;
          if (stateKey === 'envRows') persistEnvironments();
          else markActiveRequestChanged();
        });
        element.querySelector('.kv-remove').addEventListener('click', () => removeKvRow(stateKey, row.id));
        return element;
      }

      function addKvRow(stateKey) {
        state[stateKey] = [...state[stateKey], createRow()];
        if (stateKey === 'envRows') persistEnvironments();
        else markActiveRequestChanged();
        renderRequestPanel();
        renderSidebar();
      }

      function removeKvRow(stateKey, id) {
        const next = state[stateKey].filter((row) => row.id !== id);
        state[stateKey] = next.length ? next : [createRow()];
        if (stateKey === 'envRows') persistEnvironments();
        else markActiveRequestChanged();
        renderRequestPanel();
        renderSidebar();
      }

      function renderResponse() {
        $('responseBodyTab').classList.toggle('active', state.responseTab === 'body');
        $('responseHeadersTab').classList.toggle('active', state.responseTab === 'headers');
        const meta = $('responseMeta');
        const panel = $('responsePanel');

        if (state.isSending) {
          meta.hidden = false;
          meta.innerHTML = '<span class="http-client-meta-chip http-client-meta-loading">发送中...</span>';
          if (state.responseTab === 'headers') {
            panel.className = 'http-client-kv-table http-client-response-headers';
            panel.innerHTML = `
              <div class="http-client-empty is-loading">
                <span class="http-client-empty-icon" aria-hidden="true">…</span>
                <strong>请求发送中</strong>
                <p>等待服务器响应</p>
              </div>
            `;
            return;
          }
          panel.className = 'http-client-response-body';
          panel.innerHTML = `
            <div class="http-client-empty is-loading">
              <span class="http-client-empty-icon" aria-hidden="true">…</span>
              <strong>请求发送中</strong>
              <p>等待服务器响应</p>
            </div>
          `;
          return;
        }

        if (state.response) {
          meta.hidden = false;
          meta.innerHTML = `
            <span class="http-client-status ${getStatusTone(state.response.status)}">${state.response.status} ${escapeHtml(state.response.statusText || '')}</span>
            <span class="http-client-meta-chip">${Number(state.response.durationMs || 0)} ms</span>
            <span class="http-client-meta-chip">${formatBytes(getBodySize(state.response.body || ''))}</span>
          `;
        } else {
          meta.hidden = true;
          meta.replaceChildren();
        }

        if (state.responseTab === 'headers') {
          panel.className = 'http-client-kv-table http-client-response-headers';
          const headers = state.response ? Object.entries(state.response.headers || {}) : [];
          if (!headers.length) {
            panel.innerHTML = '<div class="http-client-empty"><strong>暂无响应</strong></div>';
            return;
          }
          panel.innerHTML = '<div class="http-client-kv-scroll" id="responseHeadersList"></div>';
          const head = document.createElement('div');
          head.className = 'http-client-kv-head readonly';
          head.innerHTML = '<span>Header</span><span>值</span>';
          const rows = headers.map(([key, value]) => {
            const row = document.createElement('div');
            row.className = 'http-client-kv-row readonly';
            row.innerHTML = `<span title="${escapeAttr(key)}">${escapeHtml(key)}</span><span title="${escapeAttr(value)}">${escapeHtml(value)}</span>`;
            return row;
          });
          $('responseHeadersList').replaceChildren(head, ...rows);
          return;
        }

        panel.className = 'http-client-response-body';
        if (!state.responseBody) {
          panel.innerHTML = `
            <div class="http-client-empty">
              <span class="http-client-empty-icon" aria-hidden="true">HTTP</span>
              <strong>暂无响应内容</strong>
              <p>发送请求后在此查看结果</p>
            </div>
          `;
          return;
        }
        panel.innerHTML = `
          <div class="http-client-response-actions">
            <button id="formatResponseJson" type="button">格式化 JSON</button>
            <button id="copyResponse" type="button">复制响应</button>
          </div>
          ${isResponseJson() ? jsonEditorHtml('responseBodyText', state.responseBody, '发送请求后在此查看响应', true) : '<textarea id="responseBodyText" readonly spellcheck="false" placeholder="发送请求后在此查看响应"></textarea>'}
        `;
        if (isResponseJson()) {
          bindJsonEditor('responseBodyText', state.responseBody);
        } else {
          $('responseBodyText').value = state.responseBody;
        }
        $('formatResponseJson').disabled = !isResponseJson();
        $('formatResponseJson').addEventListener('click', () => {
          state.responseBody = formatHttpBody(state.responseBody, 'application/json');
          renderResponse();
        });
        $('copyResponse').addEventListener('click', () => copyText(state.responseBody, '响应已复制'));
      }
