<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KeePassXC 设置</title>
    <style>
      :root {
        color: #0f172a;
        background: #ffffff;
        font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
        --brand: #2563eb;
        --panel-bg: #ffffff;
        --panel-border: #dbe4ef;
        --panel-soft: #f8fafc;
        --text-main: #0f172a;
        --text-muted: #64748b;
        --text-soft: #334155;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #ffffff;
      }

      button,
      input {
        font: inherit;
      }

      .page {
        display: grid;
        align-content: start;
        gap: 16px;
        min-height: 100vh;
        padding: 20px 18px 22px;
      }

      h1 {
        margin: 0;
        color: var(--text-main);
        font-size: 20px;
        font-weight: 700;
      }

      .panel {
        display: grid;
        gap: 12px;
      }

      label {
        display: grid;
        gap: 8px;
        color: var(--text-main);
        font-size: 13px;
        font-weight: 700;
      }

      input {
        width: 100%;
        min-height: 40px;
        border: 1px solid var(--panel-border);
        border-radius: 6px;
        background: var(--panel-bg);
        color: var(--text-main);
        font-size: 13px;
        outline: 0;
        padding: 0 12px;
      }

      input::placeholder {
        color: var(--text-muted);
        opacity: 1;
      }

      input:hover {
        border-color: var(--brand);
      }

      input:focus {
        border-color: var(--brand);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      }

      .path-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 88px;
        gap: 8px;
      }

      .toolbar {
        display: flex;
        gap: 8px;
      }

      button {
        height: 34px;
        border: 1px solid var(--panel-border);
        border-radius: 6px;
        background: var(--panel-bg);
        color: var(--text-main);
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        padding: 0 16px;
        transition:
          background 0.15s ease,
          border-color 0.15s ease,
          color 0.15s ease;
      }

      button:hover {
        border-color: rgba(37, 99, 235, 0.35);
        background: rgba(37, 99, 235, 0.06);
        color: var(--brand);
      }

      button.primary {
        border-color: var(--brand);
        background: var(--brand);
        color: #ffffff;
      }

      button.primary:hover {
        border-color: #1d4ed8;
        background: #1d4ed8;
        color: #ffffff;
      }

      button.danger {
        border-color: rgba(220, 38, 38, 0.28);
        color: #dc2626;
      }

      button.danger:hover {
        border-color: rgba(220, 38, 38, 0.45);
        background: rgba(220, 38, 38, 0.08);
        color: #dc2626;
      }

      .path-row button {
        height: 40px;
        background: var(--panel-soft);
        border-color: var(--panel-border);
        color: var(--text-main);
        padding: 0 14px;
      }

      .status {
        min-height: 18px;
        color: var(--text-muted);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <h1>KeePassXC</h1>

      <section class="panel">
        <label>
          快捷启动关键字
          <input id="keyword" type="text" maxlength="10" placeholder="kp" />
        </label>

        <label>
          默认数据库
          <div class="path-row">
            <input id="dbPath" type="text" placeholder="选择 .kdbx 文件" />
            <button id="browse" type="button">浏览</button>
          </div>
        </label>

        <div class="toolbar">
          <button id="clear" type="button" class="danger">清除</button>
          <button id="save" type="button" class="primary">保存</button>
        </div>
      </section>

      <p id="status" class="status"></p>
    </main>
<script>
      let api = null;
      let pluginConnect = Promise.resolve();

      const dbPathEl = document.getElementById('dbPath');
      const keywordEl = document.getElementById('keyword');
      const statusEl = document.getElementById('status');
      let localLibraries = [];

      function normalizeKeyword(value) {
        return String(value || '')
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9_-]+/g, '-')
          .replace(/^-+|-+$/g, '')
          .slice(0, 10) || 'kp';
      }

      function setStatus(value) {
        statusEl.textContent = value || '';
      }

      async function load() {
        const settings = await api.getAppSettings();
        dbPathEl.value = settings.keepass?.dbPath || '';
        keywordEl.value = settings.keepass?.keyword || 'kp';
        localLibraries = settings.localLibrary?.libraries || [];
      }

      async function save() {
        const keyword = normalizeKeyword(keywordEl.value);
        const conflict = localLibraries.find((library) => library.enabled && String(library.keyword || '').toLowerCase() === keyword);
        if (conflict) {
          setStatus(`关键字 ${keyword} 已被本地库 ${conflict.name || conflict.keyword} 使用`);
          return;
        }

        const settings = await api.setAppSettings({
          keepass: {
            dbPath: dbPathEl.value.trim(),
            keyword
          }
        });
        dbPathEl.value = settings.keepass?.dbPath || '';
        keywordEl.value = settings.keepass?.keyword || keyword;
        setStatus('已保存');
      }

      async function chooseDatabase() {
        const result = await api.showOpenDialog({
          filters: [{ name: 'KeePassXC Database', extensions: ['kdbx'] }],
          properties: ['openFile']
        });

        if (result && !result.canceled && result.filePaths[0]) {
          dbPathEl.value = result.filePaths[0];
        }
      }

      document.getElementById('browse').addEventListener('click', () => void chooseDatabase());
      document.getElementById('clear').addEventListener('click', () => {
        dbPathEl.value = '';
        void save();
      });
      document.getElementById('save').addEventListener('click', () => void save());
      keywordEl.addEventListener('blur', () => {
        keywordEl.value = normalizeKeyword(keywordEl.value);
      });

      (function bootPluginHost() {
        if (typeof TooldeskPlugin === 'undefined') {
          if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', bootPluginHost, { once: true });
            window.addEventListener('load', bootPluginHost, { once: true });
            return;
          }
          return;
        }
        const pluginCreateOptions = { id: 'tooldesk-keepassxc', capabilities: ['getAppSettings', 'setAppSettings', 'showOpenDialog'] };
        const pluginOnReady = function () { void load().catch((error) => setStatus(error instanceof Error ? error.message : '加载失败')); };
        const pluginOfflineReady = function () { void load().catch((error) => setStatus(error instanceof Error ? error.message : '加载失败')); };
        const plugin = TooldeskPlugin.create(pluginCreateOptions);
        api = plugin.api;
        pluginConnect = plugin.connect().then((result) => {
          if (result && result.ready === false) {
            return pluginOfflineReady();
          }
          return pluginOnReady();
        });
        void pluginConnect;
      })();
    </script>
</html>
