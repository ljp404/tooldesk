<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF 工具箱</title>
    <style>
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        background: transparent;
        color: #111827;
        font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
        font-size: 13px;
        padding: 14px;
      }
      button, input, select { font: inherit; }
      button { border: 0; cursor: pointer; }
      button:disabled { cursor: not-allowed; opacity: .58; }
      [hidden] { display: none !important; }
      .pdf-shell {
        display: grid;
        gap: 14px;
        grid-template-columns: 220px minmax(0, 1fr);
        height: 100%;
        min-height: 580px;
      }
      .pdf-nav {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
      }
      .nav-head {
        border-bottom: 1px solid #eef2f7;
        padding: 12px 12px 10px;
      }
      .nav-head strong { display: block; font-size: 15px; }
      .nav-head span { color: #64748b; display: block; font-size: 12px; margin-top: 4px; }
      .nav-list {
        display: flex;
        flex: 1;
        flex-direction: column;
        gap: 4px;
        min-height: 0;
        overflow: auto;
        padding: 8px;
      }
      .nav-item {
        align-items: center;
        background: transparent;
        border-radius: 6px;
        color: #334155;
        display: flex;
        gap: 8px;
        height: 34px;
        justify-content: flex-start;
        padding: 0 10px;
        text-align: left;
      }
      .nav-item.active {
        background: #fee2e2;
        color: #b91c1c;
        font-weight: 700;
      }
      .nav-dot {
        background: #cbd5e1;
        border-radius: 999px;
        height: 6px;
        width: 6px;
      }
      .nav-item.active .nav-dot { background: #ef4444; }
      .pdf-main {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-width: 0;
        overflow: hidden;
      }
      .main-head {
        align-items: center;
        border-bottom: 1px solid #eef2f7;
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
      }
      .title-block strong { display: block; font-size: 15px; }
      .title-block span { color: #64748b; display: block; font-size: 12px; margin-top: 4px; }
      .actions { display: flex; gap: 8px; }
      .btn {
        align-items: center;
        background: #f8fafc;
        border: 1px solid #dbe4ef;
        border-radius: 6px;
        color: #334155;
        display: inline-flex;
        height: 34px;
        justify-content: center;
        padding: 0 12px;
      }
      .btn.primary {
        background: #dc2626;
        border-color: #dc2626;
        color: #fff;
        font-weight: 700;
      }
      .main-body {
        display: grid;
        gap: 14px;
        grid-template-columns: minmax(0, 1.2fr) minmax(300px, .8fr);
        min-height: 0;
        padding: 14px;
      }
      .panel {
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
      }
      .panel-head {
        align-items: center;
        background: #f8fafc;
        border-bottom: 1px solid #e5e7eb;
        display: flex;
        justify-content: space-between;
        min-height: 40px;
        padding: 0 12px;
      }
      .panel-head strong { font-size: 13px; }
      .file-list {
        flex: 1;
        min-height: 180px;
        overflow: auto;
        padding: 10px;
      }
      .empty {
        align-items: center;
        border: 1px dashed #cbd5e1;
        border-radius: 8px;
        color: #64748b;
        display: flex;
        height: 100%;
        justify-content: center;
        min-height: 160px;
        text-align: center;
      }
      .file-row {
        align-items: center;
        border: 1px solid #e5e7eb;
        border-radius: 7px;
        display: grid;
        gap: 8px;
        grid-template-columns: minmax(0, 1fr) auto;
        margin-bottom: 8px;
        padding: 8px 10px;
      }
      .file-name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .file-path {
        color: #64748b;
        font-size: 12px;
        margin-top: 3px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .remove-btn {
        background: #f1f5f9;
        border-radius: 999px;
        color: #64748b;
        height: 26px;
        width: 26px;
      }
      .side {
        display: flex;
        flex-direction: column;
        gap: 14px;
        min-height: 0;
      }
      .form {
        display: grid;
        gap: 10px;
        padding: 12px;
      }
      label { color: #334155; display: grid; font-size: 12px; font-weight: 700; gap: 6px; }
      input, select {
        background: #fff;
        border: 1px solid #dbe4ef;
        border-radius: 6px;
        color: #111827;
        height: 34px;
        outline: none;
        padding: 0 10px;
      }
      input:focus, select:focus { border-color: #f87171; box-shadow: 0 0 0 3px rgba(248, 113, 113, .12); }
      .output-row { display: grid; gap: 8px; grid-template-columns: minmax(0, 1fr) auto; }
      .log {
        color: #334155;
        flex: 1;
        font-family: Consolas, "Microsoft YaHei", monospace;
        font-size: 12px;
        line-height: 1.55;
        min-height: 130px;
        overflow: auto;
        padding: 10px 12px;
        white-space: pre-wrap;
      }
      .result-list {
        border-top: 1px solid #e5e7eb;
        max-height: 120px;
        overflow: auto;
        padding: 8px 12px;
      }
      .result-item {
        color: #2563eb;
        cursor: pointer;
        overflow: hidden;
        padding: 4px 0;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      @media (max-width: 760px) {
        body { padding: 10px; }
        .pdf-shell { grid-template-columns: 1fr; }
        .pdf-nav { min-height: 180px; }
        .main-body { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="pdf-shell">
      <aside class="pdf-nav">
        <div class="nav-head">
          <strong>PDF 工具箱</strong>
          <span>转换、提取、页面处理</span>
        </div>
        <div id="toolList" class="nav-list"></div>
      </aside>

      <section class="pdf-main">
        <header class="main-head">
          <div class="title-block">
            <strong id="toolTitle">合并 PDF</strong>
            <span id="toolDesc">提取 PDF 内嵌图片，使用插件内置 Poppler。</span>
          </div>
          <div class="actions">
            <button id="clearFiles" class="btn" type="button">清空</button>
            <button id="run" class="btn primary" type="button">开始处理</button>
          </div>
        </header>

        <div class="main-body">
          <section class="panel">
            <div class="panel-head">
              <strong>文件</strong>
              <button id="pickFiles" class="btn" type="button">选择文件</button>
            </div>
            <div id="fileList" class="file-list"></div>
          </section>

          <aside class="side">
            <section class="panel">
              <div class="panel-head"><strong>参数</strong></div>
              <div class="form">
                <label>
                  输出目录
                  <div class="output-row">
                    <input id="outputDir" type="text" placeholder="请选择输出目录" readonly />
                    <button id="pickOutput" class="btn" type="button">选择</button>
                  </div>
                </label>
                <label id="pagesRow">
                  页码范围
                  <input id="pages" type="text" placeholder="例如 1-3,5 或 1-z" />
                </label>
                <label id="rotationRow">
                  旋转角度
                  <select id="rotation">
                    <option value="90">顺时针 90°</option>
                    <option value="180">180°</option>
                    <option value="270">顺时针 270°</option>
                  </select>
                </label>
                <label id="formatRow">
                  图片格式
                  <select id="imageFormat">
                    <option value="png">PNG</option>
                    <option value="jpg">JPG</option>
                  </select>
                </label>
              </div>
            </section>

            <section class="panel">
              <div class="panel-head">
                <strong>结果</strong>
                <button id="openOutput" class="btn" type="button">打开目录</button>
              </div>
              <div id="log" class="log">请选择文件和输出目录。</div>
              <div id="resultList" class="result-list" hidden></div>
            </section>
          </aside>
        </div>
      </section>
    </main>

    <script>
      const tools = [
        { id: 'merge', name: '合并 PDF', desc: '多个 PDF 合并为一个文件，使用插件内置 qpdf。', accept: ['pdf'], min: 2, multi: true },
        { id: 'split', name: '拆分 PDF', desc: '按页拆分 PDF，使用插件内置 qpdf。', accept: ['pdf'], min: 1 },
        { id: 'extract-pages', name: '提取页面', desc: '按页码范围生成新 PDF，使用插件内置 qpdf。', accept: ['pdf'], min: 1, pages: true },
        { id: 'delete-pages', name: '删除页面', desc: '输入需要删除的页码范围生成新 PDF，使用插件内置 qpdf。', accept: ['pdf'], min: 1, pages: true },
        { id: 'rotate', name: '旋转页面', desc: '旋转指定页码范围，使用插件内置 qpdf。', accept: ['pdf'], min: 1, pages: true, rotation: true },
        { id: 'compress', name: '压缩 PDF', desc: '使用插件内置 qpdf 线性化优化 PDF。', accept: ['pdf'], min: 1 }
      ];

      let api = null;
      let activeTool = tools[0];
      let files = [];
      let outputs = [];

      const $ = (id) => document.getElementById(id);
      const fileName = (path) => String(path).split(/[\\/]/).pop() || path;
      const log = (message) => { $('log').textContent = message; };

      function renderTools() {
        $('toolList').innerHTML = tools.map((tool) => `
          <button class="nav-item ${tool.id === activeTool.id ? 'active' : ''}" type="button" data-tool="${tool.id}">
            <span class="nav-dot"></span>
            <span>${tool.name}</span>
          </button>
        `).join('');
      }

      function renderFiles() {
        if (!files.length) {
          $('fileList').innerHTML = '<div class="empty">选择 PDF 或图片文件</div>';
          return;
        }

        $('fileList').innerHTML = files.map((path, index) => `
          <div class="file-row">
            <div>
              <div class="file-name">${fileName(path)}</div>
              <div class="file-path">${path}</div>
            </div>
            <button class="remove-btn" type="button" data-remove="${index}">×</button>
          </div>
        `).join('');
      }

      function renderResults() {
        const list = $('resultList');
        if (!outputs.length) {
          list.hidden = true;
          list.innerHTML = '';
          return;
        }

        list.hidden = false;
        list.innerHTML = outputs.map((path) => `<div class="result-item" data-output="${path}">${path}</div>`).join('');
      }

      function syncTool() {
        $('toolTitle').textContent = activeTool.name;
        $('toolDesc').textContent = activeTool.desc;
        $('pagesRow').hidden = !activeTool.pages;
        $('rotationRow').hidden = !activeTool.rotation;
        $('formatRow').hidden = !activeTool.format;
        files = [];
        outputs = [];
        renderTools();
        renderFiles();
        renderResults();
        log(activeTool.desc);
      }

      function dialogFilters() {
        if (activeTool.accept.includes('image')) {
          return [{ name: '图片', extensions: ['jpg', 'jpeg', 'png', 'webp', 'bmp', 'tif', 'tiff'] }];
        }
        return [{ name: 'PDF', extensions: ['pdf'] }];
      }

      async function pickFiles() {
        const result = await api.showOpenDialog({
          filters: dialogFilters(),
          multiple: Boolean(activeTool.multi),
          title: `选择${activeTool.accept.includes('image') ? '图片' : 'PDF'}文件`
        });
        if (!result?.canceled && result.filePaths?.length) {
          files = result.filePaths;
          outputs = [];
          renderFiles();
          renderResults();
          log(`已选择 ${files.length} 个文件。`);
        }
      }

      async function pickOutput() {
        const result = await api.showOpenDialog({ directory: true, title: '选择输出目录' });
        if (!result?.canceled && result.filePaths?.[0]) {
          $('outputDir').value = result.filePaths[0];
        }
      }

      const pathJoin = (dir, name) => `${String(dir).replace(/[\\/]$/, '')}\\${name}`;
      const stem = (path) => fileName(path).replace(/\.[^.]+$/, '') || 'output';
      const uniqueName = (name) => name.replace(/(\.[^.]+)$/, `-${Date.now()}$1`);
      const asciiPrefix = (prefix) => `${prefix}-${Date.now()}`;

      function failIfNeeded(result, tool) {
        if (result?.ok) return result;
        const message = [result?.stderr, result?.stdout].filter(Boolean).join('\n').trim();
        throw new Error(message || `${tool} 执行失败`);
      }

      async function runNativeTool(tool, args, options = {}) {
        return failIfNeeded(await api.runPluginTool({ args, cwd: options.cwd, tool }), tool);
      }

      function parsePageToken(token, totalPages) {
        const value = String(token).trim();
        if (!value) throw new Error('页码范围不能为空');
        const parsePage = (item) => {
          const text = String(item).trim();
          if (/^z$/i.test(text)) return totalPages;
          const page = Number(text);
          if (!Number.isInteger(page)) throw new Error(`页码格式不正确：${text}`);
          return page;
        };
        if (value.includes('-')) {
          const [startText, endText] = value.split('-');
          const start = parsePage(startText);
          const end = parsePage(endText);
          if (start < 1 || end < start || end > totalPages) throw new Error(`页码范围超出 PDF 页数：${value}`);
          return [start, end];
        }
        const page = parsePage(value);
        if (page < 1 || page > totalPages) throw new Error(`页码超出 PDF 页数：${value}`);
        return [page, page];
      }

      function compactPageRanges(pages) {
        const ranges = [];
        let start = pages[0];
        let previous = pages[0];
        for (const page of pages.slice(1)) {
          if (page === previous + 1) {
            previous = page;
            continue;
          }
          ranges.push(start === previous ? String(start) : `${start}-${previous}`);
          start = page;
          previous = page;
        }
        ranges.push(start === previous ? String(start) : `${start}-${previous}`);
        return ranges.join(',');
      }

      async function qpdfPageCount(file) {
        const result = await runNativeTool('qpdf', ['--show-npages', file]);
        const count = Number(String(result.stdout || '').trim());
        if (!Number.isInteger(count) || count < 1) throw new Error(`无法读取 PDF 页数：${result.stdout || result.stderr}`);
        return count;
      }

      async function runPdfAction() {
        const outputDir = $('outputDir').value.trim();
        const pageRange = $('pages').value.trim();

        if (activeTool.id === 'merge') {
          const output = pathJoin(outputDir, uniqueName('merged.pdf'));
          const args = ['--empty', '--pages'];
          for (const file of files) args.push(file, '1-z');
          args.push('--', output);
          await runNativeTool('qpdf', args);
          return [output];
        }
        if (activeTool.id === 'split') {
          await runNativeTool('qpdf', ['--split-pages', files[0], pathJoin(outputDir, `${stem(files[0])}-%d.pdf`)]);
          return [outputDir];
        }
        if (activeTool.id === 'extract-pages') {
          if (!pageRange) throw new Error('请输入页码范围，例如 1-3,5');
          const output = pathJoin(outputDir, uniqueName(`${stem(files[0])}-pages.pdf`));
          await runNativeTool('qpdf', ['--empty', '--pages', files[0], pageRange, '--', output]);
          return [output];
        }
        if (activeTool.id === 'delete-pages') {
          if (!pageRange) throw new Error('请输入需要删除的页码范围，例如 1-3,5');
          const totalPages = await qpdfPageCount(files[0]);
          const deleted = new Set();
          for (const token of pageRange.split(',')) {
            const [start, end] = parsePageToken(token, totalPages);
            for (let page = start; page <= end; page += 1) deleted.add(page);
          }
          const kept = Array.from({ length: totalPages }, (_, index) => index + 1).filter((page) => !deleted.has(page));
          if (!kept.length) throw new Error('不能删除全部页面');
          const output = pathJoin(outputDir, uniqueName(`${stem(files[0])}-deleted.pdf`));
          await runNativeTool('qpdf', ['--empty', '--pages', files[0], compactPageRanges(kept), '--', output]);
          return [output];
        }
        if (activeTool.id === 'rotate') {
          const degrees = ['90', '180', '270'].includes($('rotation').value) ? $('rotation').value : '90';
          const output = pathJoin(outputDir, uniqueName(`${stem(files[0])}-rotated.pdf`));
          await runNativeTool('qpdf', [files[0], output, `--rotate=+${degrees}:${pageRange || '1-z'}`]);
          return [output];
        }
        if (activeTool.id === 'compress') {
          const output = pathJoin(outputDir, uniqueName(`${stem(files[0])}-compressed.pdf`));
          await runNativeTool('qpdf', ['--linearize', files[0], output]);
          return [output];
        }

        throw new Error('不支持的 PDF 操作');
      }

      async function runTool() {
        if (files.length < activeTool.min) {
          log(`当前功能至少需要 ${activeTool.min} 个文件。`);
          return;
        }
        if (!$('outputDir').value.trim()) {
          log('请选择输出目录。');
          return;
        }

        $('run').disabled = true;
        outputs = [];
        renderResults();
        log('处理中...');

        try {
          outputs = await runPdfAction();
          renderResults();
          log(`处理完成\n${outputs.join('\n')}`);
        } catch (error) {
          log(error instanceof Error ? error.message : String(error || '处理失败'));
        } finally {
          $('run').disabled = false;
        }
      }

      $('toolList').addEventListener('click', (event) => {
        const button = event.target.closest('[data-tool]');
        if (!button) return;
        activeTool = tools.find((tool) => tool.id === button.dataset.tool) || tools[0];
        syncTool();
      });
      $('fileList').addEventListener('click', (event) => {
        const button = event.target.closest('[data-remove]');
        if (!button) return;
        files.splice(Number(button.dataset.remove), 1);
        renderFiles();
      });
      $('resultList').addEventListener('click', (event) => {
        const item = event.target.closest('[data-output]');
        if (item?.dataset.output) void api.openPath(item.dataset.output);
      });
      $('pickFiles').addEventListener('click', () => void pickFiles());
      $('pickOutput').addEventListener('click', () => void pickOutput());
      $('clearFiles').addEventListener('click', () => { files = []; outputs = []; renderFiles(); renderResults(); log(activeTool.desc); });
      $('openOutput').addEventListener('click', () => {
        const path = $('outputDir').value.trim();
        if (path) void api.openPath(path);
      });
      $('run').addEventListener('click', () => void runTool());

      renderTools();
      renderFiles();
      syncTool();

      const plugin = TooldeskPlugin.create({
        id: 'tooldesk-pdf-toolbox',
        capabilities: ['openPath', 'runPluginTool', 'showOpenDialog']
      });
      api = plugin.api;
      void plugin.connect().then(() => {});
    </script>
  </body>
</html>
