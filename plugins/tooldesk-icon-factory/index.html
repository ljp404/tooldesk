<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>图标工厂</title><style>*{box-sizing:border-box}html,body{height:100%;margin:0}body{--brand:#2563eb;--panel-bg:#fff;--panel-border:#dbe4ef;--tool-surface-border:#dbe4ef;--tool-secondary-btn-bg:#f8fafc;--tool-hover-bg:#eef4ff;--tool-active-border:#bfdbfe;--text-main:#111827;--text-muted:#64748b;background:#eef3f8;color:#111827;font-family:"Microsoft YaHei","Segoe UI",Arial,sans-serif;font-size:13px}button,input{font:inherit}button{border:0;cursor:pointer}.tool-panel{background:#fff;border: 0;border-radius:0;min-height:100%;overflow:hidden}.tool-content{padding:18px}.app-icon{display:inline-flex}.copy-toast{background:rgba(15,23,42,.88);border-radius:6px;color:#fff;font-size:12px;font-weight:700;padding:7px 10px;position:absolute;right:14px;top:56px;z-index:5}[hidden]{display:none!important}.icon-factory-panel {
  min-height: 0;
}

.icon-factory {
  display: grid;
  gap: 14px;
  grid-template-columns: minmax(320px, 0.92fr) minmax(300px, 1fr);
  height: 100%;
  min-height: 0;
}

.icon-factory-controls,
.icon-preview-panel {
  background: var(--panel-bg);
  border: 1px solid var(--panel-border);
  border-radius: 8px;
  min-width: 0;
}

.icon-factory-controls {
  display: grid;
  gap: 14px;
  overflow: auto;
  padding: 16px;
}

.icon-factory-head {
  align-items: center;
  display: flex;
  gap: 12px;
  min-width: 0;
}

.icon-factory-head-icon {
  align-items: center;
  background: rgba(79, 70, 229, 0.1);
  border: 1px solid rgba(79, 70, 229, 0.2);
  border-radius: 8px;
  color: #4f46e5;
  display: inline-flex;
  height: 40px;
  justify-content: center;
  width: 40px;
}

.icon-factory-head-icon .app-icon {
  height: 20px;
  width: 20px;
}

.icon-factory-head h3,
.icon-factory-head p {
  margin: 0;
}

.icon-factory-head h3 {
  color: var(--text-main);
  font-size: 17px;
  font-weight: 700;
}

.icon-factory-head p {
  color: var(--text-muted);
  font-size: 12px;
  margin-top: 3px;
}

.icon-field {
  display: grid;
  gap: 8px;
  min-width: 0;
}

.icon-field > span,
.icon-check-field {
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 650;
}

.icon-field input[type='text'] {
  background: var(--panel-soft);
  border: 1px solid var(--panel-border);
  border-radius: 6px;
  color: var(--text-main);
  height: 34px;
  outline: 0;
  padding: 0 10px;
}

.icon-field input[type='text']:focus {
  border-color: var(--brand);
  box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.12);
}

.icon-source-tabs {
  background: var(--panel-soft);
  border: 1px solid var(--panel-border);
  border-radius: 6px;
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  padding: 3px;
}

.icon-source-tabs button {
  background: transparent;
  border: 0;
  border-radius: 4px;
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 700;
  height: 30px;
}

.icon-source-tabs button.active {
  background: var(--panel-bg);
  box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08);
  color: var(--text-main);
}

.icon-search-field {
  align-items: center;
  background: var(--panel-soft);
  border: 1px solid var(--panel-border);
  border-radius: 6px;
  display: flex;
  gap: 8px;
  height: 34px;
  padding: 0 9px;
}

.icon-search-field:focus-within {
  border-color: var(--brand);
  box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.12);
}

.icon-search-field .app-icon {
  color: var(--text-muted);
  height: 15px;
  width: 15px;
}

.icon-search-field input {
  appearance: none;
  background: transparent;
  border: 0;
  color: var(--text-main);
  flex: 1;
  font-size: 13px;
  height: 100%;
  min-width: 0;
  outline: 0;
  padding: 0;
}

.icon-search-field input::-webkit-search-cancel-button,
.icon-search-field input::-webkit-search-decoration {
  appearance: none;
  display: none;
}

.icon-symbol-grid,
.icon-preset-grid {
  display: grid;
  gap: 8px;
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.icon-symbol-grid {
  max-height: 252px;
  overflow: auto;
  padding-right: 2px;
}

.icon-online-search {
  display: grid;
  gap: 8px;
  grid-template-columns: minmax(0, 1fr) 72px;
}

.icon-online-search button {
  background: var(--brand);
  border: 1px solid var(--brand);
  border-radius: 6px;
  color: #fff;
  font-size: 12px;
  font-weight: 700;
}

.icon-online-search button:disabled {
  cursor: wait;
  opacity: 0.68;
}

.icon-online-grid {
  display: grid;
  gap: 8px;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  max-height: 252px;
  overflow: auto;
  padding-right: 2px;
}

.icon-online-grid button {
  align-content: center;
  background: var(--panel-soft);
  border: 1px solid var(--panel-border);
  border-radius: 6px;
  color: var(--text-main);
  display: grid;
  gap: 3px;
  justify-items: center;
  min-height: 78px;
  min-width: 0;
  padding: 8px;
}

.icon-online-grid button.active {
  background: rgba(37, 99, 235, 0.08);
  border-color: rgba(37, 99, 235, 0.36);
}

.icon-online-grid img {
  height: 28px;
  width: 28px;
}

.icon-online-grid span,
.icon-online-grid strong {
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.icon-online-grid span {
  color: var(--text-muted);
  font-size: 10px;
  text-transform: uppercase;
}

.icon-online-grid strong {
  color: var(--text-main);
  font-size: 11px;
  font-weight: 700;
}

.icon-online-note {
  color: var(--text-muted);
  font-size: 11px;
  line-height: 1.5;
  margin: 0;
}

.icon-symbol-grid button,
.icon-preset-grid button,
.icon-secondary-button,
.icon-primary-button {
  border-radius: 6px;
  font-size: 12px;
  font-weight: 650;
  min-width: 0;
}

.icon-symbol-grid button,
.icon-preset-grid button {
  background: var(--panel-soft);
  border: 1px solid var(--panel-border);
  color: var(--text-main);
}

.icon-symbol-grid button.active,
.icon-preset-grid button.active {
  background: rgba(37, 99, 235, 0.08);
  border-color: rgba(37, 99, 235, 0.36);
  color: var(--brand);
}

.icon-symbol-grid button {
  align-content: center;
  display: grid;
  gap: 6px;
  justify-items: center;
  min-height: 72px;
  padding: 8px;
}

.icon-symbol-grid img {
  height: 28px;
  width: 28px;
}

.icon-symbol-grid strong {
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.icon-empty-gallery {
  background: var(--panel-soft);
  border: 1px dashed var(--panel-border);
  border-radius: 6px;
  color: var(--text-muted);
  font-size: 12px;
  margin: 0;
  padding: 10px;
  text-align: center;
}

.icon-preset-grid button {
  display: grid;
  gap: 1px;
  height: 48px;
  place-items: start;
  padding: 7px 9px;
}

.icon-preset-grid small {
  color: var(--text-muted);
  font-size: 11px;
}

.icon-color-row {
  align-items: center;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.icon-color-row button,
.icon-color-row input[type='color'] {
  border: 1px solid var(--panel-border);
  border-radius: 999px;
  height: 26px;
  padding: 0;
  width: 26px;
}

.icon-color-row button.active {
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.18);
}

.icon-color-row input[type='color'] {
  background: transparent;
  overflow: hidden;
}

.icon-field input[type='range'] {
  accent-color: var(--brand);
  width: 100%;
}

.icon-check-field {
  align-items: center;
  display: inline-flex;
  gap: 8px;
}

.icon-check-field input {
  accent-color: var(--brand);
  height: 15px;
  width: 15px;
}

.icon-preview-panel {
  display: grid;
  gap: 12px;
  grid-template-rows: auto minmax(0, 1fr) auto auto;
  overflow: hidden;
  padding: 16px;
}

.icon-preview-toolbar {
  align-items: center;
  display: flex;
  gap: 10px;
  justify-content: space-between;
}

.icon-preview-toolbar div {
  display: grid;
  gap: 3px;
}

.icon-preview-toolbar strong {
  color: var(--text-main);
  font-size: 15px;
}

.icon-preview-toolbar span,
.icon-export-box dd {
  color: var(--text-muted);
  font-size: 12px;
}

.icon-format-pill {
  background: var(--brand-soft);
  border: 1px solid rgba(37, 99, 235, 0.18);
  border-radius: 999px;
  color: var(--brand);
  flex-shrink: 0;
  font-size: 11px;
  font-weight: 700;
  padding: 3px 8px;
}

.icon-preview-stage {
  align-content: center;
  display: grid;
  gap: 16px;
  justify-items: center;
  min-height: 0;
  overflow: auto;
  padding: 4px;
}

.icon-preview-grid-bg,
.icon-preview-sizes span {
  background-color: #f8fafc;
  background-image:
    linear-gradient(45deg, rgba(148, 163, 184, 0.26) 25%, transparent 25%),
    linear-gradient(-45deg, rgba(148, 163, 184, 0.26) 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, rgba(148, 163, 184, 0.26) 75%),
    linear-gradient(-45deg, transparent 75%, rgba(148, 163, 184, 0.26) 75%);
  background-position:
    0 0,
    0 8px,
    8px -8px,
    -8px 0;
  background-size: 16px 16px;
}

.icon-preview-grid-bg {
  align-items: center;
  border: 1px solid var(--panel-border);
  border-radius: 8px;
  display: flex;
  height: min(42vh, 340px);
  justify-content: center;
  min-height: 220px;
  width: min(100%, 380px);
}

.icon-preview-grid-bg img {
  height: min(230px, 70%);
  width: min(230px, 70%);
}

.icon-preview-sizes {
  align-items: end;
  display: flex;
  gap: 12px;
}

.icon-preview-sizes span {
  align-items: center;
  border: 1px solid var(--panel-border);
  border-radius: 6px;
  display: inline-flex;
  height: var(--size);
  justify-content: center;
  width: var(--size);
}

.icon-preview-sizes img {
  height: 100%;
  width: 100%;
}

.icon-export-box {
  background: var(--panel-soft);
  border: 1px solid var(--panel-border);
  border-radius: 8px;
  display: grid;
  gap: 8px;
  padding: 12px;
}

.icon-export-box dl {
  display: grid;
  gap: 7px;
  margin: 0;
}

.icon-export-box div {
  display: grid;
  gap: 8px;
  grid-template-columns: 72px minmax(0, 1fr);
}

.icon-export-box dt {
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 700;
}

.icon-export-box dd {
  margin: 0;
  overflow-wrap: anywhere;
}

.icon-copy-toast {
  color: var(--brand);
  font-size: 12px;
  font-weight: 700;
}

.icon-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: flex-end;
}

.icon-secondary-button,
.icon-primary-button {
  height: 32px;
  padding: 0 12px;
}

.icon-secondary-button {
  background: var(--panel-soft);
  border: 1px solid var(--panel-border);
  color: var(--text-main);
}

.icon-primary-button {
  background: var(--brand);
  border: 1px solid var(--brand);
  color: #fff;
}

@media (width <= 760px) {
  .icon-factory {
    grid-template-columns: 1fr;
  }

  .icon-preview-grid-bg {
    height: 260px;
  }
}
</style></head><body>
<main class="tool-panel icon-factory-panel"><div class="tool-content icon-factory"><section class="icon-factory-controls"><header class="icon-factory-head"><span class="icon-factory-head-icon"><span class="app-icon">▣</span></span><div><h3>图标工厂</h3><p>生成透明图标资产，适配插件和窗口。</p></div></header><label class="icon-field"><span>图标名称</span><input id="appName" type="text" spellcheck="false" value="tooldesk-plugin"/></label><div class="icon-source-tabs" role="tablist" aria-label="图标来源"><button id="localTab" type="button" class="active">内置图库</button><button id="onlineTab" type="button">在线搜索</button></div><div class="icon-field"><span id="sourceLabel">图形</span><div id="onlinePane" hidden><div class="icon-online-search"><label class="icon-search-field"><span class="app-icon">⌕</span><input id="onlineQuery" type="search" placeholder="搜索 Iconify：server、home、key、music" value="server"/></label><button id="onlineSearch" type="button">搜索</button></div><div id="onlineGrid" class="icon-online-grid"></div><p id="onlineError" class="icon-empty-gallery"></p><p class="icon-online-note">在线图标来自 Iconify；图标集许可不同，商用前请确认具体图标集许可。</p></div><div id="localPane"><label class="icon-search-field"><span class="app-icon">⌕</span><input id="symbolSearch" type="search" placeholder="搜索图标：hosts、http、密码、财务、音乐"/></label><div id="symbolGrid" class="icon-symbol-grid"></div><p id="emptyGallery" class="icon-empty-gallery" hidden>没有匹配的图标</p></div></div><div class="icon-field"><span>颜色</span><div id="colorRow" class="icon-color-row"></div></div><label class="icon-field"><span>线宽</span><input id="strokeWidth" type="range" min="3" max="7" step="0.2" value="4.8"/></label><div class="icon-field"><span>导出规格</span><div id="presetGrid" class="icon-preset-grid"></div></div><label class="icon-check-field"><input id="transparentBackground" type="checkbox" checked/><span>透明背景</span></label></section><aside class="icon-preview-panel"><div class="icon-preview-toolbar"><div><strong>实时预览</strong><span id="exportSummary"></span></div><span class="icon-format-pill">SVG / PNG</span></div><div class="icon-preview-stage"><div class="icon-preview-grid-bg"><img id="mainPreview" alt="图标预览"/></div><div id="sizePreview" class="icon-preview-sizes" aria-label="尺寸预览"></div></div><div class="icon-export-box"><dl><div><dt>Tooldesk</dt><dd>assets/icon.svg + assets/window-icon.png</dd></div><div><dt>窗口图标</dt><dd>PNG 可转 ICO，品牌图标可直接替换为 window-icon.ico</dd></div></dl><span class="icon-copy-toast" role="status" hidden></span></div><footer class="icon-actions"><button id="copySvg" type="button" class="icon-secondary-button">复制 SVG</button><button id="downloadSvg" type="button" class="icon-secondary-button">下载 SVG</button><button id="downloadPng" type="button" class="icon-primary-button">下载 PNG</button></footer></aside></div></main>
<script>
const plugin=TooldeskPlugin.create({id:'tooldesk-icon-factory',capabilities:['copyText','sendHttpRequest']});const api=plugin.api;

function byId(id){return document.getElementById(id)}
function escapeHtml(value){return String(value).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function showToast(selector,text){const el=document.querySelector(selector);if(!el)return;el.textContent=text;el.hidden=false;clearTimeout(el._timer);el._timer=setTimeout(()=>{el.hidden=true},1600)}
function applyLaunchContent(_plugin,_api,fn){window.addEventListener('message',event=>{const context=event.data||{};if(context.source==='tooldesk-host'&&context.type==='launch-context'){const content=typeof context.content==='string'?context.content:'';if(content)fn(content)}})}
async function copyWithApi(api,text,msg,selector){if(!text)return;try{await api.copyText(String(text))}catch{return}showToast(selector,msg||'已复制')}

const keywordAliases={activity:['监控','心跳'],badge:['证件','徽章'],banknote:['金额','财务','人民币'],bookmark:['书签','收藏'],bot:['机器人','自动化'],briefcase:['工作','企业'],calendar:['日历','日期'],calculator:['计算器','计算','财务'],chart:['图表','统计','分析'],clipboard:['剪贴板','复制'],cloud:['云','同步'],code:['代码','开发'],database:['数据库','数据'],file:['文件','文档'],folder:['文件夹','目录'],globe:['网络','网址'],image:['图片','图像'],key:['密码','密钥','授权'],languages:['翻译','语言'],lock:['锁','安全'],mail:['邮件','邮箱'],music:['音乐','音频'],network:['网络','节点'],percent:['百分比','税率'],qr:['二维码'],search:['搜索','查询'],server:['服务','主机','hosts'],shield:['安全','防护'],speedometer:['测速','速度'],terminal:['终端','命令'],text:['文本','文字'],toolbox:['工具箱','插件','组件'],user:['用户','账号'],wallet:['钱包','金额']};
const colorOptions=['#2563eb','#16a34a','#7c3aed','#ea580c','#db2777','#0891b2','#475569','#111827'];const sizeOptions=[['tooldesk','Tooldesk 插件',256,'icon.svg','window-icon.png'],['windows','Windows 窗口',256,'icon.svg','window-icon.png'],['small','小尺寸预览',64,'icon.svg','icon-64.png']];const fallbackSymbol={key:'package',label:'package',body:'<g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7l8.7 5l8.7-5M12 22V12"/></g>',width:24,height:24,keywords:['package']};let icons=null,symbolOptions=[],activeSymbol='package',activeColor='#2563eb',iconSource='local',onlineIconSvg='',onlineResults=[],onlineSelectedId='',activeSizeKey='tooldesk';function escapeXml(value){return String(value).replace(/[&<>"']/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&apos;'}[char]||char))}function activeSize(){return sizeOptions.find(item=>item[0]===activeSizeKey)||sizeOptions[0]}function activeSymbolOption(){return symbolOptions.find(item=>item.key===activeSymbol)||symbolOptions[0]||fallbackSymbol}function normalizeLocalBody(body){const width=Math.max(1.2,Math.min(3,Number(byId('strokeWidth').value)/2.4));return body.replace(/\sstroke-width="[^"]*"/g,' stroke-width="'+width.toFixed(1)+'"').replace(/#000(?:000)?|black|currentColor/gi,activeColor)}function normalizeOnlineSvg(svg){return svg.replace(/<svg\b/i,'<svg role="img" aria-label="'+escapeXml(byId('appName').value||onlineSelectedId||'icon')+'"').replace(/\s(?:width|height)="[^"]*"/g,'').replace(/#000(?:000)?|black|currentColor/gi,activeColor)}function iconSvg(){if(iconSource==='online'&&onlineIconSvg)return normalizeOnlineSvg(onlineIconSvg);const item=activeSymbolOption();const bg=byId('transparentBackground').checked?'':'<rect x="0" y="0" width="'+item.width+'" height="'+item.height+'" rx="'+Math.max(2,Math.round(item.width*0.18))+'" fill="#ffffff" />';return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+item.width+' '+item.height+'" role="img" aria-label="'+escapeXml(byId('appName').value||item.key||'icon')+'" fill="none" color="'+activeColor+'">'+bg+'<g>'+normalizeLocalBody(item.body)+'</g></svg>'}function svgDataUrl(svg=iconSvg()){return 'data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg)}function render(){const url=svgDataUrl();byId('mainPreview').src=url;const size=activeSize();byId('exportSummary').textContent=size[2]+' x '+size[2]+' px，'+(byId('transparentBackground').checked?'透明背景':'白色背景');byId('sizePreview').innerHTML=[64,40,24,16].map(size=>'<span style="--size: '+size+'px"><img src="'+url+'" alt="" /></span>').join('');renderColors();renderPresets()}function renderColors(){byId('colorRow').innerHTML=colorOptions.map(color=>'<button type="button" class="'+(activeColor===color?'active':'')+'" style="background:'+color+'" title="'+color+'" aria-label="'+color+'" data-color="'+color+'"></button>').join('')+'<input id="customColor" type="color" title="自定义颜色" value="'+activeColor+'" />'}function renderPresets(){byId('presetGrid').innerHTML=sizeOptions.map(item=>'<button type="button" class="'+(activeSizeKey===item[0]?'active':'')+'" data-size="'+item[0]+'"><strong>'+item[1]+'</strong><small>'+item[2]+'px</small></button>').join('')}function renderSymbols(){const query=byId('symbolSearch').value.trim().toLowerCase();const options=(query?symbolOptions.filter(item=>[item.key,item.label,...item.keywords].some(value=>value.toLowerCase().includes(query))):symbolOptions).slice(0,180);byId('emptyGallery').hidden=options.length>0;byId('symbolGrid').innerHTML=options.map(item=>'<button type="button" class="'+(activeSymbol===item.key?'active':'')+'" data-key="'+item.key+'"><img src="'+svgDataUrl('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+item.width+' '+item.height+'" fill="none" color="'+activeColor+'">'+normalizeLocalBody(item.body)+'</svg>')+'" alt="" loading="lazy"/><strong>'+item.label+'</strong></button>').join('')}function setSource(source){iconSource=source;byId('localTab').classList.toggle('active',source==='local');byId('onlineTab').classList.toggle('active',source==='online');byId('localPane').hidden=source!=='local';byId('onlinePane').hidden=source!=='online';byId('sourceLabel').textContent=source==='local'?'图形':'在线图库';if(source==='online'&&!onlineResults.length)void searchOnlineIcons();render()}async function searchOnlineIcons(){const query=byId('onlineQuery').value.trim();if(!query)return;byId('onlineSearch').textContent='搜索中';byId('onlineError').textContent='';try{const response=await api.sendHttpRequest({url:'https://api.iconify.design/search?'+new URLSearchParams({query,limit:'48',prefixes:'lucide,tabler,mdi'}),method:'GET',timeoutMs:15000});const payload=JSON.parse(response.body||'{}');onlineResults=(payload.icons||[]).map(id=>{const [prefix,name]=String(id).split(':');return prefix&&name?{id,prefix,name}:null}).filter(Boolean);renderOnline();if(onlineResults[0])await selectOnline(onlineResults[0].id);else byId('onlineError').textContent='没有找到在线图标'}catch(error){byId('onlineError').textContent=error.message||'在线搜索失败'}finally{byId('onlineSearch').textContent='搜索'}}function renderOnline(){byId('onlineGrid').innerHTML=onlineResults.map(item=>'<button type="button" class="'+(onlineSelectedId===item.id?'active':'')+'" data-id="'+item.id+'"><img src="https://api.iconify.design/'+encodeURIComponent(item.prefix)+'/'+encodeURIComponent(item.name)+'.svg?box=true&color='+encodeURIComponent(activeColor)+'&height=32&width=32" alt="" loading="lazy"/><span>'+item.prefix+'</span><strong>'+item.name+'</strong></button>').join('')}async function selectOnline(id){const item=onlineResults.find(value=>value.id===id);if(!item)return;onlineSelectedId=id;renderOnline();try{const response=await api.sendHttpRequest({url:'https://api.iconify.design/'+encodeURIComponent(item.prefix)+'/'+encodeURIComponent(item.name)+'.svg?box=true&color=' dEventListener('click',()=>void searchOnlineIcons());byId('onlineQuery').addEventListener('keydown',event=>{if(event.key==='Enter'){event.preventDefault();void searchOnlineIcons()}});byId('symbolSearch').addEventListener('input',renderSymbols);byId('symbolGrid').addEventListener('click',event=>{const button=event.target.closest('button[data-key]');if(button){activeSymbol=button.dataset.key;renderSymbols();render()}});byId('onlineGrid').addEventListener('click',event=>{const button=event.target.closest('button[data-id]');if(button)void selectOnline(button.dataset.id)});byId('colorRow').addEventListener('click',event=>{const button=event.target.closest('button[data-color]');if(button){activeColor=button.dataset.color;renderSymbols();renderOnline();render()}});byId('colorRow').addEventListener('input',event=>{if(event.target.id==='customColor'){activeColor=event.target.value;renderSymbols();renderOnline();render()}});byId('presetGrid').addEventListener('click',event=>{const button=event.target.closest('button[data-size]');if(button){activeSizeKey=button.dataset.size;render()}});['appName','strokeWidth','transparentBackground'].forEach(id=>byId(id).addEventListener('input',()=>{renderSymbols();render()}));byId('copySvg').addEventListener('click',()=>copyWithApi(api,iconSvg(),'SVG 已复制','.icon-copy-toast'));byId('downloadSvg').addEventListener('click',downloadSvg);byId('downloadPng').addEventListener('click',()=>void downloadPng());void plugin.connect().then(init);
