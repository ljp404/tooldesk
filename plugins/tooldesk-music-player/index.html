          const result = await api.searchOnlineMusic(platform, keyword, 1, 30);
          state.tracks.online = (Array.isArray(result) ? result : []).map((song) => onlineSongToTrack(platform, song));
          state.queue = state.tracks.online;
          $('onlineStatus').textContent = `${state.tracks.online.length} 个结果`;
          renderOnline();
        } catch (error) {
          $('onlineStatus').textContent = error instanceof Error ? error.message : '搜索失败';
        }
      }

      async function saveDownloadRecords() {
        saveMusicDownloads(state.downloads);
        if (state.view === 'downloads') renderDownloads();
      }

      async function upsertDownloadRecord(record) {
        const now = Date.now();
        const nextRecord = {
          ...record,
          id: record.id,
          createdAt: record.createdAt || now,
          updatedAt: now
        };
        state.downloads = [nextRecord, ...state.downloads.filter((item) => item.id !== nextRecord.id)].slice(0, 200);
        await saveDownloadRecords();
        return nextRecord;
      }

      function createDownloadRecord(track, source) {
        const idSource = source === 'cloud' ? track.cloudFileId || track.path : track.onlineSongId || track.path;
        return {
          id: `${source}-${idSource || track.id}-${Date.now()}`,
          trackKey: getDownloadTrackKey(track, source),
          title: track.title,
          artist: track.artist,
          album: track.album,
          source,
          status: 'downloading',
          fileName: track.fileName || `${track.title}.mp3`,
          onlinePlatform: track.onlinePlatform,
          onlineSongId: track.onlineSongId || (track.source === 'online' ? track.path : undefined),
          onlineLyricId: track.onlineLyricId,
          lrcText: track.lrcText
        };
      }

      async function downloadTrack(track) {
        if (isTrackDownloading(track, 'online')) {
          showToast('正在下载', track.title || '当前歌曲');
          return;
        }
        const record = await upsertDownloadRecord(createDownloadRecord(track, 'online'));
        $('onlineStatus').textContent = `正在下载 ${track.title}...`;
        showToast('已加入下载', track.title || '在线音乐');
        renderOnline();
        try {
          const lyric = {
            album: track.album || '',
            artist: track.artist || '',
            lyricId: track.onlineLyricId || track.onlineSongId || track.path,
            title: track.title || ''
          };
          const result = await api.downloadOnlineMusic(track.onlinePlatform, track.onlineSongId || track.path, track.fileName || `${track.title}.mp3`, state.settings.saveDownloadDir, lyric);
          const lrcText = track.lrcText || (await api.resolveTrackLyrics(state.cloudAccessToken, track).catch(() => null));
          await upsertDownloadRecord({
            ...record,
            completedAt: Date.now(),
            filePath: result.filePath,
            lrcText: lrcText || undefined,
            skipped: Boolean(result.skipped),
            status: 'completed'
          });
          $('onlineStatus').textContent = '下载完成';
          showToast(result.skipped ? '文件已存在' : '下载完成', track.title || '在线音乐', 'success');
          renderOnline();
        } catch (error) {
          await upsertDownloadRecord({
            ...record,
            error: error instanceof Error ? error.message : '下载失败',
            status: 'failed'
          });
          $('onlineStatus').textContent = error instanceof Error ? error.message : '下载失败';
          showToast('下载失败', error instanceof Error ? error.message : track.title || '在线音乐', 'error');
          renderOnline();
        }
      }

      async function downloadCloudTrack(track) {
        if (!track.cloudFileId || !track.fileName) return;
        if (isTrackDownloading(track, 'cloud')) {
          showToast('正在下载', track.title || '当前歌曲');
          return;
        }
        const record = await upsertDownloadRecord(createDownloadRecord(track, 'cloud'));
        try {
          state.cloudDownloadTip = `正在下载 ${track.title}...`;
          showToast('已加入下载', track.title || '云盘音乐');
          renderCloud();
          const result =
            track.cloudProvider === 'qiniu'
              ? await api.downloadMusicCloudStorageFile(track.cloudFileId, track.fileName).then((value) => ({
                  filePath: value.cachedPath,
                  skipped: false
                }))
              : await api.downloadCloudMusic(state.cloudAccessToken, track.cloudFileId, track.fileName);
          await upsertDownloadRecord({
            ...record,
            completedAt: Date.now(),
            filePath: result.filePath,
            skipped: Boolean(result.skipped),
            status: 'completed'
          });
          state.cloudDownloadTip = result.skipped ? `${track.title} 已存在` : `已下载：${result.filePath}`;
          showToast(result.skipped ? '文件已存在' : '下载完成', track.title || '云盘音乐', 'success');
          renderCloud();
        } catch (error) {
          await upsertDownloadRecord({
            ...record,
            error: error instanceof Error ? error.message : '下载失败',
            status: 'failed'
          });
          state.cloudDownloadTip = error instanceof Error ? error.message : '下载失败';
          showToast('下载失败', error instanceof Error ? error.message : track.title || '云盘音乐', 'error');
          renderCloud();
        }
      }

      async function loadCloudFolder(parentId = 'root') {
        if (!state.cloudAccessToken) return;
        state.cloudViewMode = 'browse';
        $('cloudStatus').textContent = '加载中...';
        const files = await api.aliyunListFiles(state.cloudAccessToken, parentId);
        const musicExt = new Set(['mp3', 'flac', 'm4a', 'wav', 'aac', 'ogg', 'wma']);
        state.tracks.cloud = (Array.isArray(files) ? files : [])
          .filter((file) => {
            if (file.type === 'folder') return true;
            const ext = String(file.name || '').split('.').pop()?.toLowerCase();
            return musicExt.has(ext || '');
          })
          .map((file) => normalizeTrack(file, 'cloud'));
        state.queue = state.tracks.cloud.filter((track) => !track.isFolder);
        renderCloud();
      }

      async function enterCloudFolder(folder) {
        state.cloudPathStack.push({ id: folder.id, name: folder.title });
        await loadCloudFolder(folder.id);
      }

      async function goBackCloudFolder() {
        if (state.cloudPathStack.length <= 1) return;
        state.cloudPathStack.pop();
        await loadCloudFolder(state.cloudPathStack[state.cloudPathStack.length - 1].id);
      }

      async function loginCloud() {
        if (state.isCloudLoggedIn) {
          await logoutCloud();
          return;
        }

        try {
          stopCloudPolling();
          state.cloudLoginError = '';
          state.cloudLoginStatus = '正在生成二维码...';
          state.cloudQrUrl = '';
          renderCloud();

          const qr = await api.aliyunGenerateQRCode();
          const content = String(qr.qrCodeContent || '').trim();
          if (!content || !qr.t || !qr.sid) {
            throw new Error('二维码内容为空，请重试');
          }

          state.cloudQrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&margin=1&data=${encodeURIComponent(content)}`;
          state.cloudLoginStatus = '请使用阿里云盘 App 扫码登录';
          renderCloud();
          startCloudPolling(String(qr.t), String(qr.sid));
        } catch (error) {
          state.cloudQrUrl = '';
          state.cloudLoginError = error instanceof Error ? error.message : '生成二维码失败，请重试';
          state.cloudLoginStatus = '';
          renderCloud();
        }
      }

      function startCloudPolling(t, sid) {
        stopCloudPolling();
        cloudPollFailCount = 0;

        cloudPollTimer = window.setInterval(async () => {
          try {
            const result = await api.aliyunCheckQRCode(t, sid);
            cloudPollFailCount = 0;

            if (result.status === 'LoginSuccess') {
              stopCloudPolling();
              const refresh = result.refresh_token;
              const access = result.access_token;

              if (!refresh && !access) {
                state.cloudLoginError = '登录成功但未获取到令牌，请重试';
                state.cloudQrUrl = '';
                renderCloud();
                return;
              }

              if (refresh) {
                state.cloudRefreshToken = refresh;
                await api.saveAliyunToken({ refresh_token: refresh });
                const refreshed = await api.aliyunRefreshToken(refresh);
                state.cloudAccessToken = refreshed.access_token || access || '';
                state.cloudRefreshToken = refreshed.refresh_token || refresh;
                if (refreshed.refresh_token) {
                  await api.saveAliyunToken({ refresh_token: refreshed.refresh_token });
                }
              } else {
                state.cloudAccessToken = access;
              }

              state.isCloudLoggedIn = true;
              state.cloudQrUrl = '';
              state.cloudLoginStatus = '';
              state.cloudLoginError = '';
              renderCloud();
              await loadCloudFolder('root');
              return;
            }

            if (result.status === 'QRCodeExpired') {
              stopCloudPolling();
              state.cloudQrUrl = '';
              state.cloudLoginStatus = '二维码已过期，请重新生成';
            } else if (result.status === 'Canceled') {
              stopCloudPolling();
              state.cloudQrUrl = '';
              state.cloudLoginStatus = '已取消登录，请重新生成二维码';
            } else if (result.status === 'WaitLogin') {
              state.cloudLoginStatus = '等待扫码...';
            } else if (result.status === 'ScanSuccess') {
              state.cloudLoginStatus = '扫码成功，请在手机上确认';
            }
            renderCloud();
          } catch {
            cloudPollFailCount += 1;
            if (cloudPollFailCount >= 3) {
              state.cloudLoginStatus = '网络异常，正在重试...';
              renderCloud();
            }
          }
        }, 2000);
      }

      function stopCloudPolling() {
        if (cloudPollTimer) {
          window.clearInterval(cloudPollTimer);
          cloudPollTimer = 0;
        }
      }

      function cleanupResources() {
        stopCloudPolling();
        void saveVolumeNow();
        closeLyricsPanel();
        audio.pause();
        audio.removeAttribute('src');
        audio.load();
        state.tracks.local = [];
        state.tracks.online = [];
        state.tracks.cloud = [];
        state.queue = [];
        state.currentTrack = null;
        state.currentSourceTrack = null;
        state.lyricsLines = [];
        state.recent = [];
        state.playlists = [];
        state.downloads = [];
      }

      async function checkCloudLoginStatus() {
        try {
          const token = await api.getAliyunToken();
          if (!token?.refresh_token) {
            state.isCloudLoggedIn = false;
            renderCloud();
            return;
          }

          state.cloudRefreshToken = token.refresh_token;
          const refreshed = await api.aliyunRefreshToken(token.refresh_token);
          state.cloudAccessToken = refreshed.access_token || '';
          state.cloudRefreshToken = refreshed.refresh_token || token.refresh_token;
          if (refreshed.refresh_token) {
            await api.saveAliyunToken({ refresh_token: refreshed.refresh_token });
          }
          state.isCloudLoggedIn = true;
          state.cloudLoginError = '';
          state.cloudLoginStatus = '';
          renderCloud();
          await loadCloudFolder('root');
        } catch {
          state.isCloudLoggedIn = false;
          state.cloudAccessToken = '';
          state.cloudRefreshToken = '';
          state.cloudLoginError = '登录已失效，请重新扫码登录';
          renderCloud();
        }
      }

      async function logoutCloud() {
        stopCloudPolling();
        await api.clearAliyunToken();
        state.isCloudLoggedIn = false;
        state.cloudAccessToken = '';
        state.cloudRefreshToken = '';
        state.cloudQrUrl = '';
        state.cloudLoginStatus = '';
        state.cloudLoginError = '';
        state.tracks.cloud = [];
        renderCloud();
      }

      async function scanCloud() {
        try {
          $('cloudStatus').textContent = '扫描中...';
          if (!state.cloudAccessToken) {
            const token = await api.getAliyunToken();
            if (!token?.refresh_token) throw new Error('请先登录云盘');
            const refreshed = await api.aliyunRefreshToken(token.refresh_token);
            state.cloudAccessToken = refreshed.access_token;
            state.cloudRefreshToken = refreshed.refresh_token || token.refresh_token;
          }
          const tracks = await api.aliyunScanAllMusic(state.cloudAccessToken);
          state.cloudViewMode = 'all';
          state.tracks.cloud = (Array.isArray(tracks) ? tracks : []).map((track) => normalizeTrack({ ...track, cloudFileId: track.cloudFileId || track.fileId || track.id }, 'cloud'));
          state.queue = state.tracks.cloud;
          state.isCloudLoggedIn = true;
          $('cloudStatus').textContent = `${state.tracks.cloud.length} 首云盘音乐`;
          renderCloud();
        } catch (error) {
          $('cloudStatus').textContent = error instanceof Error ? error.message : '扫描失败';
        }
      }

      async function loadSettings() {
        state.settings = { ...state.settings, ...(await api.getMusicPlayerSettings()) };
        const volume = normalizeVolume(state.settings.volume ?? 0.8);
        state.settings.volume = volume;
        audio.volume = volume;
        $('volumeInput').value = String(volume);
        $('audioQuality').value = state.settings.audioQuality;
        $('cacheEnabled').checked = Boolean(state.settings.cacheEnabled);
        $('localMusicDir').value = state.settings.localMusicDir || '';
        $('saveDownloadDir').value = state.settings.saveDownloadDir || '';
        $('downloadDir').value = state.settings.downloadDir || '';
        const stats = await api.getMusicCacheStats();
        $('cacheInfo').textContent = stats?.fileCount ? `${stats.fileCount} 个缓存文件，${Math.round((stats.bytes || 0) / 1024 / 1024)} MB` : '暂无缓存';
      }

      async function saveSettings() {
        state.settings = {
          audioQuality: $('audioQuality').value,
          cacheEnabled: $('cacheEnabled').checked,
          localMusicDir: $('localMusicDir').value,
          saveDownloadDir: $('saveDownloadDir').value,
          downloadDir: $('downloadDir').value,
          volume: state.settings.volume
        };
        await api.saveMusicPlayerSettings(state.settings);
        $('settingsStatus').textContent = '已保存';
      }

      async function saveVolumeNow() {
        state.settings.volume = normalizeVolume(state.settings.volume);
        return api.saveMusicPlayerSettings(state.settings);
      }

      function updateAllTrackViews() {
        renderLocal();
        renderOnline();
        renderCloud();
        if (state.view === 'recent') renderRecent();
        if (state.view === 'playlist') renderPlaylists();
        if (state.view === 'downloads') renderDownloads();
      }

      function refreshCurrentTrackIndicators() {
        document.querySelectorAll('.track-row').forEach((row) => {
          const active = Boolean(
            state.currentTrack &&
              row.dataset.trackId === state.currentTrack.id &&
              row.dataset.trackSource === state.currentTrack.source
          );
          row.classList.toggle('active', Boolean(active));
          const indexEl = row.querySelector('.track-index');
          if (indexEl && !row.classList.contains('is-folder')) {
            indexEl.innerHTML = active && state.isPlaying ? playerIcons.pause : playerIcons.play;
          }
        });
      }

      function bindEvents() {
        $('chooseLocal').addEventListener('click', async () => {
          const folder = await chooseLocalFolder();
          if (folder) {
            $('localMusicDir').value = folder;
            state.settings.localMusicDir = folder;
            await api.saveMusicPlayerSettings(state.settings);
            await scanLocalFolder(folder);
          }
        });
        $('uploadLocalCloud').addEventListener('click', () => void uploadSelectedMusicCloudFiles('localStatus'));
        $('localSearch').addEventListener('input', renderLocal);
        $('recentSearch').addEventListener('input', renderRecent);
        $('onlineSearchBtn').addEventListener('click', () => void searchOnline());
        $('onlineSearch').addEventListener('keydown', (event) => {
          if (event.key === 'Enter') void searchOnline();
        });
        $('clearRecent').addEventListener('click', async () => {
          state.recent = [];
          saveMusicRecent(state.recent);
          renderRecent();
        });
        $('clearDownloads').addEventListener('click', async () => {
          state.downloads = [];
          saveMusicDownloads([]);
          renderDownloads();
        });
        $('newPlaylist').addEventListener('click', async () => {
          const name = window.prompt('歌单名称', '新建歌单');
          if (!name?.trim()) return;
          state.playlists.push(createPlaylist(name.trim()));
          saveMusicPlaylists(state.playlists);
          renderPlaylists();
        });
        $('loginCloud').addEventListener('click', () => void loginCloud());
        $('scanCloud').addEventListener('click', () => void scanCloud());
        $('saveSettings').addEventListener('click', () => void saveSettings());
        $('testMusicCloudStorage').addEventListener('click', () => void testMusicCloudStorage());
        $('uploadMusicCloudFiles').addEventListener('click', () => void uploadSelectedMusicCloudFiles());
        $('clearCache').addEventListener('click', async () => {
          await api.clearMusicCache();
          await loadSettings();
          $('settingsStatus').textContent = '缓存已清理';
        });
        $('pickLocalDir').addEventListener('click', () => void chooseLocalFolder($('localMusicDir')));
        $('pickSaveDir').addEventListener('click', () => void chooseLocalFolder($('saveDownloadDir')));
        $('pickCacheDir').addEventListener('click', () => void chooseLocalFolder($('downloadDir')));
        $('lyricsButton').addEventListener('click', () => void openLyricsPanel());
        $('playButton').addEventListener('click', () => {
          if (!state.currentTrack) return;
          if (state.isPlaying) {
            audio.pause();
          } else {
            void audio.play();
          }
        });
        $('prevButton').addEventListener('click', () => playQueueOffset(-1));
        $('nextButton').addEventListener('click', () => playQueueOffset(1));
        $('modeButton').addEventListener('click', togglePlayMode);
        $('volumeInput').addEventListener('input', () => {
          const volume = normalizeVolume($('volumeInput').value);
          audio.volume = volume;
          state.settings.volume = volume;
          void saveVolumeNow();
        });
        $('volumeInput').addEventListener('change', () => {
          void saveVolumeNow();
        });
        $('seekInput').addEventListener('input', () => {
          audio.currentTime = Number($('seekInput').value) || 0;
          updateNowPlaying();
        });
        audio.addEventListener('play', () => {
          state.isPlaying = true;
          updateNowPlaying();
          refreshCurrentTrackIndicators();
        });
        audio.addEventListener('pause', () => {
          state.isPlaying = false;
          updateNowPlaying();
          refreshCurrentTrackIndicators();
        });
        audio.addEventListener('timeupdate', updateNowPlaying);
        audio.addEventListener('loadedmetadata', updateNowPlaying);
        audio.addEventListener('waiting', () => {
          if (state.currentTrack) $('playError').textContent = '正在缓冲...';
        });
        audio.addEventListener('playing', () => {
          $('playError').textContent = '';
        });
        audio.addEventListener('stalled', () => {
          if (state.currentTrack) $('playError').textContent = '音频数据加载中断，正在等待恢复';
        });
        audio.addEventListener('error', () => {
          const message = getAudioErrorMessage();
          $('playError').textContent = message;
          if (audio.error?.code === 3) {
            showToast('播放失败', message, 'error');
          }
          state.isPlaying = false;
          updateNowPlaying();
          refreshCurrentTrackIndicators();
        });
        audio.addEventListener('ended', () => {
          if (!isAudioEndedNaturally()) {
            const message = `播放中断：${formatDuration(audio.currentTime)} / ${formatDuration(audio.duration || 0)}`;
            $('playError').textContent = '云盘音频流提前结束，请重试或下载到本地播放';
            showToast('播放中断', message, 'error');
            state.isPlaying = false;
            updateNowPlaying();
            refreshCurrentTrackIndicators();
            return;
          }

          if (state.playMode === 'loop') {
            audio.currentTime = 0;
            void audio.play();
            return;
          }
          playQueueOffset(1);
        });
      }

      function playQueueOffset(offset) {
        if (!state.queue.length) return;
        let index = state.currentIndex + offset;
        if (state.playMode === 'random') index = Math.floor(Math.random() * state.queue.length);
        if (index < 0) index = state.queue.length - 1;
        if (index >= state.queue.length) index = 0;
        void playTrack(state.queue[index], index, state.queue);
      }

      function togglePlayMode() {
        const modes = ['order', 'loop', 'random'];
        state.playMode = modes[(modes.indexOf(state.playMode) + 1) % modes.length];
        const label = { order: '顺序播放', loop: '单曲循环', random: '随机播放' };
        const icon = { order: '≡', loop: '↻', random: '⤨' };
        $('modeButton').textContent = icon[state.playMode];
        $('modeButton').title = label[state.playMode];
      }

      initNav();
      bindEvents();
      window.addEventListener('beforeunload', cleanupResources, { once: true });

      async function bootstrap() {
        await loadSettings();
        state.recent = await loadMusicRecent();
        state.playlists = await loadMusicPlaylists();
        state.downloads = await loadMusicDownloads();
        state.playlists = Array.isArray(state.playlists) ? state.playlists.map(normalizePlaylist) : [];
        if (!state.playlists.length) {
          state.playlists = [createDefaultPlaylist()];
          saveMusicPlaylists(state.playlists);
        } else if (state.playlists.some((playlist) => playlist.id === 'default' && playlist.name === '我喜欢的音乐')) {
          saveMusicPlaylists(state.playlists);
        }
        if (state.settings.localMusicDir) {
          try {
            await scanLocalFolder(state.settings.localMusicDir);
          } catch (error) {
            $('localStatus').textContent = error instanceof Error ? error.message : '本地音乐加载失败';
            renderLocal();
          }
        } else {
          renderLocal();
        }
        renderOnline();
        renderRecent();
        renderPlaylists();
        renderDownloads();
        renderCloud();
        await checkCloudLoginStatus();
        updateNowPlaying();
      }

      (function bootPluginHost() {
        if (typeof TooldeskPlugin === 'undefined') {
          if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', bootPluginHost, { once: true });
            window.addEventListener('load', bootPluginHost, { once: true });
            return;
          }
          return;
        }
        const pluginCreateOptions = { id: 'tooldesk-music-player', capabilities: ['aliyunCheckQRCode',
                'aliyunGenerateQRCode',
                'aliyunListFiles',
                'aliyunRefreshToken',
                'aliyunScanAllMusic',
                'clearAliyunToken',
                'clearMusicCache',
                'downloadCloudMusic',
                'downloadMusicCloudStorageFile',
                'downloadOnlineMusic',
                'getAliyunToken',
                'getMusicCacheStats',
                'getMusicPlayerSettings',
                'getPluginStorageItem',
                'openPath',
                'resolveCloudPlayUrl',
                'resolveLocalPlayUrl',
                'resolveMusicCloudStoragePlayUrl',
                'resolveOnlinePlayUrl',
                'resolveTrackLyrics',
                'saveAliyunToken',
                'saveMusicPlayerSettings',
                'setPluginStorageItem',
                'scanMusicFiles',
                'searchOnlineMusic',
                'showOpenDialog',
                'uploadMusicCloudStorageFile',
                'validateMusicCloudStorage'] };
        const pluginOnReady = function () { bootstrap(); };
        const pluginOfflineReady = function () { void bootstrap(); };
        const plugin = TooldeskPlugin.create(pluginCreateOptions);
        api = plugin.api;
        pluginConnect = plugin.connect().then((result) => {
          if (result && result.ready === false) {
            return pluginOfflineReady();
          }
          return pluginOnReady();
        });
        void pluginConnect;
      })();
    </script>
</html>
