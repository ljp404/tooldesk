<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>音乐播放器</title>
    <style>
      :root {
        color-scheme: light;
        color: #111827;
        background: #f8fafc;
        font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        height: 100vh;
        overflow: hidden;
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        color: inherit;
      }

      .app {
        display: flex;
        height: 100vh;
        min-height: 0;
        padding: 0;
        overflow: hidden;
        background: #f8fafc;
      }

      .shell {
        position: relative;
        display: grid;
        width: 100%;
        min-width: 0;
        min-height: 0;
        grid-template-columns: 184px minmax(0, 1fr);
        grid-template-rows: minmax(0, 1fr) 104px;
        overflow: hidden;
        border: 0;
        border-radius: 0;
        background: #ffffff;
      }

      .sidebar {
        display: flex;
        min-height: 0;
        flex-direction: column;
        gap: 14px;
        border-right: 1px solid #edf0f5;
        background: #fbfcfe;
        padding: 16px 12px;
      }

      .brand {
        display: flex;
        height: 36px;
        align-items: center;
        gap: 9px;
        padding: 0 8px;
        color: #0f172a;
        font-size: 14px;
        font-weight: 650;
      }

      .brand-icon,
      .cover-icon,
      .nav-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .brand-icon {
        width: 28px;
        height: 28px;
        border-radius: 7px;
        background: #fdf2f8;
        color: #db2777;
      }

      .brand-icon svg {
        display: block;
        width: 16px;
        height: 16px;
        fill: none;
        stroke: currentColor;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 2;
      }

      .nav {
        display: grid;
        gap: 4px;
      }

      .nav-button {
        display: grid;
        width: 100%;
        height: 38px;
        align-items: center;
        grid-template-columns: 28px minmax(0, 1fr);
        gap: 8px;
        border: 0;
        border-radius: 8px;
        background: transparent;
        color: #475569;
        cursor: pointer;
        font-size: 13px;
        padding: 0 8px;
        text-align: left;
      }

      .nav-icon {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        color: #64748b;
        transition:
          background 0.16s ease,
          color 0.16s ease;
      }

      .nav-icon svg {
        display: block;
        width: 17px;
        height: 17px;
        fill: none;
        stroke: currentColor;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 2.2;
      }

      .nav-label {
        min-width: 0;
        overflow: hidden;
        line-height: 1;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .nav-button:hover {
        background: #f1f5f9;
        color: #111827;
      }

      .nav-button.active {
        background: #eef5ff;
        color: #1d4ed8;
        font-weight: 600;
      }

      .nav-button:hover .nav-icon {
        background: #e2e8f0;
        color: currentColor;
      }

      .nav-button.active .nav-icon {
        background: #dbeafe;
        color: #2563eb;
      }

      .main {
        display: flex;
        min-width: 0;
        min-height: 0;
        flex-direction: column;
        overflow: hidden;
      }

      .page {
        display: none;
        min-height: 0;
        flex: 1;
        flex-direction: column;
        overflow: hidden;
        padding: 18px;
      }

      .page.active {
        display: flex;
      }

      .page-head {
        display: flex;
        flex-shrink: 0;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .page-title {
        margin: 0;
        color: #0f172a;
        font-size: 18px;
        font-weight: 650;
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .page-searchbar {
        display: grid;
        flex-shrink: 0;
        grid-template-columns: 136px minmax(220px, 420px) auto;
        align-items: center;
        align-self: flex-start;
        gap: 8px;
        margin: -2px 0 16px;
      }

      .search-wrap {
        position: relative;
        flex: 1;
        min-width: 180px;
      }

      .search-wrap::before {
        position: absolute;
        top: 50%;
        left: 12px;
        color: #64748b;
        content: "⌕";
        font-size: 14px;
        transform: translateY(-50%);
      }

      .input,
      .select {
        width: 100%;
        height: 36px;
        border: 1px solid #e5e7eb;
        border-radius: 6px;
        background: #ffffff;
        color: #111827;
        outline: none;
        font-size: 13px;
      }

      .input {
        padding: 0 12px;
      }

      .search-wrap .input {
        padding-left: 38px;
      }

      .select {
        min-width: 112px;
        padding: 0 10px;
      }

      .input:focus,
      .select:focus {
        border-color: #2563eb;
      }

      .button {
        display: inline-flex;
        height: 34px;
        align-items: center;
        justify-content: center;
        gap: 6px;
        border: 1px solid #e5e7eb;
        border-radius: 6px;
        background: #ffffff;
        color: #111827;
        cursor: pointer;
        font-size: 13px;
        padding: 0 12px;
        white-space: nowrap;
      }

      .button:hover {
        border-color: #cbd5e1;
        background: #f8fafc;
      }

      .button.primary {
        border-color: #2563eb;
        background: #2563eb;
        color: #ffffff;
      }

      .button.danger {
        border-color: #fecdd3;
        color: #be123c;
      }

      .body {
        min-height: 0;
        flex: 1;
        overflow: auto;
      }

      .track-list {
        display: grid;
        gap: 4px;
      }

      .track-row {
        display: grid;
        grid-template-columns: 34px 42px minmax(0, 1fr) minmax(90px, 0.28fr) 74px 106px;
        align-items: center;
        gap: 10px;
        min-height: 54px;
        border: 1px solid transparent;
        border-radius: 7px;
        background: #ffffff;
        color: #111827;
        cursor: pointer;
        padding: 6px 10px;
        text-align: left;
      }

      .track-row:hover {
        background: #f8fafc;
      }

      .track-row.active {
        border-color: #bfdbfe;
        background: #edf3ff;
      }

      .track-index {
        display: inline-flex;
        width: 28px;
        height: 28px;
        align-items: center;
        justify-content: center;
        border-radius: 7px;
        color: #64748b;
        font-size: 12px;
      }

      .track-row:not(.is-folder) .track-index {
        border: 1px solid transparent;
        color: #64748b;
      }

      .track-row:not(.is-folder):hover .track-index {
        border-color: #dbeafe;
        background: #eff6ff;
        color: #2563eb;
      }

      .track-row.active .track-index {
        border-color: #bfdbfe;
        background: #dbeafe;
        color: #2563eb;
      }

      .track-index svg {
        display: block;
        width: 15px;
        height: 15px;
        fill: none;
        stroke: currentColor;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 2.2;
      }

      .track-cover,
      .now-cover {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        border-radius: 7px;
        background: #fdf2f8;
        color: #db2777;
        flex-shrink: 0;
      }

      .track-cover {
        width: 36px;
        height: 36px;
      }

      .track-cover img,
      .now-cover img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .track-main,
      .cell {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .track-title {
        overflow: hidden;
        color: #111827;
        font-size: 13px;
        font-weight: 600;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .track-subtitle,
      .cell,
      .status {
        color: #64748b;
        font-size: 12px;
      }

      .track-actions {
        display: flex;
        justify-content: flex-end;
        gap: 6px;
      }

      .icon-button {
        display: inline-flex;
        width: 28px;
        height: 28px;
        align-items: center;
        justify-content: center;
        border: 1px solid #e5e7eb;
        border-radius: 6px;
        background: #ffffff;
        color: #475569;
        cursor: pointer;
        font-size: 13px;
        padding: 0;
      }

      .icon-button svg,
      .play-button svg {
        display: block;
        width: 15px;
        height: 15px;
        fill: none;
        stroke: currentColor;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 2;
      }

      .icon-button:hover,
      .icon-button.active {
        border-color: #bfdbfe;
        background: #edf3ff;
        color: #1d4ed8;
      }

      .icon-button.downloading {
        border-color: #bfdbfe;
        background: #eff6ff;
        color: #2563eb;
        cursor: wait;
      }

      .icon-button.downloading::before {
        width: 12px;
        height: 12px;
        border: 2px solid rgba(37, 99, 235, 0.25);
        border-top-color: #2563eb;
        border-radius: 50%;
        content: '';
        animation: spin 0.8s linear infinite;
      }

      .icon-button.downloading svg,
      .icon-button.downloading span {
        display: none;
      }

      .source-badge {
        display: inline-flex;
        height: 18px;
        align-items: center;
        margin-left: 6px;
        padding: 0 5px;
        border-radius: 4px;
        background: #f1f5f9;
        color: #475569;
        font-size: 11px;
      }

      .back-button {
        width: 30px;
        height: 30px;
        padding: 0;
      }

      .state {
        display: flex;
        height: 100%;
        min-height: 260px;
        align-items: center;
        justify-content: center;
        color: #64748b;
        font-size: 13px;
        text-align: center;
      }

      .state strong {
        display: block;
        margin-bottom: 6px;
        color: #334155;
        font-size: 14px;
      }

      .playlist-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 10px;
      }

      .playlist-card {
        display: grid;
        grid-template-columns: 46px minmax(0, 1fr) auto;
        min-height: 74px;
        align-items: center;
        gap: 12px;
        border: 1px solid #e6eaf0;
        border-radius: 8px;
        background: #ffffff;
        cursor: pointer;
        padding: 10px 12px;
        text-align: left;
        transition:
          background 0.15s ease,
          border-color 0.15s ease,
          box-shadow 0.15s ease;
      }

      .playlist-card:hover,
      .playlist-card.active {
        border-color: #bfdbfe;
        background: #f8fbff;
        box-shadow: 0 6px 18px rgba(37, 99, 235, 0.08);
      }

      .playlist-cover {
        display: flex;
        width: 46px;
        height: 46px;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        border-radius: 8px;
        background: #fdf2f8;
        color: #db2777;
        font-size: 16px;
      }

      .playlist-cover img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .playlist-title {
        overflow: hidden;
        color: #0f172a;
        font-size: 14px;
        font-weight: 650;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .playlist-main {
        display: grid;
        min-width: 0;
        gap: 4px;
      }

      .playlist-meta {
        color: #64748b;
        font-size: 12px;
      }

      .playlist-open {
        color: #94a3b8;
        font-size: 18px;
      }

      .playlist-detail-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
        border: 1px solid #e6eaf0;
        border-radius: 8px;
        background: #ffffff;
        padding: 12px;
      }

      .playlist-detail-title {
        display: flex;
        min-width: 0;
        align-items: center;
        gap: 10px;
      }

      .playlist-detail-title strong {
        display: block;
        overflow: hidden;
        color: #0f172a;
        font-size: 15px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .download-list {
        display: grid;
        gap: 0;
        overflow: hidden;
        border: 1px solid #e6eaf0;
        border-radius: 8px;
        background: #ffffff;
      }

      .download-summary {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 12px;
      }

      .download-stat {
        display: grid;
        gap: 4px;
        border: 1px solid #e6eaf0;
        border-radius: 8px;
        background: #fbfdff;
        padding: 10px 12px;
      }

      .download-stat strong {
        color: #0f172a;
        font-size: 16px;
        line-height: 1;
      }

      .download-stat span {
        color: #64748b;
        font-size: 12px;
      }

      .download-table-head {
        display: grid;
        grid-template-columns: 34px minmax(0, 1fr) 112px 112px;
        align-items: center;
        gap: 12px;
        min-height: 34px;
        border-bottom: 1px solid #e6eaf0;
        background: #f8fafc;
        color: #64748b;
        font-size: 12px;
        font-weight: 650;
        padding: 0 12px;
      }

      .download-row {
        display: grid;
        grid-template-columns: 34px minmax(0, 1fr) 112px 112px;
        align-items: center;
        gap: 12px;
        min-height: 64px;
        border-bottom: 1px solid #edf0f5;
        background: #ffffff;
        padding: 9px 12px;
      }

      .download-row:last-child {
        border-bottom: 0;
      }

      .download-row:hover {
        background: #f8fbff;
      }

      .download-icon {
        display: inline-flex;
        width: 32px;
        height: 32px;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        background: #eff6ff;
        color: #2563eb;
        font-size: 15px;
      }

      .download-main {
        display: grid;
        min-width: 0;
        gap: 4px;
      }

      .download-title {
        overflow: hidden;
        color: #0f172a;
        font-size: 13px;
        font-weight: 650;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .download-subline {
        display: flex;
        min-width: 0;
        align-items: center;
        gap: 6px;
      }

      .download-meta,
      .download-path {
        overflow: hidden;
        color: #64748b;
        font-size: 12px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .download-status {
        display: inline-flex;
        height: 24px;
        align-items: center;
        border-radius: 999px;
        background: #f1f5f9;
        color: #475569;
        font-size: 12px;
        padding: 0 9px;
        white-space: nowrap;
      }

      .download-actions {
        display: inline-flex;
        justify-content: flex-end;
        gap: 6px;
      }

      .download-action {
        display: inline-flex;
        height: 28px;
        align-items: center;
        justify-content: center;
        border: 1px solid #e5e7eb;
        border-radius: 6px;
        background: #ffffff;
        color: #475569;
        cursor: pointer;
        font-size: 12px;
        padding: 0 9px;
      }

      .download-action:hover {
        border-color: #bfdbfe;
        background: #eff6ff;
        color: #2563eb;
      }

      .download-action:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      .download-status.completed {
        background: #ecfdf5;
        color: #047857;
      }

      .download-status.downloading {
        background: #eff6ff;
        color: #2563eb;
      }

      .download-status.downloading::before {
        width: 8px;
        height: 8px;
        margin-right: 6px;
        border-radius: 50%;
        background: #2563eb;
        content: '';
        animation: pulse 1s ease-in-out infinite;
      }

      .download-status.failed {
        background: #fff1f2;
        color: #be123c;
      }

      .download-progress {
        overflow: hidden;
        height: 3px;
        border-radius: 999px;
        background: #e5e7eb;
      }

      .download-progress span {
        display: block;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #2563eb 0%, #38bdf8 100%);
        animation: progressMove 1.1s ease-in-out infinite;
      }

      .download-empty {
        display: flex;
        min-height: 280px;
        align-items: center;
        justify-content: center;
        color: #64748b;
      }

      .settings-panel {
        display: grid;
        max-width: 760px;
        gap: 14px;
      }

      .login-panel {
        display: flex;
        height: 100%;
        min-height: 360px;
        align-items: center;
        justify-content: center;
        padding: 28px;
      }

      .login-card {
        display: grid;
        width: min(420px, 100%);
        justify-items: center;
        gap: 14px;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.06);
        padding: 30px;
        text-align: center;
      }

      .login-icon {
        display: inline-flex;
        width: 48px;
        height: 48px;
        align-items: center;
        justify-content: center;
        border-radius: 10px;
        background: #eff6ff;
        color: #2563eb;
      }

      .login-icon svg {
        display: block;
        width: 22px;
        height: 22px;
        fill: none;
        stroke: currentColor;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 2;
      }

      .login-card h3 {
        margin: 0;
        color: #0f172a;
        font-size: 18px;
        font-weight: 650;
      }

      .login-card p {
        margin: 0;
      }

      .login-summary {
        max-width: 320px;
        color: #64748b;
        font-size: 13px;
        line-height: 1.6;
      }

      .qrcode-wrap {
        display: grid;
        justify-items: center;
        gap: 10px;
      }

      .qrcode-image {
        width: 210px;
        height: 210px;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 8px 22px rgba(15, 23, 42, 0.06);
        padding: 10px;
      }

      .error-text {
        color: #be123c;
        font-size: 12px;
      }

      .settings-section {
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        background: #ffffff;
        padding: 14px;
      }

      .settings-section h3 {
        margin: 0 0 12px;
        color: #111827;
        font-size: 14px;
      }

      .about-panel {
        display: grid;
        max-width: 760px;
        gap: 14px;
      }

      .about-hero {
        display: grid;
        grid-template-columns: 46px minmax(0, 1fr);
        align-items: center;
        gap: 12px;
        border: 1px solid #e6eaf0;
        border-radius: 8px;
        background: #ffffff;
        padding: 14px;
      }

      .about-icon {
        display: inline-flex;
        width: 46px;
        height: 46px;
        align-items: center;
        justify-content: center;
        border-radius: 10px;
        background: #fdf2f8;
        color: #db2777;
        font-size: 20px;
      }

      .about-title {
        margin: 0 0 4px;
        color: #0f172a;
        font-size: 16px;
        font-weight: 650;
      }

      .about-grid {
        display: grid;
        gap: 10px;
      }

      .about-item {
        border: 1px solid #e6eaf0;
        border-radius: 8px;
        background: #ffffff;
        padding: 14px;
      }

      .about-item strong {
        display: block;
        margin-bottom: 4px;
        color: #0f172a;
        font-size: 13px;
      }

      .about-item p {
        margin: 0 0 8px;
      }

      .about-item p:last-child {
        margin-bottom: 0;
      }

      .field {
        display: grid;
        gap: 6px;
        margin-bottom: 12px;
        color: #475569;
        font-size: 12px;
      }

      .path-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
      }

      .controls {
        grid-column: 1 / -1;
        border-top: 1px solid #edf0f5;
        background: #ffffff;
      }

      .seek {
        position: relative;
        height: 16px;
      }

      .seek input {
        position: absolute;
        inset: 0;
        width: 100%;
        cursor: pointer;
        opacity: 0;
      }

      .seek-track {
        position: absolute;
        right: 0;
        top: 6px;
        left: 0;
        height: 3px;
        border-radius: 999px;
        background: #e5e7eb;
      }

      .seek-fill {
        height: 100%;
        border-radius: inherit;
        background: #2563eb;
      }

      .seek-thumb {
        position: absolute;
        top: 7.5px;
        left: var(--seek-thumb-left, 6px);
        width: 12px;
        height: 12px;
        border: 2px solid #ffffff;
        border-radius: 50%;
        background: #2563eb;
        box-shadow: 0 1px 6px rgba(37, 99, 235, 0.35);
        pointer-events: none;
        transform: translate(-50%, -50%) scale(0);
        opacity: 0;
        transition: opacity 0.12s ease, transform 0.12s ease;
      }

      .seek:hover .seek-thumb,
      .seek.dragging .seek-thumb {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }

      .control-body {
        display: grid;

      let api = null;

      const MUSIC_DOWNLOADS_STORAGE_KEY = 'tooldesk-music-downloads';

      async function readStoredArray(key) {
        const raw = await api.getPluginStorageItem(key);

        if (raw === null) {
          return null;
        }

        try {
          const value = JSON.parse(raw);
          return Array.isArray(value) ? value : [];
        } catch {
          return [];
        }
      }

      function writeStoredArray(key, value) {
        void api.setPluginStorageItem(key, JSON.stringify(Array.isArray(value) ? value : []));
      }

      async function loadStoredArray(key) {
        const stored = await readStoredArray(key);

        if (stored !== null) {
          return stored;
        }

        writeStoredArray(key, []);
        return [];
      }

      function saveMusicRecent(recent) {
        writeStoredArray(MUSIC_RECENT_STORAGE_KEY, recent);
      }

      function saveMusicPlaylists(playlists) {
        writeStoredArray(MUSIC_PLAYLISTS_STORAGE_KEY, playlists);
      }

      function saveMusicDownloads(downloads) {
        writeStoredArray(MUSIC_DOWNLOADS_STORAGE_KEY, downloads);
      }

      function loadMusicRecent() {
        return loadStoredArray(MUSIC_RECENT_STORAGE_KEY);
      }

      function loadMusicPlaylists() {
        return loadStoredArray(MUSIC_PLAYLISTS_STORAGE_KEY);

          '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2" /><path d="M19 12a7 7 0 0 0-.1-1.2l2-1.5-2-3.5-2.4 1a7.4 7.4 0 0 0-2-1.2L14 3h-4l-.4 2.6a7.4 7.4 0 0 0-2 1.2l-2.4-1-2 3.5 2 1.5A7 7 0 0 0 5 12c0 .4 0 .8.1 1.2l-2 1.5 2 3.5 2.4-1a7.4 7.4 0 0 0 2 1.2L10 21h4l.4-2.6a7.4 7.4 0 0 0 2-1.2l2.4 1 2-3.5-2-1.5c.1-.4.1-.8.1-1.2Z" /></svg>',
        about:
          '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" /><path d="M12 11v5" /><path d="M12 8h.01" /></svg>'
      };

      const playerIcons = {
        folder: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7.5a2 2 0 0 1 2-2h3.5l2 2H18a2 2 0 0 1 2 2V18a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2Z" /></svg>',
        pause: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14" /><path d="M16 5v14" /></svg>',
        play: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="m8 5 11 7-11 7V5Z" /></svg>'
      };

      const baseNavItems = [
        ['recent', '最近播放', 'recent'],
        ['playlist', '我的歌单', 'playlist'],
        ['local', '本地音乐', 'local'],
        ['cloud', '云盘音乐', 'cloud'],
        ['online', '在线音乐', 'online'],
        ['downloads', '下载管理', 'downloads'],
        ['settings', '设置', 'settings'],
        ['about', '关于', 'about']
      ];
      const navItems = baseNavItems;

      const state = {
        view: 'local',
        tracks: { local: [], online: [], cloud: [] },
        recent: [],
        playlists: [],
        downloads: [],
        queue: [],
        currentTrack: null,
        currentSourceTrack: null,
        currentIndex: 0,
        isPlaying: false,
        playMode: 'order',
        cloudAccessToken: '',
        cloudRefreshToken: '',
        cloudQrUrl: '',
        cloudLoginStatus: '',
        cloudLoginError: '',
        isCloudLoggedIn: false,
        cloudPathStack: [{ id: 'root', name: '根目录' }],
        cloudViewMode: 'browse',
        cloudDownloadTip: '',
        downloadingIds: [],
        uploadingCloudKeys: [],
        activePlaylistId: '',
        lyricsVisible: false,
        lyricsLines: [],
        lyricsPlain: false,
        lyricsError: '',
        settings: { audioQuality: 'standard', downloadDir: '', saveDownloadDir: '', localMusicDir: '', cacheEnabled: true, volume: 0.8 }
      };

      const audio = new Audio();
      audio.volume = state.settings.volume;
      let cloudPollTimer = 0;
      let cloudPollFailCount = 0;

      function $(id) {
        return document.getElementById(id);
      }

      function escapeHtml(value) {
        return String(value ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function formatDuration(seconds) {
        const total = Math.floor(Number(seconds) || 0);
        const minute = Math.floor(total / 60);
        const second = String(total % 60).padStart(2, '0');
        return `${minute}:${second}`;
      }

      function normalizeVolume(value) {
        return Math.min(1, Math.max(0, Number(value) || 0));
      }

      function formatRecentTime(timestamp) {
        const diffMinutes = Math.floor((Date.now() - Number(timestamp || 0)) / 60000);
        if (diffMinutes < 1) return '刚刚';
        if (diffMinutes < 60) return `${diffMinutes} 分钟前`;
        const diffHours = Math.floor(diffMinutes / 60);
        if (diffHours < 24) return `${diffHours} 小时前`;
        const diffDays = Math.floor(diffHours / 24);
        if (diffDays < 7) return `${diffDays} 天前`;
        const date = new Date(timestamp || Date.now());
        return `${date.getMonth() + 1}/${date.getDate()}`;
      }

      function normalizePlaylist(playlist) {
        if (!playlist || playlist.id !== 'default') return playlist;
        return {
          ...playlist,
          description: playlist.description || '默认歌单',
          name: String(playlist.name || '').trim() ? playlist.name : '我喜欢的音乐'
        };
      }

      function isSameTrack(a, b) {
        return Boolean(a && b && a.id === b.id && a.source === b.source);
      }

      function normalizeTrack(track, source) {
        const title = track.title || track.name || track.fileName || '未知歌曲';
        const id = track.id || track.file_id || track.fileId || track.path || track.filePath || `${source}-${title}`;
        const artist = Array.isArray(track.artist) ? track.artist.join(' / ') : track.artist;
        const isFolder = track.isFolder || track.type === 'folder';
        return {
          ...track,
          id: String(id),
          title: isFolder ? title : title.replace(/\.[^.]+$/, ''),
          artist: isFolder ? '' : artist || (source === 'cloud' ? (track.cloudProvider === 'qiniu' ? '云存储音乐' : '云盘音乐') : '未知歌手'),
          album: track.album || '',
          duration: Number(track.duration) || 0,
          path: track.path || track.filePath || track.url_id || track.cloudFileId || track.file_id || track.fileId || '',
          cloudFileId: track.cloudFileId || track.file_id || track.fileId,
          cloudProvider: source === 'cloud' ? track.cloudProvider || 'aliyun' : undefined,
          fileName: track.fileName || track.name,
          isFolder,
          source
        };
      }

      function onlineSongToTrack(platform, song) {
        return normalizeTrack(
          {
            id: `${platform}-${song.id}`,
            title: song.name,
            artist: Array.isArray(song.artist) ? song.artist.join(' / ') : song.artist,
            album: song.album,
            duration: song.duration,
            cover: song.cover,
            path: song.url_id,
            onlinePlatform: platform,
            onlineSongId: song.url_id,
            onlineLyricId: song.lyric_id,
            fileName: `${song.name || 'music'}.mp3`.replace(/[\\/:*?"<>|]/g, '_')
          },
          'online'
        );
      }

      function storedToTrack(item) {
        return normalizeTrack(
          {
            ...item,
            path: item.localPath || item.cloudFileId || item.onlineSongId || item.path || ''
          },
          item.source || 'local'
        );
      }

      function trackToStored(track) {
        return {
          id: track.id,
          title: track.title,
          artist: track.artist,
          album: track.album,
          duration: track.duration,
          source: track.source,
          localPath: track.source === 'local' ? track.path : undefined,
          cloudFileId: track.source === 'cloud' ? track.cloudFileId || track.path : undefined,
          cloudProvider: track.source === 'cloud' ? track.cloudProvider || 'aliyun' : undefined,
          onlinePlatform: track.onlinePlatform,
          onlineSongId: track.onlineSongId || (track.source === 'online' ? track.path : undefined),
          onlineLyricId: track.onlineLyricId,
          cover: track.cover,
          fileName: track.fileName,
          lrc: track.lrc,
          lrcText: track.lrcText
        };
      }

      function isFavorite(track) {
        const playlist = state.playlists[0];
        return Boolean(playlist?.tracks?.some((item) => item.id === track.id && item.source === track.source));
      }

      function getDownloadTrackKey(track, source) {
        return `${source}:${track.cloudFileId || track.onlineSongId || track.path || track.id}`;
      }

      function isTrackDownloading(track, source) {
        const key = getDownloadTrackKey(track, source);
        return state.downloads.some((record) => record.trackKey === key && record.status === 'downloading');
      }

      function getUploadTrackKey(track) {
        return `upload:${track.path || track.id}`;
      }

      function isTrackUploading(track) {
        return state.uploadingCloudKeys.includes(getUploadTrackKey(track));
      }

      function refreshActiveView() {
        if (state.view === 'local') renderLocal();
        if (state.view === 'recent') renderRecent();
        if (state.view === 'playlist') renderPlaylists();
      }

      function showToast(title, message = '', type = 'info') {
        const stack = $('toastStack');
        if (!stack) return;
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<strong>${escapeHtml(title)}</strong>${message ? `<span>${escapeHtml(message)}</span>` : ''}`;
        stack.appendChild(toast);
        window.setTimeout(() => {
          toast.remove();
        }, 2600);
      }

      function getTrackExtension(track) {
        const value = String(track?.fileName || track?.localPath || track?.path || '').split('?')[0];
        const match = /\.([a-z0-9]+)$/i.exec(value);
        return match ? match[1].toLowerCase() : '';
      }

      function getAudioErrorMessage() {
        const code = audio.error?.code;
        const sourceTrack = state.currentSourceTrack || state.currentTrack;
        const ext = getTrackExtension(sourceTrack);

        if (code === 3 && ext === 'flac') {
          const at = Number.isFinite(audio.currentTime) && audio.currentTime > 0 ? `（约 ${formatDuration(audio.currentTime)}）` : '';
          return `FLAC 码流在当前位置${at}解码失败，可用系统播放器打开或重新下载 MP3 版本`;
        }

        const messages = {
          1: '播放已取消',
          2: '网络中断，音频加载失败',
          3: '音频解码失败',
          4: '当前音频格式或地址不可播放'
        };
        return messages[code] || '播放失败';
      }

      function isAudioEndedNaturally() {
        const duration = Number.isFinite(audio.duration) ? audio.duration : 0;

        if (duration <= 0) {
          return true;
        }

        return audio.currentTime >= Math.max(0, duration - 1.5);
      }

      function initNav() {
        $('nav').innerHTML = navItems
          .map(
            ([key, label, icon]) =>
              `<button class="nav-button${key === state.view ? ' active' : ''}" data-view="${key}" type="button"><span class="nav-icon" aria-hidden="true">${iconSvg[icon] || ''}</span><span class="nav-label">${label}</span></button>`
          )
          .join('');
        $('nav').querySelectorAll('.nav-button').forEach((button) => {
          button.addEventListener('click', () => switchView(button.dataset.view));
        });
      }

      function switchView(view) {
        state.view = view;
        document.querySelectorAll('.page').forEach((page) => page.classList.toggle('active', page.dataset.page === view));
        document.querySelectorAll('.nav-button').forEach((button) => button.classList.toggle('active', button.dataset.view === view));
        if (view === 'recent') renderRecent();
        if (view === 'playlist') renderPlaylists();
        if (view === 'downloads') renderDownloads();
        if (view === 'cloud') renderCloud();
      }

      function renderTrackList(container, tracks, options = {}) {
        const list = tracks.filter((track) => {
          const keyword = String(options.keyword || '').trim().toLowerCase();
          if (!keyword) return true;
          return [track.title, track.artist, track.album, track.fileName, track.path].some((value) => String(value || '').toLowerCase().includes(keyword));
        });

        if (!list.length) {
          container.innerHTML = `<div class="state"><div><strong>${escapeHtml(options.emptyTitle || '暂无音乐')}</strong><span>${escapeHtml(options.emptyText || '请选择音乐文件夹或输入关键词。')}</span></div></div>`;
          return;
        }

        container.innerHTML = `<div class="track-list">${list
          .map((track, index) => {
            const active = isSameTrack(track, state.currentTrack) ? ' active' : '';
            const folderClass = track.isFolder ? ' is-folder' : '';
            const cover = track.cover ? `<img src="${escapeHtml(track.cover)}" alt="" />` : track.isFolder ? '▣' : '♪';
            const indexContent = track.isFolder ? playerIcons.folder : active && state.isPlaying ? playerIcons.pause : playerIcons.play;
            const subtitleParts = [track.artist || '', options.showSource ? getSourceLabel(track.source, track) : ''].filter(Boolean);
            const albumText = options.recentTimes?.[track.id] || track.album || '';
            const actions = [];
            if (!track.isFolder && options.favorite !== false) {
              actions.push(`<span class="icon-button${isFavorite(track) ? ' active' : ''}" data-action="favorite" title="${isFavorite(track) ? '从歌单移除' : '加入我的歌单'}">${isFavorite(track) ? '♥' : '♡'}</span>`);
            }
            if (!track.isFolder && options.removeAction) {
              actions.push(`<span class="icon-button" data-action="${escapeHtml(options.removeAction)}" title="移除">×</span>`);
            }
            if (!track.isFolder && track.source === 'online') {
              const downloading = isTrackDownloading(track, 'online');
              actions.push(`<span class="icon-button${downloading ? ' downloading' : ''}" data-action="download" title="${downloading ? '正在下载' : '下载'}"><span>↓</span></span>`);
            }
            if (!track.isFolder && track.source === 'local') {
              const uploading = isTrackUploading(track);
              actions.push(`<span class="icon-button${uploading ? ' downloading' : ''}" data-action="upload-cloud-storage" title="${uploading ? '正在上传' : '上传云存储'}">${uploading ? '<span>⇧</span>' : '⇧'}</span>`);
            }
            if (!track.isFolder && track.source === 'cloud') {
              const downloading = isTrackDownloading(track, 'cloud');
              actions.push(`<span class="icon-button${downloading ? ' downloading' : ''}" data-action="download-cloud" title="${downloading ? '正在下载' : '下载'}"><span>↓</span></span>`);
            }
            return `
              <button class="track-row${active}${folderClass}" data-index="${index}" data-track-id="${escapeHtml(track.id)}" data-track-source="${escapeHtml(track.source)}" type="button">
                <span class="track-index" aria-hidden="true">${indexContent}</span>
                <span class="track-cover">${cover}</span>
                <span class="track-main">
                  <span class="track-title">${escapeHtml(track.title)}</span>
                  <span class="track-subtitle">${escapeHtml(subtitleParts.join(' · ') || (track.isFolder ? '文件夹' : '未知歌手'))}</span>
                </span>
                <span class="cell">${escapeHtml(albumText)}</span>
                <span class="cell">${formatDuration(track.duration)}</span>
                <span class="track-actions">${actions.join('')}</span>
              </button>
            `;
          })
          .join('')}</div>`;

        container.querySelectorAll('.track-row').forEach((row) => {
          const index = Number(row.dataset.index);
          const queue = list.filter((track) => !track.isFolder);
          const queueIndex = Math.max(0, queue.findIndex((track) => track.id === list[index].id && track.source === list[index].source));
          row.addEventListener('dblclick', () => {
            if (!list[index].isFolder) {
              void playTrack(list[index], queueIndex, queue);
            }
          });
          row.addEventListener('click', (event) => {
            const action = event.target?.dataset?.action;
            if (action === 'favorite') {
              event.stopPropagation();
              void toggleFavorite(list[index]);
              return;
            }
            if (action === 'remove-recent') {
              event.stopPropagation();
              void removeRecentTrack(list[index]);
              return;
            }
            if (action === 'remove-playlist') {
              event.stopPropagation();
              void removeTrackFromActivePlaylist(list[index]);
              return;
            }
            if (action === 'download') {
              event.stopPropagation();
              void downloadTrack(list[index]);
              return;
            }
            if (action === 'download-cloud') {
              event.stopPropagation();
              void downloadCloudTrack(list[index]);
              return;
            }
            if (action === 'upload-cloud-storage') {
              event.stopPropagation();
              void uploadTrackToMusicCloudStorage(list[index]);
              return;
            }
            if (list[index].isFolder) {
              void enterCloudFolder(list[index]);
              return;
            }
            void playTrack(list[index], queueIndex, queue);
          });
        });
      }

      function getSourceLabel(source, track) {
        if (source === 'cloud') return track?.cloudProvider === 'qiniu' ? '云存储' : '云盘';
        if (source === 'online') return '在线';
        return '本地';
      }

      function renderLocal() {
        const keyword = $('localSearch').value;
        $('localStatus').textContent = state.settings.localMusicDir
            ? `${state.tracks.local.length} 首音乐 · ${state.settings.localMusicDir}`
            : `${state.tracks.local.length} 首音乐`;
        renderTrackList($('localBody'), state.tracks.local, {
          keyword,
          emptyTitle: '暂无本地音乐',
          emptyText: '选择音乐文件夹后会显示本地歌曲。'
        });
      }

      function renderOnline() {
        renderTrackList($('onlineBody'), state.tracks.online, { favorite: false, emptyTitle: '搜索在线音乐', emptyText: '输入歌名、歌手或专辑后开始搜索。' });
      }

      function renderRecent() {
        const keyword = $('recentSearch').value;
        const recentTimes = Object.fromEntries(state.recent.map((item) => [item.id, formatRecentTime(item.playedAt)]));
        renderTrackList($('recentBody'), state.recent.map(storedToTrack), {
          favorite: false,
          keyword,
          recentTimes,
          removeAction: 'remove-recent',
          showSource: true,
          emptyTitle: '还没有最近播放',
          emptyText: '播放任意歌曲后会出现在这里。'
        });
      }

      function renderPlaylists() {
        if (!state.playlists.length) {
          $('playlistBody').innerHTML = '<div class="state"><div><strong>还没有歌单</strong><span>点击新建歌单开始整理音乐。</span></div></div>';
          return;
        }

        const selected = state.playlists.find((item) => item.id === state.activePlaylistId) || null;
        if (selected) {
          $('playlistBody').innerHTML = `
            <div class="playlist-detail-head">
              <div class="playlist-detail-title">
                <button id="backPlaylist" class="button back-button" type="button" title="返回">←</button>
                <span class="playlist-cover">${selected.cover ? `<img src="${escapeHtml(selected.cover)}" alt="" />` : '♪'}</span>
                <span class="playlist-main">
                  <strong>${escapeHtml(selected.name)}</strong>
                  <span class="playlist-meta">${selected.tracks.length} 首 · ${escapeHtml(selected.description || '自定义歌单')}</span>
                </span>
              </div>
              ${selected.id !== 'default' ? '<button id="deletePlaylist" class="button danger" type="button">删除歌单</button>' : ''}
            </div>
            <div id="playlistTracks"></div>
          `;
          $('backPlaylist')?.addEventListener('click', () => {
            state.activePlaylistId = '';
            renderPlaylists();
          });
          $('deletePlaylist')?.addEventListener('click', async () => {
            if (!window.confirm(`确定删除歌单「${selected.name}」吗？`)) return;
            state.playlists = state.playlists.filter((item) => item.id !== selected.id);
            state.activePlaylistId = '';
            saveMusicPlaylists(state.playlists);
            renderPlaylists();
          });
          renderTrackList($('playlistTracks'), selected.tracks.map(storedToTrack), {
            favorite: false,
            removeAction: 'remove-playlist',
            showSource: true,
            emptyTitle: '歌单为空',
            emptyText: '在本地、云盘或在线音乐中点击收藏加入歌单。'
          });
          return;
        }

        $('playlistBody').innerHTML = `
          <div class="playlist-grid">
            ${state.playlists
              .map((playlist) => `
                <button class="playlist-card" data-playlist="${escapeHtml(playlist.id)}" type="button">
                  <span class="playlist-cover">${playlist.cover ? `<img src="${escapeHtml(playlist.cover)}" alt="" />` : '♪'}</span>
                  <span class="playlist-main">
                    <span class="playlist-title">${escapeHtml(playlist.name)}</span>
                    <span class="playlist-meta">${playlist.tracks.length} 首${playlist.description ? ` · ${escapeHtml(playlist.description)}` : ''}</span>
                  </span>
                  <span class="playlist-open" aria-hidden="true">›</span>
                </button>
              `)
              .join('')}
          </div>
          <div style="height: 16px"></div>
          <div id="playlistTracks"></div>
        `;
        $('playlistBody').querySelectorAll('.playlist-card').forEach((card) => {
          card.addEventListener('click', () => {
            state.activePlaylistId = card.dataset.playlist;
            renderPlaylists();
          });
        });
      }

      function renderCloud() {
        $('loginCloud').textContent = '退出登录';
        $('loginCloud').classList.toggle('hidden', !state.isCloudLoggedIn);
        $('scanCloud').classList.toggle('hidden', !state.isCloudLoggedIn);

        if (!state.isCloudLoggedIn) {
          $('cloudStatus').textContent = '';
          $('cloudBody').innerHTML = `
            <div class="login-panel">
              <div class="login-card">
                <span class="login-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24"><path d="M17.5 19H8a5 5 0 1 1 1.2-9.9A6 6 0 0 1 20 12.6 3.5 3.5 0 0 1 17.5 19Z" /><path d="M12 12v5" /><path d="m9.5 14.5 2.5 2.5 2.5-2.5" /></svg>
                </span>
                <h3>阿里云盘音乐</h3>
                <p class="login-summary">扫码登录后可浏览和播放云盘中的音乐文件，登录状态会保存在本机。</p>
                ${
                  state.cloudQrUrl
                    ? `<div class="qrcode-wrap">
                        <img class="qrcode-image" src="${escapeHtml(state.cloudQrUrl)}" alt="登录二维码" />
                        <p class="status">${escapeHtml(state.cloudLoginStatus || '请使用阿里云盘 App 扫码登录')}</p>
                      </div>`
                    : ''
                }
                ${state.cloudLoginError ? `<p class="error-text">${escapeHtml(state.cloudLoginError)}</p>` : ''}
                <button id="cloudLoginCardButton" class="button primary" type="button">
                  ${state.cloudQrUrl ? '刷新二维码' : '生成登录二维码'}
                </button>
              </div>
            </div>
          `;
          $('cloudLoginCardButton')?.addEventListener('click', () => void loginCloud());
          return;
        }

        const pathText = state.cloudViewMode === 'all'
          ? '全部云盘音乐'
          : state.cloudPathStack.map((item) => item.name).join(' / ');
        $('cloudStatus').innerHTML = `
          <span>${escapeHtml(pathText)}</span>
          ${state.cloudPathStack.length > 1 && state.cloudViewMode === 'browse' ? '<button id="cloudBack" class="button back-button" type="button" title="返回上级">←</button>' : ''}
          ${state.cloudViewMode === 'all' ? '<button id="cloudBrowse" class="button" type="button">返回目录</button>' : ''}
          ${state.cloudDownloadTip ? `<span class="source-badge">${escapeHtml(state.cloudDownloadTip)}</span>` : ''}
        `;
        $('cloudBack')?.addEventListener('click', () => void goBackCloudFolder());
        $('cloudBrowse')?.addEventListener('click', () => void loadCloudFolder(state.cloudPathStack[state.cloudPathStack.length - 1]?.id || 'root'));
        renderTrackList($('cloudBody'), state.tracks.cloud, { emptyTitle: '暂无云盘音乐', emptyText: '登录阿里云盘并扫描后显示音乐。' });
      }

      function formatDownloadTime(timestamp) {
        if (!timestamp) return '';
        const date = new Date(timestamp);
        return `${date.getMonth() + 1}/${date.getDate()} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
      }

      function getDownloadStatusText(record) {
        if (record.status === 'completed') return record.skipped ? '已存在' : '已完成';
        if (record.status === 'failed') return '失败';
        return '下载中';
      }

      function getDownloadIcon(record) {
        if (record.status === 'failed') return '!';
        if (record.status === 'downloading') return '↓';
        return '✓';
      }

      function downloadRecordToTrack(record) {
        return normalizeTrack(
          {
            ...record,
            id: `download-${record.id}`,
            path: record.filePath,

      function updateNowPlaying() {
        const track = state.currentTrack;
        $('nowTitle').textContent = track?.title || '未在播放';
        $('nowArtist').textContent = track ? track.artist || '未知歌手' : '选择一首歌曲开始播放';
        $('nowCover').innerHTML = track?.cover ? `<img src="${escapeHtml(track.cover)}" alt="" />` : '♪';
        $('playButton').innerHTML = state.isPlaying ? playerIcons.pause : playerIcons.play;
        $('playButton').setAttribute('aria-label', state.isPlaying ? '暂停' : '播放');
        $('seekInput').max = String(audio.duration && Number.isFinite(audio.duration) ? audio.duration : track?.duration || 0);
        $('seekInput').value = String(audio.currentTime || 0);
        const max = Number($('seekInput').max) || 0;
        const percent = max > 0 ? ((audio.currentTime || 0) / max) * 100 : 0;
        const seekWidth = $('seekInput').getBoundingClientRect().width;
        const thumbRadius = $('seekThumb').offsetWidth / 2 || 6;
        const thumbLeft = seekWidth > thumbRadius * 2
          ? thumbRadius + (seekWidth - thumbRadius * 2) * (percent / 100)
          : thumbRadius;
        $('seekFill').style.width = `${percent}%`;
        $('seekThumb').style.setProperty('--seek-thumb-left', `${thumbLeft}px`);
        $('timeLabel').textContent = `${formatDuration(audio.currentTime)} / ${formatDuration(max)}`;
        if (state.lyricsVisible) {
          updateLyricsActiveLine();
        }
      }

      function parseLyrics(content) {
        const lines = [];
        for (const rawLine of String(content || '').split(/\r?\n/)) {
          const trimmed = rawLine.trim();
          if (!trimmed) continue;
          const timePattern = /\[(\d{1,2}):(\d{2})(?:\.(\d{1,3}))?\]/g;
          const times = [];
          let match;
          while ((match = timePattern.exec(trimmed)) !== null) {
            const minutes = Number.parseInt(match[1], 10);
            const seconds = Number.parseInt(match[2], 10);
            const fraction = match[3] ? Number.parseInt(match[3].padEnd(3, '0'), 10) : 0;
            times.push(minutes * 60 + seconds + fraction / 1000);
          }
          const text = trimmed.replace(/\[\d{1,2}:\d{2}(?:\.\d{1,3})?\]/g, '').trim();
          if (text && times.length) {
            for (const time of times) lines.push({ text, time });
          }
        }
        return lines.sort((a, b) => a.time - b.time);
      }

      function getActiveLyricIndex() {
        let index = -1;
        for (let i = 0; i < state.lyricsLines.length; i += 1) {
          if (state.lyricsLines[i].time <= audio.currentTime + 0.05) index = i;
          else break;
        }
        return index;
      }

      function updateLyricsActiveLine() {
        const overlay = document.getElementById('lyricsOverlay');
        if (!overlay || state.lyricsPlain) return;
        const activeIndex = getActiveLyricIndex();
        overlay.querySelectorAll('.lyrics-line').forEach((line, index) => {
          line.classList.toggle('active', index === activeIndex);
          if (index === activeIndex) line.scrollIntoView({ block: 'center' });
        });
      }

      async function cacheTrackLyrics(track, content) {
        const text = String(content || '').trim();
        if (!track || !text) return;

        const isSame = (item) => isSameLyricsTrack(item, track);
        const applyLyrics = (item) => (isSame(item) ? { ...item, lrcText: text } : item);

        if (state.currentTrack && isSame(state.currentTrack)) {
          state.currentTrack = { ...state.currentTrack, lrcText: text };
        }
        if (state.currentSourceTrack && isSame(state.currentSourceTrack)) {
          state.currentSourceTrack = { ...state.currentSourceTrack, lrcText: text };
        }

        state.recent = state.recent.map(applyLyrics);
        saveMusicRecent(state.recent);

        let playlistsChanged = false;
        state.playlists = state.playlists.map((playlist) => {
          let playlistChanged = false;
          const tracks = playlist.tracks.map((item) => {
            if (!isSame(item)) return item;
            playlistChanged = true;
            return { ...item, lrcText: text };
          });

          if (!playlistChanged) return playlist;
          playlistsChanged = true;
          return { ...playlist, tracks, updatedAt: Date.now() };
        });

        if (playlistsChanged) {
          saveMusicPlaylists(state.playlists);
        }
      }

      function normalizeLyricsLookupValue(value) {
        return String(value || '').trim().toLowerCase();
      }

      function getLyricsLookupKeys(track) {
        const keys = new Set();
        const values = [
          track?.id,
          track?.localPath,
          track?.path,
          track?.cloudFileId,
          track?.onlineSongId,
          track?.fileName
        ];

        for (const value of values) {
          const normalized = normalizeLyricsLookupValue(value);
          if (normalized) keys.add(normalized);
        }

        const title = normalizeLyricsLookupValue(track?.title);
        const artist = normalizeLyricsLookupValue(track?.artist);
        if (title && artist) {
          keys.add(`${title}|${artist}`);
        }
        if (title && track?.fileName) {
          keys.add(title);
        }

        return keys;
      }

      function isSameLyricsTrack(a, b) {
        if (!a || !b) return false;
        if (a.id === b.id && a.source === b.source) return true;

        const aKeys = getLyricsLookupKeys(a);
        for (const key of getLyricsLookupKeys(b)) {
          if (aKeys.has(key)) return true;
        }

        return false;
      }

      function findCachedLyrics(track) {
        if (!track) return '';
        if (track.lrcText?.trim()) return track.lrcText;
        if (track.lrc?.trim()) return track.lrc;

        const recentMatch = state.recent.find((item) => item.lrcText?.trim() && isSameLyricsTrack(item, track));
        if (recentMatch?.lrcText?.trim()) return recentMatch.lrcText;

        for (const playlist of state.playlists) {
          const playlistMatch = playlist.tracks.find((item) => item.lrcText?.trim() && isSameLyricsTrack(item, track));
          if (playlistMatch?.lrcText?.trim()) return playlistMatch.lrcText;
        }

        return '';
      }

      function renderLyricsContent(content) {
        const parsed = parseLyrics(content);
        if (parsed.length) {
          state.lyricsLines = parsed;
          state.lyricsPlain = false;
        } else {
          state.lyricsLines = String(content)
            .split(/\r?\n/)
            .map((line) => line.trim())
            .filter(Boolean)
            .map((text) => ({ text, time: 0 }));
          state.lyricsPlain = true;
        }

        state.lyricsError = state.lyricsLines.length ? '' : '歌词格式无法识别';
        renderLyricsPanel();
      }

      async function enrichLyricsAfterPlay(track) {
        const cachedContent = findCachedLyrics(track);
        if (cachedContent) {
          await cacheTrackLyrics(track, cachedContent);
          return;
        }

        try {
          const content = await api.resolveTrackLyrics(state.cloudAccessToken, track);
          if (content?.trim() && state.currentTrack?.id === track.id && state.currentTrack.source === track.source) {
            await cacheTrackLyrics(track, content);
            if (state.lyricsVisible) {
              renderLyricsContent(content);
            }
          }
        } catch {
          // Lyrics are optional during playback.
        }
      }

      async function openLyricsPanel() {
        if (!state.currentTrack) return;
        const track = state.currentTrack;
        state.lyricsVisible = true;
        state.lyricsLines = [];
        state.lyricsPlain = false;
        state.lyricsError = '正在加载歌词...';
        renderLyricsPanel();

        try {
          const cachedContent = findCachedLyrics(track);
          const content = cachedContent || (await api.resolveTrackLyrics(state.cloudAccessToken, track));
          if (!content?.trim()) {
            state.lyricsError = '暂无歌词';
            renderLyricsPanel();
            return;
          }
          if (!cachedContent) {
            await cacheTrackLyrics(track, content);
          }
          renderLyricsContent(content);
        } catch {
          state.lyricsError = '歌词加载失败';
          renderLyricsPanel();
        }
      }

      function closeLyricsPanel() {
        state.lyricsVisible = false;
        document.getElementById('lyricsOverlay')?.remove();
      }

      function renderLyricsPanel() {
        document.getElementById('lyricsOverlay')?.remove();
        if (!state.lyricsVisible || !state.currentTrack) return;
        const track = state.currentTrack;
        const overlay = document.createElement('div');
        overlay.id = 'lyricsOverlay';
        overlay.className = 'lyrics-overlay';
        overlay.innerHTML = `
          <div class="lyrics-panel">
            <button id="lyricsClose" class="icon-button lyrics-close" type="button" aria-label="关闭">×</button>
            <div class="lyrics-cover-block">
              <div class="lyrics-cover">${track.cover ? `<img src="${escapeHtml(track.cover)}" alt="" />` : '♪'}</div>
              <div class="playlist-title">${escapeHtml(track.title)}</div>
              <div class="status">${escapeHtml(track.artist || '')}</div>
              ${track.album ? `<div class="status">${escapeHtml(track.album)}</div>` : ''}
            </div>
            <div class="lyrics-scroll">
              ${
                state.lyricsError
                  ? `<div class="state"><div>${escapeHtml(state.lyricsError)}</div></div>`
                  : state.lyricsLines.map((line) => `<p class="lyrics-line">${escapeHtml(line.text)}</p>`).join('')
              }
            </div>
          </div>
        `;
        overlay.addEventListener('click', (event) => {

        });
        document.body.appendChild(overlay);
        document.getElementById('lyricsClose')?.addEventListener('click', closeLyricsPanel);

      async function resolvePlayableTrack(track) {
        if (track.source === 'local') {
          return { ...track, path: await api.resolveLocalPlayUrl(track.path) };
        }
        if (track.source === 'online') {
          return { ...track, path: await api.resolveOnlinePlayUrl(track.onlinePlatform, track.onlineSongId || track.path) };
        }
        if (track.source === 'cloud' && track.cloudProvider === 'qiniu') {
          const key = track.cloudFileId || track.path;
          const result = await api.resolveMusicCloudStoragePlayUrl(key, track.fileName || `${track.title}.mp3`);
          if (!result?.playUrl) throw new Error('获取播放链接失败');
          return { ...track, path: result.playUrl };
        }
        if (!state.cloudAccessToken) {
          const token = await api.getAliyunToken();
          if (!token?.refresh_token) throw new Error('请先登录云盘');
          const refreshed = await api.aliyunRefreshToken(token.refresh_token);
          state.cloudAccessToken = refreshed.access_token;
        }
        const fileId = track.cloudFileId || track.path;
        const result = await api.resolveCloudPlayUrl(state.cloudAccessToken, fileId, track.fileName || `${track.title}.mp3`);
        if (!result?.playUrl) throw new Error('获取播放链接失败');
        return { ...track, path: result.playUrl, cover: result.cover || track.cover, artist: result.artist || track.artist, album: result.album || track.album, duration: result.duration || track.duration };
      }

      async function playTrack(track, index, queue) {
        $('playError').textContent = track.source === 'local' ? '' : '正在准备播放...';
        try {
          const playable = await resolvePlayableTrack(track);
          state.currentTrack = playable;
          state.currentSourceTrack = track;
          state.currentIndex = index ?? 0;
          state.queue = (queue || state.queue || [track]).filter((item) => !item.isFolder);
          audio.src = playable.path;
          audio.load();
          await audio.play();
          state.isPlaying = true;
          $('playError').textContent = '';
          await addRecent(track);
          void enrichLyricsAfterPlay(track);
          updateAllTrackViews();
          updateNowPlaying();
        } catch (error) {
          $('playError').textContent = error instanceof Error ? error.message : '播放失败';
          state.isPlaying = false;
          updateNowPlaying();
        }
      }

      async function addRecent(track) {
        const stored = { ...trackToStored(track), playedAt: Date.now() };
        state.recent = [stored, ...state.recent.filter((item) => !(item.id === stored.id && item.source === stored.source))].slice(0, 80);
        saveMusicRecent(state.recent);
      }

      async function addToDefaultPlaylist(track) {
        if (!state.playlists.length) {
          state.playlists = [createDefaultPlaylist()];
        }
        const playlist = state.playlists[0];
        if (!playlist.tracks.some((item) => item.id === track.id && item.source === track.source)) {
          playlist.tracks.push(trackToStored(track));
          playlist.updatedAt = Date.now();
          playlist.cover = playlist.cover || track.cover;
          saveMusicPlaylists(state.playlists);
        }
        renderPlaylists();
      }

      async function toggleFavorite(track) {
        if (isFavorite(track)) {
          const playlist = state.playlists[0];
          playlist.tracks = playlist.tracks.filter((item) => !(item.id === track.id && item.source === track.source));
          playlist.updatedAt = Date.now();
          saveMusicPlaylists(state.playlists);
          updateAllTrackViews();
          return;
        }
        await addToDefaultPlaylist(track);
        updateAllTrackViews();
      }

      async function removeRecentTrack(track) {
        state.recent = state.recent.filter((item) => !(item.id === track.id && item.source === track.source));
        saveMusicRecent(state.recent);
        renderRecent();
      }

      async function removeTrackFromActivePlaylist(track) {
        const playlist = state.playlists.find((item) => item.id === state.activePlaylistId);
        if (!playlist) return;
        playlist.tracks = playlist.tracks.filter((item) => !(item.id === track.id && item.source === track.source));
        playlist.updatedAt = Date.now();
        saveMusicPlaylists(state.playlists);
        renderPlaylists();
      }

      function createPlaylist(name) {
        const now = Date.now();
        return { id: `playlist-${now}`, name, tracks: [], createdAt: now, updatedAt: now };
      }

      function createDefaultPlaylist() {
        const now = Date.now();
        return { id: 'default', name: '我喜欢的音乐', tracks: [], createdAt: now, updatedAt: now };
      }

      async function chooseLocalFolder(targetInput) {
        const result = await api.showOpenDialog({ properties: ['openDirectory'] });
        if (result.canceled || !result.filePaths?.[0]) return null;
        if (targetInput) targetInput.value = result.filePaths[0];
        return result.filePaths[0];
      }

      function qiniuUploadToTrack(track, result) {
        const fileName = track.fileName || result.key.split('/').pop() || `${track.title || 'music'}.mp3`;
        return normalizeTrack(
          {
            ...track,
            id: `qiniu:${result.key}`,
            path: result.key,
            cloudFileId: result.key,
            cloudProvider: 'qiniu',
            fileName,
            source: 'cloud'
          },
          'cloud'
        );
      }

      async function addUploadedQiniuTrackToPlaylist(track) {
        if (!state.playlists.length) {
          state.playlists = [createDefaultPlaylist()];
        }
        const playlist = state.playlists[0];
        const stored = trackToStored(track);
        playlist.tracks = [stored, ...playlist.tracks.filter((item) => !(item.id === stored.id && item.source === stored.source))];
        playlist.updatedAt = Date.now();
        saveMusicPlaylists(state.playlists);
        renderPlaylists();
      }

      async function uploadTrackToMusicCloudStorage(track) {
        if (!track?.path) return;
        const uploadKey = getUploadTrackKey(track);
        if (state.uploadingCloudKeys.includes(uploadKey)) {
          showToast('正在上传', track.title || '当前歌曲');
          return;
        }

        state.uploadingCloudKeys = [...state.uploadingCloudKeys, uploadKey];
        if ($('localStatus')) {
          $('localStatus').textContent = `正在上传 ${track.title}...`;
        }
        showToast('开始上传', track.title || '本地音乐');
        refreshActiveView();
        try {
          const result = await api.uploadMusicCloudStorageFile(track.path);
          const uploadedTrack = qiniuUploadToTrack(track, result);
          await addUploadedQiniuTrackToPlaylist(uploadedTrack);
          if ($('localStatus')) {
            $('localStatus').textContent = `已上传到云存储，并加入「我喜欢的音乐」`;
          }
          showToast('上传完成', '已加入「我喜欢的音乐」', 'success');
        } catch (error) {
          const message = error instanceof Error ? error.message : '上传失败';
          if ($('localStatus')) {
            $('localStatus').textContent = message;
          }
          showToast('上传失败', message, 'error');
        } finally {
          state.uploadingCloudKeys = state.uploadingCloudKeys.filter((key) => key !== uploadKey);
          refreshActiveView();
        }
      }

      async function uploadSelectedMusicCloudFiles(statusElementId = 'musicCloudStorageStatus') {
        const statusElement = $(statusElementId);
        const result = await api.showOpenDialog({
          filters: [{ name: '音乐文件', extensions: ['mp3', 'flac', 'm4a', 'wav', 'aac', 'ogg', 'wma'] }],
          properties: ['openFile', 'multiSelections'],
          title: '选择要上传的音乐'
        });
        if (result.canceled || !result.filePaths?.length) return;

        let successCount = 0;
        showToast('开始上传', `${result.filePaths.length} 首音乐`);
        try {
          for (const filePath of result.filePaths) {
            statusElement.textContent = `正在上传 ${successCount + 1}/${result.filePaths.length}...`;
            const fileName = filePath.split(/[\\/]/).pop() || 'music';
            const localTrack = normalizeTrack({ fileName, path: filePath }, 'local');
            const uploaded = qiniuUploadToTrack(localTrack, await api.uploadMusicCloudStorageFile(filePath));
            await addUploadedQiniuTrackToPlaylist(uploaded);
            successCount += 1;
          }
        } catch (error) {
          const message = error instanceof Error ? error.message : '上传失败';
          statusElement.textContent = message;
          showToast('上传失败', message, 'error');
          return;
        }

        statusElement.textContent = `已上传 ${successCount} 首，并加入「我喜欢的音乐」`;
        showToast('上传完成', `已上传 ${successCount} 首，并加入「我喜欢的音乐」`, 'success');
      }

        try {

          statusElement.textContent = `七牛云配置可用：${result.bucket} / ${result.region}`;

      async function scanLocalFolder(folder) {
        $('localStatus').textContent = '扫描中...';
        const files = await api.scanMusicFiles(folder);
        state.tracks.local = (Array.isArray(files) ? files : []).map((track) => normalizeTrack(track, 'local'));
        state.queue = state.tracks.local;

      async function searchOnline() {
        const keyword = $('onlineSearch').value.trim();
        if (!keyword) {
          renderOnline();
          return;
        }
        $('onlineStatus').textContent = '搜索中...';
        try {
