name: Tauri Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-tauri:
    name: Build Tauri (${{ matrix.label }})
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          - label: macOS Intel
            platform: macos-latest
            args: --target x86_64-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          - label: Windows x64
            platform: windows-latest
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}
    env:
      TOOLDESK_PUBLIC_BASE_URL: ${{ secrets.TOOLDESK_PUBLIC_BASE_URL }}
      TOOLDESK_SERVICE_API_KEY: ${{ secrets.TOOLDESK_SERVICE_API_KEY }}
      TOOLDESK_SERVICE_CLIENT_TOKEN: ${{ secrets.TOOLDESK_SERVICE_CLIENT_TOKEN }}
      TOOLDESK_SERVICE_FUNCTION_URL: ${{ secrets.TOOLDESK_SERVICE_FUNCTION_URL }}
      TOOLDESK_SUPABASE_ANON_KEY: ${{ secrets.TOOLDESK_SUPABASE_ANON_KEY }}
      TOOLDESK_SUPABASE_URL: ${{ secrets.TOOLDESK_SUPABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Rust
        if: matrix.rust-targets == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust with targets
        if: matrix.rust-targets != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Validate project
        run: npm run check

      - name: Prepare Tauri resources
        run: node scripts/prepare-tauri-resources.mjs

      - name: Check Rust
        shell: bash
        run: |
          cd src-tauri
          cargo fmt --check > ../rustfmt.log 2>&1 || {
            tail -n 80 ../rustfmt.log
            message=$(tail -n 30 ../rustfmt.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')
            echo "::error title=cargo fmt failed::$message"
            exit 1
          }
          cargo check > ../cargo-check.log 2>&1 || {
            tail -n 120 ../cargo-check.log
            message=$(tail -n 40 ../cargo-check.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')
            echo "::error title=cargo check failed::$message"
            exit 1
          }

      - name: Upload Rust check logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rust-check-logs-${{ matrix.label }}
          path: |
            rustfmt.log
            cargo-check.log
          if-no-files-found: ignore

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          tauriScript: npm run tauri
          args: ${{ matrix.args }}

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: tooldesk-${{ matrix.label }}
          path: |
            src-tauri/target/*/release/bundle/dmg/*.dmg
            src-tauri/target/*/release/bundle/macos/*.app
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

  publish-release:
    name: Publish Release
    needs: build-tauri
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download bundles
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-files

          find release-artifacts -type f \( -name '*.dmg' -o -name '*-setup.exe' -o -name '*.msi' \) -print -exec cp {} release-files/ \;

          while IFS= read -r app; do
            case "$app" in
              *"macOS Intel"*) arch="x64" ;;
              *"macOS Apple Silicon"*) arch="aarch64" ;;
              *) arch="$(basename "$(dirname "$app")")" ;;
            esac

            tar -czf "release-files/tooldesk_${arch}.app.tar.gz" -C "$(dirname "$app")" "$(basename "$app")"
          done < <(find release-artifacts -type d -name '*.app' -print)

          find release-files -type f -maxdepth 1 -print | sort

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: tooldesk ${{ github.ref_name }}
          body: tooldesk ${{ github.ref_name }}
          files: release-files/*
          fail_on_unmatched_files: true
          overwrite_files: true
